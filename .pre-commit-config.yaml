# Pre-commit configuration
#
# Hooks fall into two categories:
#
# AUTO-FIXERS — modify files in place and exit non-zero so the commit is
# rejected with the corrected content already on disk.  Simply run:
#
#   git add -u && git commit
#
# …and the commit will succeed with the fixed content.
# Hooks in this category: end-of-file-fixer, trailing-whitespace,
# mixed-line-ending, ruff, ruff-format.
#
# DETECTOR/BLOCKERS — do not modify files; they exit non-zero when a
# violation is found and require manual intervention before committing.
# Hooks in this category: check-merge-conflict, check-yaml, check-toml,
# check-json, debug-statements, bandit.
# For bandit: fix the finding or add a justified # nosec comment, then re-commit.

# Global exclusion: auto-generated output from UA-ModelCompiler.
# These files are never hand-edited and will be overwritten on next codegen run.
exclude: 'OPC_UA_Clients/Release2/IJT_CSharp_Client/Types/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Ensures every file ends with exactly one newline (LF), matching
      # the project's .gitattributes line-ending policy.
      - id: end-of-file-fixer

      # Strips trailing spaces and tabs from all lines.
      - id: trailing-whitespace

      # Converts any CRLF or CR line endings to LF throughout the repo.
      - id: mixed-line-ending
        args: [--fix=lf]

      # Detects leftover merge-conflict markers (<<<<<<<, =======, >>>>>>>).
      # Does NOT auto-fix — the developer must resolve conflicts manually.
      - id: check-merge-conflict

      # Validates YAML syntax. Fails on unparseable files; does not modify.
      - id: check-yaml

      # Validates TOML syntax. Fails on unparseable files; does not modify.
      - id: check-toml

      # Validates JSON syntax. Fails on unparseable files; does not modify.
      # VS Code JSONC files (launch.json, settings.json, tasks.json) use
      # comments which are not valid JSON — exclude them from this check.
      - id: check-json
        exclude: '(^|.*/)(launch|settings|tasks|keybindings)\.json$'

      # Catches stray pdb.set_trace() / breakpoint() calls in Python files.
      # Does NOT auto-fix — remove them manually before committing.
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      # Runs Ruff linter and applies safe auto-fixes only (no --unsafe-fixes).
      # Unsafe fixes (e.g. SIM105 try→contextlib.suppress) can make structural
      # rewrites that should be reviewed, not silently applied on commit.
      - id: ruff
        args: [--fix]

      # Runs Ruff formatter. Safe now that target-version = "py313" is set in all
      # pyproject.toml files — the py314 formatter bug (#24041) that corrupted
      # except (A, B): clauses does not trigger with py313.
      - id: ruff-format

  # Bandit SAST scan — Console Client only, MEDIUM+ severity (-ll).
  #
  # This hook is intentionally narrow: it mirrors the actual blocking CI gate
  # that caught the B310 regression. The Console Client has two pytest tests
  # that both enforce a directory-wide `bandit -r . -ll --exclude ...` scan.
  # To match that behavior, this hook disables filename passing and runs the
  # same recursive scan over the entire Console Client tree.
  #
  # Web Client is intentionally excluded here. Its pytest bandit check uses
  # `--exit-zero`, so findings do not currently block CI. Adding a blocking
  # pre-commit hook there would be stricter than CI and would reintroduce the
  # local-vs-CI mismatch this config is meant to remove.
  #
  # When this hook blocks your commit:
  #   1. Read the bandit output — it shows the file, line, rule ID (e.g. B310),
  #      severity, and a one-line description of the issue.
  #   2. Real security issue → fix the code.
  #   3. False positive → add a justified # nosec comment (project convention):
  #        # nosec justification: <one-line reason why this is safe>
  #        some_call(...)  # nosec BXXX
  #      Re-stage and commit. The nosec suppresses only that specific rule on
  #      that specific line; it does not silence bandit globally.
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: Bandit — Console Client (Medium+)
        args:
          - "-r"
          - "OPC_UA_Clients/Release2/IJT_Console_Client"
          - "-ll"
          - "--exclude"
          - "OPC_UA_Clients/Release2/IJT_Console_Client/tests,OPC_UA_Clients/Release2/IJT_Console_Client/.state,OPC_UA_Clients/Release2/IJT_Console_Client/venv,OPC_UA_Clients/Release2/IJT_Console_Client/venv_test,OPC_UA_Clients/Release2/IJT_Console_Client/.venv,OPC_UA_Clients/Release2/IJT_Console_Client/.venv_test,OPC_UA_Clients/Release2/IJT_Console_Client/env,OPC_UA_Clients/Release2/IJT_Console_Client/ENV"
        pass_filenames: false
        files: '^OPC_UA_Clients/Release2/IJT_Console_Client/.*\.py$'

  # JS linting for the Node Client (ESLint + custom CSS checker).
  # Both hooks use `npm --prefix` so they run with the project's own node_modules
  # (exact same versions as during development) without requiring a global install.
  # pass_filenames: false — the npm scripts handle their own file globs.
  - repo: local
    hooks:
      - id: eslint-node-client
        name: ESLint (Node Client)
        language: system
        entry: npm
        args: ['--prefix', 'OPC_UA_Clients/Release1/IJT_Node_Client', 'run', 'lint:js']
        pass_filenames: false
        files: '^OPC_UA_Clients/Release1/IJT_Node_Client/.*\.(js|mjs)$'

      - id: css-node-client
        name: CSS Lint (Node Client)
        language: system
        entry: npm
        args: ['--prefix', 'OPC_UA_Clients/Release1/IJT_Node_Client', 'run', 'lint:css']
        pass_filenames: false
        files: '^OPC_UA_Clients/Release1/IJT_Node_Client/.*\.css$'

      # Web Client — ESLint (JS) and stylelint (CSS).
      # Runs with the project's own node_modules (same versions as CI) via --prefix.
      # Previously managed by Husky+lint-staged inside the Web Client; consolidated
      # here so the entire repo uses one hook manager (pre-commit).
      - id: eslint-web-client
        name: ESLint (Web Client)
        language: system
        entry: npm
        args: ['--prefix', 'OPC_UA_Clients/Release2/IJT_Web_Client', 'run', 'lint']
        pass_filenames: false
        files: '^OPC_UA_Clients/Release2/IJT_Web_Client/(src/javascripts|config).*\.(js|mjs)$'

      - id: stylelint-web-client
        name: Stylelint (Web Client)
        language: system
        entry: npm
        args: ['--prefix', 'OPC_UA_Clients/Release2/IJT_Web_Client', 'run', 'lint:css']
        pass_filenames: false
        files: '^OPC_UA_Clients/Release2/IJT_Web_Client/src/resources/css/.*\.css$'

      # GitHub Actions workflow/report policy guard — runs the IJT root-runner
      # workflow tests when a workflow, root workflow guard, or integration
      # baseline file is staged.
      # These tests enforce repo-specific contracts that no off-the-shelf
      # linter knows about: suite IDs, matrix shape, browser-features
      # sharding, pinned Linux container for e2e, integration-report skip
      # budgets, and the integration-test-counts baseline. Running the full
      # `tests/test_root_runner.py` (≈65 tests, sub-second) is deliberate —
      # narrowing with `-k workflow` would silently miss most of the
      # workflow-validating tests (e.g. `test_integration_web_client_*`,
      # `test_ci_web_client_*`, `test_ci_report_*`, baseline assertions).
      # pass_filenames: false — the tests read workflow paths from
      # `_runner.REPO_ROOT / .github / workflows / ...` themselves.
      - id: workflow-policy-guard
        name: Workflow policy guard (root runner)
        language: system
        entry: python
        args: ['-m', 'pytest', 'tests/test_root_runner.py', '-q']
        pass_filenames: false
        files: '(^\.github/workflows/.*\.ya?ml$|^tests/test_root_runner\.py$|^tests/baselines/integration-test-counts\.json$)'

      # Lightweight static guard for optional imports that are known to trip
      # mypy when packages are installed without stubs. Full mypy stays in
      # project runners/CI; this catches narrow cross-runner patterns early.
      - id: optional-import-typing-guard
        name: Optional import typing guard
        language: system
        entry: python
        args:
          - "-c"
          - >-
            import run_all_tests as r; result = r._check_optional_import_typing();
            print(f"{result.status}: {result.detail}");
            raise SystemExit(0 if result.status == "PASS" else 1)
        pass_filenames: false
        files: '(^run_all_tests\.py$|^tests/test_root_runner\.py$|^OPC_UA_Clients/Release1/IJT_Node_Client/run_all_tests\.py$|^OPC_UA_Clients/Release2/IJT_CSharp_Client/run_all_tests\.py$|^OPC_UA_Clients/Release2/IJT_Console_Client/run_all_tests\.py$|^OPC_UA_Clients/Release2/IJT_Test_Client/run_all_tests\.py$|^OPC_UA_Clients/Release2/IJT_Test_Client/scripts/(make_ci_summary|make_excel_report)\.py$|^OPC_UA_Clients/Release2/IJT_Web_Client/run_all_tests\.py$|^OPC_UA_Servers/Release2/run_all_tests\.py$)'

  # GitHub Actions workflow schema validation.
  # Validates `.github/workflows/*.{yml,yaml}` against check-jsonschema's
  # built-in GitHub Workflows schema. Catches malformed YAML, unknown keys,
  # wrong types, and missing required fields locally — before CI eats a
  # 12-minute Integration run discovering the same problem. The hook's
  # default `files:` pattern already scopes to `.github/workflows/`.
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.37.2
    hooks:
      - id: check-github-workflows
