[pytest]
testpaths = tests
python_files = test_*.py
asyncio_mode = auto
asyncio_default_fixture_loop_scope = module
addopts = -v --basetemp=.state/pytest_tmp
tmp_path_retention_policy = all
norecursedirs = live fixtures
markers =
    integration: tests requiring a running OPC UA server
    live: tests requiring a live OPC UA server connection
