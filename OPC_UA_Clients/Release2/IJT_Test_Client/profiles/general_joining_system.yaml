# General Joining System Profile
#
# Extends the basic profile with the official General Joining System rollup.
# Maps to the "General Joining System Server Facet" from OPC 40450-1 11.2.2.21.
# Use for servers that produce and expose joining results.

profile:
  name: "General Joining System"
  description: >
    Extends the basic joining system with the general IJT Base profile rollup:
    result access, joining-result content, event management, joining-process
    base support, identifier methods, result identifiers, and method input
    argument validation.

  facets:
    - general_joining_system_server_facet
