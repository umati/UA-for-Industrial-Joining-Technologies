# Basic Joining System Profile
#
# The minimal set of conformance units that every IJT server must implement.
# Maps to the "Basic Joining System Server Facet" from the OPC UA IJT spec.
# Use this as a starting point for embedded or stripped-down implementations.

profile:
  name: "Basic Joining System"
  description: >
    Mandatory baseline for any OPC UA IJT server. Covers JoiningSystem
    structure, Identification AddIn, and MachineryBuildingBlocks. Does not
    include result management, asset management, or process management.

  facets:
    - basic_joining_system_server_facet
