# Asset Management Profile
#
# Extends the general joining system profile with asset-related IJT Base facets:
# asset topology, optional asset operations, enable-tool, and asset connection.

profile:
  name: "Asset Management"
  description: >
    Full asset management implementation on top of the general joining system.
    Covers asset topology, identification, Machinery building blocks, health and
    service monitoring, optional asset operation methods, enable-tool, and asset
    connection coverage.

  facets:
    - general_joining_system_server_facet
    - asset_management_assets_server_facet
    - additional_asset_methods_server_facet
    - enable_tool_server_facet
    - asset_connection_server_facet
