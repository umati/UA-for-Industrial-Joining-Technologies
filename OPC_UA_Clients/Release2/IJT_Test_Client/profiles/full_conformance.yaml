# Full Conformance Profile
#
# Declares all 123 conformance units as supported.
# Use this profile only for a server that claims complete IJT Base
# implementation. The checked-in Release 2 simulator uses
# server_capabilities.simulator.yaml to declare unsupported optional CUs.

profile:
  name: "Full IJT Base Conformance"
  description: >
    All 123 conformance units from OPC 40450-1 IJT Base Companion Specification.
    Use for full-featured servers that claim all CUs. Simulators or controllers
    with unsupported optional features should provide a capability file with
    cu_overrides so those tests are reported as Not Supported instead of failed.

  facets:
    - basic_joining_system_server_facet
    - general_joining_system_server_facet
    - result_management_server_facet
    - asset_management_assets_server_facet
    - disconnect_asset_facet
    - identifiers_methods_server_facet
    - extended_asset_operations_server_facet
    - event_management_server_facet
    - joining_process_management_server_facet
    - joint_management_server_facet
