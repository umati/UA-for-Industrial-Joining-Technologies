# Target Server CU Profile — Generic Remote Start Example
#
# This is a generic sanitized example for OPC UA IJT server under tests that support
# remote joining via SelectJoiningProcess + StartSelectedJoining over OPC UA.
#
# This profile uses first-available tool and process selection so it can run
# against any target server that exposes at least one tool and one joining process.
#
# SANITIZED: No real endpoints, PIUs, process IDs, or vendor values are present.
# Copy this file and replace placeholder values for your target server.
#
# Usage:
#   python run_target_server_cu.py --profile example_remote_start.yaml --preflight-only
#   python run_target_server_cu.py --profile example_remote_start.yaml --mode automated

schema_version: 1
profile_name: "Generic Remote Start Target Server"
description: >
  Sanitized example profile for target servers that can start selected joining
  via SelectJoiningProcess + StartSelectedJoining over OPC UA.
  Replace <target-server-host> with the target server hostname or IP address.
  Keep this profile outside the repository if it contains real identifiers.

# References the standard server CU support declaration.
capabilities_file: "../server_capabilities.yaml"

target:
  # Replace <target-server-host> with your target server hostname or IP address.
  # Example: "opc.tcp://10.0.0.1:40451"
  endpoint: "opc.tcp://<target-server-host>:40451"

  expected_server:
    application_name: ""
    application_version: ""
    warn_only_on_version_drift: true

cu_execution:
  default_mode: automated
  scoring_mode: diagnostic
  precondition_failure_policy: blocked
  allow_manual_steps: false
  default_timeout_seconds: 120

  state_changing_methods:
    default_policy: require_explicit_opt_in
    # These methods are required for the StartSelectedJoining workflow.
    # They are safe OPC UA operations that initiate joining; no destructive
    # operations are included.
    allowed_methods:
      - SelectJoiningProcess
      - StartSelectedJoining
      - DeselectJoiningProcess

  method_status_policies: {}
  extension_fields: {}

selection:
  tool:
    # first_ready: select first tool in ready state (safe default for any target server)
    policy: first_ready
    # Leave empty for runtime discovery. The runner uses GetJoiningProcessList
    # with an empty PIU to enumerate tools, or reads the first available tool asset.
    product_instance_uri: ""
    capability_tags: []

  joining_process:
    # first_compatible: select first process compatible with the discovered tool
    policy: first_compatible
    # Leave empty for runtime discovery via GetJoiningProcessList.
    joining_process_id: ""
    joining_process_origin_id: ""
    selection_name: ""
    capability_tags: []

triggers:
  result:
    # start_selected_joining: use SelectJoiningProcess + StartSelectedJoining
    # to generate real tightening results from the target server.
    mode: start_selected_joining
    timeout_seconds: 120
    # Set to true if the process should be deselected after the joining operation.
    deselect_after_joining: false

  event:
    # observe_only: validate OPC UA events that arrive naturally during the workflow.
    # Target servers emit events as part of the joining process lifecycle.
    mode: observe_only
    timeout_seconds: 60

  condition:
    # observe_only: validate retained conditions passively.
    mode: observe_only
    timeout_seconds: 60

workflow_execution:
  # One StartSelectedJoining call produces the final single result.
  start_invocation_policy: single_start_produces_final_result
  expected_operation_count: 1

  expected_results:
    classification: single
    final_result_required: true
    # Allow enough time for a real tightening operation to complete.
    timeout_seconds: 120

  cleanup:
    policy: best_effort_with_evidence
    deselect_process: true
    reset_identifiers: false

reporting:
  output_dir: "test-results/target-server-cu"
  sanitize_shared_artifacts: true
  keep_local_exact_debug_artifacts: false
