services:
  ijt_web_client:
    build:
      context: ../../..
      dockerfile: OPC_UA_Clients/Release2/IJT_Web_Client/Dockerfile
    image: ijt_web_client:latest
    container_name: ijt_web_client
    working_dir: /app
    volumes:
      - .:/app
      - ../../../constraints.txt:/app/constraints.txt:ro
      - node_modules:/app/node_modules
    ports:
      - "${WEB_CLIENT_HTTP_PORT:-3000}:3000"
      - "${WEB_CLIENT_WS_PORT:-8001}:8001"
    environment:
      IS_DOCKER: "true"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    # Override CMD for dev mode (setup + keep alive)
    command: >
      sh -c "python setup_project.py --force_full && tail -f /dev/null"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # Optional: run tests inside Docker
  ijt_tests:
    build:
      context: ../../..
      dockerfile: OPC_UA_Clients/Release2/IJT_Web_Client/Dockerfile
    image: ijt_web_client:latest
    container_name: ijt_tests
    working_dir: /app
    environment:
      IS_DOCKER: "true"
      PYTHONUNBUFFERED: "1"
      OPCUA_TEST_ENDPOINT: "opc.tcp://host.docker.internal:40451"
      WS_TEST_URL: "ws://localhost:8001"
    command: ["python", "run_all_tests.py", "--all"]
    profiles:
      - test

volumes:
  node_modules:
