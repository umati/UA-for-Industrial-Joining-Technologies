[pytest]
testpaths = tests
python_files = test_*.py
asyncio_mode = auto
asyncio_default_fixture_loop_scope = module
addopts = -p no:cacheprovider
norecursedirs = .* node_modules __pycache__ venv live
timeout = 30
pythonpath = src
tmp_path_retention_count = 0
markers =
    core: core regression tests for IJT client behavior
    integration: tests requiring running OPC UA + WebSocket services
    live: direct OPC UA server tests (requires opc.tcp://localhost:40451)
    live_ws: WebSocket backend tests (requires ws://localhost:8001)
    legacy: old developer exploration tests — not run in CI
