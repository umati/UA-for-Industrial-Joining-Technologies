# Root pyproject.toml — monorepo-level tool configuration.
# Each sub-project (Console, Web, Test clients) has its own pyproject.toml
# for project-specific settings. This file holds repo-root concerns only.

[tool.pytest.ini_options]
# Root-level pytest is reserved for repo-root infrastructure tests under tests/.
# Sub-project suites still run via their own run_all_tests.py entrypoints.
testpaths = ["tests"]
addopts = "-p no:cacheprovider"
norecursedirs = [
    ".git",
    ".venv",
    "node_modules",
    "tmp",
    "test-results",
    "OPC_UA_Clients",
    "OPC_UA_Servers",
    "IJT_Documents",
    "logs",
]

[tool.ruff]
# Repo-wide ruff defaults; sub-projects may override in their own pyproject.toml.
# Set to py313 (not py314) to avoid ruff formatter bug #24041: ruff format with
# target-version = "py314" strips parentheses from except (A, B): clauses, producing
# invalid Python 3 syntax. py313 is unaffected. Restore to py314 when the bug is
# fixed upstream: https://github.com/astral-sh/ruff/issues/24041
target-version = "py313"
line-length = 100
# Direct ruff cache into tmp/ — resolved relative to this file, so it never
# leaks to the repo root or any ancestor regardless of the invoking CWD.
cache-dir = "tmp/ruff-cache"
# Exclude auto-generated files (UA-ModelCompiler output) — never hand-edit these.
exclude = [
    "OPC_UA_Clients/Release2/IJT_CSharp_Client/Types/",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "S", "B", "C4", "SIM"]
ignore = ["S101"]  # allow assert in tests

[tool.ruff.lint.per-file-ignores]
# Test runners and infrastructure scripts call subprocess with trusted,
# hard-coded args — S603/S314/S607 are false positives here.
"**/run_all_tests.py" = ["S603", "S314", "S607"]
"**/tests/**" = ["S603", "S314"]
# _STATUS_PASS is a display string, not a credential — S105 is a false positive.
"**/smoke_test.py" = ["S105"]
