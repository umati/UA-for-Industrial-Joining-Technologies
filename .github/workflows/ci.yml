# ─────────────────────────────────────────────────────────────────────────────
# CI — IJT OPC UA Full Test Suite
#
# Runs on every push / PR to main. Produces a combined summary table on the
# Actions Summary page. Per-test drill-down is in the Checks tab.
#
# Jobs:
#   web-client           Release2 / IJT Web Client    Python pytest · Vitest · ESLint · Bandit · npm audit
#   console-client       Release2 / IJT Console Client Python pytest · Bandit
#   node-client          Release1 / IJT Node Client   Vitest · ESLint · npm audit
#   docker-smoke         Release2 / IJT Web Client    Docker build + HTTP/WS readiness
#   test-client          Release2 / IJT Test Client   pytest collect-only · Bandit
#   server-smoke-windows Release2 / OPC UA Server     Windows native smoke (10 checks)
#   actionlint           GHA workflow lint    actionlint (all .github/workflows/*.yml)
#   report               Combined summary (always runs after all jobs)
#
# Heavy tests (nightly + manual): see .github/workflows/heavy-tests.yml
#
# Standards used:
#   Python security : bandit    (pyproject.toml [tool.bandit]  ·  -c pyproject.toml)
#   JS security     : npm audit (--audit-level=high)
#   Test reports    : JUnit XML → dorny/test-reporter (Checks tab)
#   ESLint results  : JSON artifact → parsed in report job
#   Summary table   : $GITHUB_STEP_SUMMARY (Actions Summary tab)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write          # required by dorny/test-reporter

# Opt into Node.js 24 for all actions (suppresses the Node.js 20 deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:


  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Web Client
  #   Python: pytest + bandit (pyproject.toml)
  #   JS:     vitest + eslint (JSON) + npm audit
  # ───────────────────────────────────────────────────────────────────────────
  web-client:
    name: "Release2 / IJT Web Client"
    runs-on: ubuntu-latest
    outputs:
      mypy_result: ${{ steps.mypy.outcome }}
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Web_Client

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: OPC_UA_Clients/Release2/IJT_Web_Client/package-lock.json

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install JS Dependencies
        run: npm ci

      - run: mkdir -p test-results

      - name: Python Unit Tests
        id: pytest
        continue-on-error: true
        run: |
          python -m pytest tests/python/unit -q \
            --junitxml=test-results/pytest.xml \
            --cov=. \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term-missing

      - name: JS Unit Tests
        id: vitest
        continue-on-error: true
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile.junit=test-results/vitest.xml

      - name: ESLint
        id: eslint
        continue-on-error: true
        run: npx eslint src/javascripts --format json --output-file test-results/eslint.json

      - name: Bandit (Python Security)
        id: bandit
        continue-on-error: true
        run: python -m bandit -r . -c pyproject.toml --severity-level medium -f json -o test-results/bandit.json

      - name: Ruff (Python Linting)
        id: pylint
        continue-on-error: true
        run: python -m ruff check . --output-format=github

      - name: mypy (Type Checking)
        id: mypy
        continue-on-error: true
        run: python -m mypy . --ignore-missing-imports --no-error-summary

      - name: npm Audit (JS Security)
        id: npm_audit
        continue-on-error: true
        run: npm audit --audit-level=high --json > test-results/npm-audit.json

      - name: Publish Test Reports
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "Web Client — Tests"
          path: |
            OPC_UA_Clients/Release2/IJT_Web_Client/test-results/pytest.xml
            OPC_UA_Clients/Release2/IJT_Web_Client/test-results/vitest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-web-client
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/

      - name: Fail if Any Check Failed
        if: always() && (
          steps.pytest.outcome    == 'failure' ||
          steps.vitest.outcome    == 'failure' ||
          steps.eslint.outcome    == 'failure' ||
          steps.bandit.outcome    == 'failure' ||
          steps.pylint.outcome    == 'failure' ||
          steps.mypy.outcome      == 'failure' ||
          steps.npm_audit.outcome == 'failure')
        run: |
          echo "One or more checks failed:"
          echo "  pytest     -> ${{ steps.pytest.outcome }}"
          echo "  vitest     -> ${{ steps.vitest.outcome }}"
          echo "  eslint     -> ${{ steps.eslint.outcome }}"
          echo "  bandit     -> ${{ steps.bandit.outcome }}"
          echo "  ruff       -> ${{ steps.pylint.outcome }}"
          echo "  mypy       -> ${{ steps.mypy.outcome }}"
          echo "  npm audit  -> ${{ steps.npm_audit.outcome }}"
          exit 1


  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Console Client
  #   Python: pytest + bandit (pyproject.toml)
  # ───────────────────────────────────────────────────────────────────────────
  console-client:
    name: "Release2 / IJT Console Client"
    runs-on: ubuntu-latest
    outputs:
      mypy_result: ${{ steps.mypy.outcome }}
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Console_Client

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            OPC_UA_Clients/Release2/IJT_Console_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Console_Client/requirements-dev.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - run: mkdir -p test-results

      - name: Python Unit Tests
        id: pytest
        continue-on-error: true
        run: |
          python -m pytest tests/unit/ -q \
            --junitxml=test-results/pytest.xml \
            --cov=. \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term-missing

      - name: Bandit (Python Security)
        id: bandit
        continue-on-error: true
        run: python -m bandit -r . -c pyproject.toml --severity-level medium -f json -o test-results/bandit.json

      - name: Ruff (Python Linting)
        id: pylint
        continue-on-error: true
        run: python -m ruff check . --output-format=github

      - name: mypy (Type Checking)
        id: mypy
        continue-on-error: true
        run: python -m mypy . --ignore-missing-imports --no-error-summary

      - name: Publish Test Reports
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "Console Client — Tests"
          path: OPC_UA_Clients/Release2/IJT_Console_Client/test-results/pytest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-console-client
          path: OPC_UA_Clients/Release2/IJT_Console_Client/test-results/

      - name: Fail if Any Check Failed
        if: always() && (
          steps.pytest.outcome == 'failure' ||
          steps.bandit.outcome == 'failure' ||
          steps.pylint.outcome == 'failure' ||
          steps.mypy.outcome   == 'failure')
        run: |
          echo "One or more checks failed:"
          echo "  pytest  -> ${{ steps.pytest.outcome }}"
          echo "  bandit  -> ${{ steps.bandit.outcome }}"
          echo "  ruff    -> ${{ steps.pylint.outcome }}"
          echo "  mypy    -> ${{ steps.mypy.outcome }}"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Release1 / IJT Node Client
  #   JS: vitest + eslint (JSON) + npm audit
  # ───────────────────────────────────────────────────────────────────────────
  node-client:
    name: "Release1 / IJT Node Client"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release1/IJT_Node_Client

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: OPC_UA_Clients/Release1/IJT_Node_Client/package-lock.json

      - name: Install JS Dependencies
        run: npm ci

      - run: mkdir -p test-results

      - name: JS Unit Tests
        id: vitest
        continue-on-error: true
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile.junit=test-results/vitest.xml

      - name: ESLint
        id: eslint
        continue-on-error: true
        run: npx eslint javascripts/ --format json --output-file test-results/eslint.json

      - name: npm Audit (JS Security)
        id: npm_audit
        continue-on-error: true
        run: npm audit --audit-level=high --json > test-results/npm-audit.json

      - name: Publish Test Reports
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "Node Client — Tests"
          path: OPC_UA_Clients/Release1/IJT_Node_Client/test-results/vitest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-node-client
          path: OPC_UA_Clients/Release1/IJT_Node_Client/test-results/

      - name: Fail if Any Check Failed
        if: always() && (
          steps.vitest.outcome    == 'failure' ||
          steps.eslint.outcome    == 'failure' ||
          steps.npm_audit.outcome == 'failure')
        run: |
          echo "One or more checks failed:"
          echo "  vitest     -> ${{ steps.vitest.outcome }}"
          echo "  eslint     -> ${{ steps.eslint.outcome }}"
          echo "  npm audit  -> ${{ steps.npm_audit.outcome }}"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Web Client — Docker Smoke
  # Builds the image, starts the Compose stack, verifies HTTP + WebSocket.
  # ───────────────────────────────────────────────────────────────────────────
  docker-smoke:
    name: "Release2 / IJT Web Client — Docker Smoke"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Web_Client

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: OPC_UA_Clients/Release2/IJT_Web_Client
          tags: ijt_web_client:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Compose Stack
        run: docker compose up -d --no-build

      - name: Wait for HTTP Readiness
        shell: bash
        run: |
          set -euo pipefail
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              echo "HTTP endpoint is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for http://127.0.0.1:3000"
          docker ps
          docker logs ijt_web_client || true
          exit 1

      - name: Verify WebSocket Port
        shell: bash
        run: |
          timeout 30 bash -c \
            'until (echo > /dev/tcp/127.0.0.1/8001) >/dev/null 2>&1; do sleep 1; done'

      - name: Show Container Status
        if: always()
        run: docker ps --filter name=ijt_web_client

      - name: Show Recent Logs
        if: always()
        run: docker logs --tail 120 ijt_web_client

      - name: Teardown Compose Stack
        if: always()
        run: docker compose down -v

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT C# Client
  #   dotnet build (warnaserror) + dotnet test (xUnit) + format check
  # ───────────────────────────────────────────────────────────────────────────
  csharp-client:
    name: "Release2 / IJT C# Client"
    runs-on: windows-latest
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_CSharp_Client

    steps:
      - uses: actions/checkout@v6

      - name: Extract server ZIP
        working-directory: ${{ github.workspace }}
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force

      - name: Start OPC UA Server (background)
        working-directory: ${{ github.workspace }}
        run: |
          $proc = Start-Process `
            -FilePath "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\opcua_ijt_demo_application.exe" `
            -WorkingDirectory "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" `
            -PassThru -WindowStyle Hidden
          Write-Host "Server PID: $($proc.Id)"
          echo "SERVER_PID=$($proc.Id)" >> $env:GITHUB_ENV
          echo "OPCUA_SIMULATOR_EXE=${{ github.workspace }}\OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\opcua_ijt_demo_application.exe" >> $env:GITHUB_ENV
          echo "OPCUA_SERVER_PORT=40451" >> $env:GITHUB_ENV
          echo "OPCUA_SERVER_URL=opc.tcp://localhost:40451" >> $env:GITHUB_ENV

      - name: Wait for OPC UA port 40451
        working-directory: ${{ github.workspace }}
        run: |
          $timeout = 60
          $start   = Get-Date
          while (((Get-Date) - $start).TotalSeconds -lt $timeout) {
            if (Test-NetConnection -ComputerName localhost -Port 40451 `
                  -InformationLevel Quiet -WarningAction SilentlyContinue) {
              Write-Host "Port 40451 is open"
              exit 0
            }
            Write-Host "Waiting for server..."
            Start-Sleep -Seconds 3
          }
          Write-Host "ERROR: Timeout waiting for port 40451"
          exit 1

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet Packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore NuGet Packages
        run: dotnet restore IJT_CSharp_Client.sln

      - name: Vulnerable Package Scan
        id: vuln_scan
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          $output = dotnet list package --vulnerable --include-transitive 2>&1
          $output | Out-File test-results\vuln-scan.txt
          Write-Host $output
          if ($output -match "has the following vulnerable packages") {
            Write-Host "##[error]Vulnerable NuGet packages detected — see vuln-scan.txt"
            exit 1
          }

      - name: Build (zero warnings)
        id: build
        continue-on-error: true
        run: dotnet build IJT_CSharp_Client.sln --no-restore -warnaserror --configuration Release

      - name: Run xUnit Tests
        id: tests
        continue-on-error: true
        env:
          IJT_AUTO_ACCEPT: 'true'
          OPCUA_SERVER_PORT: '40451'
          OPCUA_SERVER_URL: ${{ env.OPCUA_SERVER_URL }}
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          New-Item -ItemType Directory -Force -Path test-results/coverage | Out-Null
          dotnet test Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj `
            --no-restore `
            --configuration Release `
            --logger "trx;LogFileName=test-results\tests.trx" `
            --logger "console;verbosity=normal" `
            --collect:"XPlat Code Coverage" `
            --results-directory test-results/coverage `
            2>&1 | Tee-Object -Variable testOutput
          $testOutput | Out-File test-results\test-output.txt

      - name: Format Check
        id: format
        continue-on-error: true
        run: dotnet format IJT_CSharp_Client.sln --verify-no-changes --no-restore 2>&1

      - name: Convert TRX to JUnit XML
        if: always()
        shell: pwsh
        run: |
          $trx = "test-results\tests.trx"
          $junit = "test-results\tests.xml"
          if (Test-Path $trx) {
            [xml]$x = Get-Content $trx
            $ns = @{ t = "http://microsoft.com/schemas/VisualStudio/TeamTest/2010" }
            $results = Select-Xml -Xml $x -XPath "//t:UnitTestResult" -Namespace $ns | Select-Object -ExpandProperty Node
            $passed  = ($results | Where-Object { $_.outcome -eq "Passed"  }).Count
            $failed  = ($results | Where-Object { $_.outcome -eq "Failed"  }).Count
            $total   = $results.Count
            $xml  = '<?xml version="1.0" encoding="UTF-8"?>' + "`n"
            $xml += "<testsuites tests=`"$total`" failures=`"$failed`">`n"
            $xml += "  <testsuite name=`"IJT_CSharp_Client.Tests`" tests=`"$total`" failures=`"$failed`">`n"
            foreach ($r in $results) {
              $name = [System.Security.SecurityElement]::Escape($r.testName)
              $outcome = $r.outcome
              if ($outcome -eq "Passed") {
                $xml += "    <testcase name=`"$name`" classname=`"IJT`" />`n"
              } else {
                $msg = [System.Security.SecurityElement]::Escape($r.Output.ErrorInfo.Message)
                $xml += "    <testcase name=`"$name`" classname=`"IJT`"><failure>$msg</failure></testcase>`n"
              }
            }
            $xml += "  </testsuite>`n</testsuites>"
            $xml | Out-File $junit -Encoding UTF8
            Write-Host "Converted TRX → JUnit: $total tests, $failed failures"
          } else {
            Write-Host "No TRX file found — creating empty JUnit"
            '<?xml version="1.0"?><testsuites tests="0" failures="0"><testsuite name="IJT_CSharp_Client.Tests" tests="0"/></testsuites>' | Out-File $junit -Encoding UTF8
          }

      - name: Publish Test Report
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: "C# Client — xUnit Tests"
          path: OPC_UA_Clients/Release2/IJT_CSharp_Client/test-results/tests.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-csharp-client
          path: OPC_UA_Clients/Release2/IJT_CSharp_Client/test-results/

      - name: Stop OPC UA Server
        if: always()
        run: |
          if ($env:SERVER_PID) {
            Stop-Process -Id $env:SERVER_PID -Force -ErrorAction SilentlyContinue
            Write-Host "OPC UA server stopped"
          }

      - name: Fail if Any Check Failed
        if: always() && (
          steps.build.outcome     == 'failure' ||
          steps.tests.outcome     == 'failure' ||
          steps.format.outcome    == 'failure' ||
          steps.vuln_scan.outcome == 'failure')
        run: |
          echo "One or more C# checks failed:"
          echo "  build     -> ${{ steps.build.outcome }}"
          echo "  tests     -> ${{ steps.tests.outcome }}"
          echo "  format    -> ${{ steps.format.outcome }}"
          echo "  vuln scan -> ${{ steps.vuln_scan.outcome }}"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Test Client
  #   Python: pytest (live OPC UA server via Linux binary) + bandit
  # ───────────────────────────────────────────────────────────────────────────
  test-client:
    name: "Release2 / IJT Test Client"
    runs-on: ubuntu-latest
    outputs:
      mypy_result: ${{ steps.mypy.outcome }}
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Test_Client

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            OPC_UA_Clients/Release2/IJT_Test_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Test_Client/requirements-dev.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - run: mkdir -p test-results

      - name: Collect Tests (verify test discovery)
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest --collect-only -q \
            2>&1 | tee test-results/collect-output.txt

      - name: Bandit (Python Security)
        id: bandit
        continue-on-error: true
        run: python -m bandit -r . -c pyproject.toml --severity-level medium -f json -o test-results/bandit.json

      - name: Ruff (Python Linting)
        id: pylint
        continue-on-error: true
        run: python -m ruff check . --output-format=github

      - name: mypy (Type Checking)
        id: mypy
        continue-on-error: true
        run: python -m mypy . --ignore-missing-imports --no-error-summary

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-test-client
          path: OPC_UA_Clients/Release2/IJT_Test_Client/test-results/

      - name: Fail if Any Check Failed
        if: always() && (
          steps.pytest.outcome == 'failure' ||
          steps.bandit.outcome == 'failure' ||
          steps.pylint.outcome == 'failure' ||
          steps.mypy.outcome   == 'failure')
        run: |
          echo "One or more checks failed:"
          echo "  pytest  -> ${{ steps.pytest.outcome }}"
          echo "  bandit  -> ${{ steps.bandit.outcome }}"
          echo "  ruff    -> ${{ steps.pylint.outcome }}"
          echo "  mypy    -> ${{ steps.mypy.outcome }}"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # OPC UA Server — Windows Smoke
  #   Extract OPC_UA_IJT_Server_Simulator.zip, launch the EXE directly,
  #   wait for TCP 40451, run all 10 smoke checks, kill the process.
  #
  # The server auto-creates its PKI directory (certificates) on first launch —
  # no pre-seeded certificates are needed.
  # ───────────────────────────────────────────────────────────────────────────

  server-smoke-windows:
    name: "Release2 / OPC UA Server — Windows Smoke"
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Extract server ZIP
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force
          Write-Host "Extracted ZIP contents:"
          Get-ChildItem "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" | Select-Object Name

      - name: Start OPC UA Server (background)
        run: |
          $proc = Start-Process `
            -FilePath "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\opcua_ijt_demo_application.exe" `
            -WorkingDirectory "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" `
            -PassThru -WindowStyle Hidden
          Write-Host "Server PID: $($proc.Id)"
          echo "SERVER_PID=$($proc.Id)" >> $env:GITHUB_ENV

      - name: Wait for OPC UA port 40451
        run: |
          $timeout = 60
          $start   = Get-Date
          while (((Get-Date) - $start).TotalSeconds -lt $timeout) {
            if (Test-NetConnection -ComputerName localhost -Port 40451 `
                  -InformationLevel Quiet -WarningAction SilentlyContinue) {
              Write-Host "Port 40451 is open"
              exit 0
            }
            Write-Host "Waiting for server..."
            Start-Sleep -Seconds 3
          }
          Write-Host "ERROR: Timeout waiting for port 40451"
          exit 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install smoke test dependencies
        run: pip install -r OPC_UA_Servers/Release2/tests/requirements.txt

      - name: Run smoke test (10 checks)
        run: python OPC_UA_Servers/Release2/tests/smoke_test.py --tcp-timeout 30

      - name: Stop OPC UA Server
        if: always()
        run: |
          if ($env:SERVER_PID) {
            Stop-Process -Id $env:SERVER_PID -Force -ErrorAction SilentlyContinue
            Write-Host "OPC UA server stopped"
          }

  # ───────────────────────────────────────────────────────────────────────────
  # Combined Report — always runs after all jobs.
  # Writes the root-level summary table to the Actions Summary page.
  # ───────────────────────────────────────────────────────────────────────────
  report:
    name: "📋 Test Report"
    runs-on: ubuntu-latest
    needs: [web-client, console-client, node-client, docker-smoke, csharp-client, test-client, server-smoke-windows, actionlint]
    if: always()
    permissions:
      contents: read

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Download All Test Artifacts
        uses: actions/download-artifact@v8
        with:
          path: all-results/

      - name: Generate Summary Table
        env:
          WEB_RESULT:     ${{ needs.web-client.result }}
          CONSOLE_RESULT: ${{ needs.console-client.result }}
          NODE_RESULT:    ${{ needs.node-client.result }}
          DOCKER_RESULT:  ${{ needs.docker-smoke.result }}
          CS_RESULT:      ${{ needs.csharp-client.result }}
          TC_RESULT:      ${{ needs.test-client.result }}
          SS_WIN_RESULT:  ${{ needs.server-smoke-windows.result }}
          AL_RESULT:      ${{ needs.actionlint.result }}
          WEB_MYPY:       ${{ needs.web-client.outputs.mypy_result }}
          CONSOLE_MYPY:   ${{ needs.console-client.outputs.mypy_result }}
          TC_MYPY:        ${{ needs.test-client.outputs.mypy_result }}
        run: |
          python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET, json, os, glob

          # ── Parsers ──────────────────────────────────────────────────────

          def parse_junit(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      root   = ET.parse(path).getroot()
                      suites = root.findall("testsuite") if root.tag == "testsuites" else [root]
                      t = sum(int(s.get("tests",    0)) for s in suites)
                      f = sum(int(s.get("failures", 0)) + int(s.get("errors", 0)) for s in suites)
                      return t, t - f, f
                  except Exception:
                      pass
              return None, None, None

          def parse_bandit(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      with open(path) as _f:
                          r = json.load(_f).get("results", [])
                      return (
                          sum(1 for i in r if i["issue_severity"] == "HIGH"),
                          sum(1 for i in r if i["issue_severity"] == "MEDIUM"),
                      )
                  except Exception:
                      pass
              return None, None

          def parse_npm_audit(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      with open(path) as _f:
                          v = json.load(_f).get("metadata", {}).get("vulnerabilities", {})
                      return v.get("critical", 0), v.get("high", 0)
                  except Exception:
                      pass
              return None, None

          def parse_eslint_json(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      with open(path) as _f:
                          data = json.load(_f)
                      return sum(r.get("errorCount", 0) for r in data)
                  except Exception:
                      pass
              return None

          # ── Formatters ───────────────────────────────────────────────────

          def job_icon(r):
              return {"success": "✅", "failure": "❌", "cancelled": "🚫", "skipped": "⏭️"}.get(r, "⚠️")

          def fmt_tests(total, passed, failed):
              if total is None: return "—"
              return ("✅" if failed == 0 else "❌") + f" **{passed}/{total}**"

          def fmt_bandit(high, medium):
              if high is None: return "—"
              return ("✅" if high == 0 and medium == 0 else "❌") + f" H:{high} M:{medium}"

          def fmt_npm(critical, high):
              if critical is None: return "—"
              return ("✅" if critical == 0 and high == 0 else "❌") + f" C:{critical} H:{high}"

          def fmt_eslint(errors):
              if errors is None: return "—"
              return ("✅" if errors == 0 else "❌") + f" {errors} err"

          def fmt_docker(r):
              if r is None: return "—"
              return ("✅" if r == "success" else "❌") + f" `{r}`"

          def fmt_mypy(r):
              if not r or r in ("unknown", "skipped", ""): return "—"
              return "✅" if r == "success" else "❌"

          # ── Load results ─────────────────────────────────────────────────

          web_py   = parse_junit      ("all-results/results-web-client/pytest.xml")
          web_js   = parse_junit      ("all-results/results-web-client/vitest.xml")
          web_esl  = parse_eslint_json("all-results/results-web-client/eslint.json")
          web_ban  = parse_bandit     ("all-results/results-web-client/bandit.json")
          web_npm  = parse_npm_audit  ("all-results/results-web-client/npm-audit.json")

          con_py  = parse_junit      ("all-results/results-console-client/pytest.xml")
          con_ban = parse_bandit     ("all-results/results-console-client/bandit.json")

          nod_js  = parse_junit      ("all-results/results-node-client/vitest.xml")
          nod_esl = parse_eslint_json("all-results/results-node-client/eslint.json")
          nod_npm = parse_npm_audit  ("all-results/results-node-client/npm-audit.json")

          tc_ban  = parse_bandit     ("all-results/results-test-client/bandit.json")

          web_r      = os.environ.get("WEB_RESULT",      "unknown")
          con_r      = os.environ.get("CONSOLE_RESULT",  "unknown")
          nod_r      = os.environ.get("NODE_RESULT",    "unknown")
          docker_r   = os.environ.get("DOCKER_RESULT",  "unknown")
          cs_r       = os.environ.get("CS_RESULT",      "unknown")
          tc_r       = os.environ.get("TC_RESULT",      "unknown")
          ss_win_r   = os.environ.get("SS_WIN_RESULT",  "unknown")
          al_r       = os.environ.get("AL_RESULT",      "unknown")

          web_mypy = os.environ.get("WEB_MYPY",     "")
          con_mypy = os.environ.get("CONSOLE_MYPY", "")
          tc_mypy  = os.environ.get("TC_MYPY",      "")

          cs_tests = parse_junit("all-results/results-csharp-client/tests.xml")

          # ── Sanity gate ─────────────────────────────────────────────────────
          # Flag jobs that reported "success" but produced no test artifacts —
          # this can hide silent failures where pytest/vitest exited 0 without running.
          artifact_warnings = []
          def _artifact_warn(job_result, artifact_val, job_name, artifact_desc):
              if job_result == "success" and artifact_val is None:
                  artifact_warnings.append(
                      f"⚠️ **{job_name}**: reported success but `{artifact_desc}` is missing"
                  )
          _artifact_warn(web_r,    web_py[0],    "web-client",           "pytest.xml")
          _artifact_warn(web_r,    web_js[0],    "web-client",           "vitest.xml")
          _artifact_warn(con_r,    con_py[0],    "console-client",       "pytest.xml")
          _artifact_warn(nod_r,    nod_js[0],    "node-client",          "vitest.xml")
          _artifact_warn(cs_r,     cs_tests[0],  "csharp-client",        "tests.xml")
          _artifact_warn(tc_r,     tc_ban[0],    "test-client",          "bandit.json")

          overall = "✅ All Passed" if all(r == "success" for r in [web_r, con_r, nod_r, docker_r, cs_r, tc_r, ss_win_r, al_r]) else "❌ Some Failed"

          rows = [
              f"| **Release2 / IJT Web Client**           | {job_icon(web_r)} `{web_r}` | {fmt_tests(*web_py)} | {fmt_tests(*web_js)} | {fmt_eslint(web_esl)} | {fmt_bandit(*web_ban)} | {fmt_npm(*web_npm)} | {fmt_mypy(web_mypy)} | {fmt_docker(docker_r)} |",
              f"| **Release2 / IJT Console Client**       | {job_icon(con_r)} `{con_r}` | {fmt_tests(*con_py)} | — | — | {fmt_bandit(*con_ban)} | — | {fmt_mypy(con_mypy)} | — |",
              f"| **Release1 / IJT Node Client**          | {job_icon(nod_r)} `{nod_r}` | — | {fmt_tests(*nod_js)} | {fmt_eslint(nod_esl)} | — | {fmt_npm(*nod_npm)} | — | — |",
              f"| **Release2 / IJT C# Client**            | {job_icon(cs_r)} `{cs_r}` | {fmt_tests(*cs_tests)} | — | — | — | — | — | — |",
              f"| **Release2 / IJT Test Client**          | {job_icon(tc_r)} `{tc_r}` | — (collect-only) | — | — | {fmt_bandit(*tc_ban)} | — | {fmt_mypy(tc_mypy)} | — |",
              f"| **Release2 / OPC UA Server (Win)**      | {job_icon(ss_win_r)} `{ss_win_r}` | — | — | — | — | — | — | — |",
              f"| **GHA Workflow Lint (actionlint)**       | {job_icon(al_r)} `{al_r}` | — | — | — | — | — | — | — |",
          ]

          lines = [
              f"## 🏭 IJT OPC UA — CI Report &nbsp;&nbsp; {overall}",
              "",
              "| Client | Job | Python Tests | JS Tests | ESLint | Bandit | npm audit | mypy | Docker |",
              "|--------|:---:|:---:|:---:|:---:|:---:|:---:|:---:|:---:|",
              *rows,
              "",
              "---",
              "**Legend:** ✅ Pass/Clean &nbsp;·&nbsp; ❌ Fail/Issues &nbsp;·&nbsp; — Not applicable",
              "",
              "> 🔍 **Checks tab** — per-test pass/fail drill-down (dorny/test-reporter)",
              "> 📦 **Artifacts** — JUnit XML · ESLint JSON · Bandit JSON · npm audit JSON",
          ]
          if artifact_warnings:
              lines += ["", "### ⚠️ Artifact Sanity Warnings", ""] + artifact_warnings

          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout"), "a") as fh:
              fh.write("\n".join(lines) + "\n")
          print("Summary written.")
          PYEOF

  # ───────────────────────────────────────────────────────────────────────────
  # GitHub Actions Workflow Lint (actionlint)
  # ───────────────────────────────────────────────────────────────────────────
  actionlint:
    name: "GHA Workflow Lint (actionlint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install actionlint
        run: |
          curl -L -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          tar xzf actionlint.tar.gz actionlint

      - name: Run actionlint
        run: ./actionlint -color

  # ───────────────────────────────────────────────────────────────────────────
  # CodeQL Analysis — handled by the dedicated .github/workflows/codeql.yml
  # workflow (Advanced Setup). GitHub Default Setup was disabled in repo
  # Settings → Security → Code scanning to avoid duplicate SARIF uploads.
  # ───────────────────────────────────────────────────────────────────────────
