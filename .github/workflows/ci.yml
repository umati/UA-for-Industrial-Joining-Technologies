# ─────────────────────────────────────────────────────────────────────────────
# CI — IJT OPC UA Fast Test Suite
#
# TIER: ci (blocking) — must pass on every push / PR to main.
# See docs/TEST_TIERS.md for tier policy, skip budget rules, and the full list
# of known expected skips.
#
# Jobs:
#   web-client           Release2 / IJT Web Client    Python pytest · Vitest · ESLint · Bandit · npm audit
#   console-client       Release2 / IJT Console Client Python pytest · Bandit
#   node-client          Release1 / IJT Node Client   Vitest · ESLint · npm audit
#   docker-smoke         Release2 / IJT Web Client    Docker build + HTTP/WS readiness
#   test-client          Release2 / IJT Test Client   pytest unit (tests/unit/) · Bandit · Ruff · mypy
#   server-smoke-windows Release2 / OPC UA Server     Windows native smoke (10 checks)
#   csharp-unit          Release2 / IJT C# Client     dotnet build · xUnit (Category!=Live) · format · vuln
#   actionlint           GHA workflow lint             actionlint (all .github/workflows/*.yml)
#   zizmor               GHA security audit            zizmor → SARIF upload (skipped on fork PRs)
#   report               Combined summary (always runs after all jobs)
#
# Live / integration / security tests: see .github/workflows/integration.yml
#
# Standards used:
#   Python security : bandit    (pyproject.toml [tool.bandit]  ·  -c pyproject.toml)
#   JS security     : npm audit (--audit-level=high)
#   Test reports    : JUnit XML → dorny/test-reporter (Checks tab)
#   ESLint results  : JSON artifact → parsed in report job
#   Summary table   : $GITHUB_STEP_SUMMARY (Actions Summary tab)
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Opt into Node.js 24 for all actions (suppresses the Node.js 20 deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:


  # ───────────────────────────────────────────────────────────────────────────
  # Detect changed paths — used by all downstream jobs to skip when irrelevant
  # ───────────────────────────────────────────────────────────────────────────
  changes:
    name: "Detect changed paths"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      # On workflow_dispatch: steps.dispatch.outputs.* are set to 'true' (all jobs run).
      # On push/PR:           steps.filter.outputs.* are populated by dorny/paths-filter.
      # The || pattern picks whichever step ran; the other produces an empty string.
      web:        ${{ steps.dispatch.outputs.web        || steps.filter.outputs.web }}
      console:    ${{ steps.dispatch.outputs.console    || steps.filter.outputs.console }}
      node:       ${{ steps.dispatch.outputs.node       || steps.filter.outputs.node }}
      docker:     ${{ steps.dispatch.outputs.docker     || steps.filter.outputs.docker }}
      testclient: ${{ steps.dispatch.outputs.testclient || steps.filter.outputs.testclient }}
      csharp:     ${{ steps.dispatch.outputs.csharp     || steps.filter.outputs.csharp }}
      server:     ${{ steps.dispatch.outputs.server     || steps.filter.outputs.server }}
      workflows:  ${{ steps.dispatch.outputs.workflows  || steps.filter.outputs.workflows }}
    steps:
      # workflow_dispatch has no 'before' SHA — skip dorny/paths-filter (it can't diff without one)
      # and explicitly signal that every job should run.
      - name: "All jobs enabled (workflow_dispatch)"
        if: github.event_name == 'workflow_dispatch'
        id: dispatch
        run: |
          {
            echo "web=true"
            echo "console=true"
            echo "node=true"
            echo "docker=true"
            echo "testclient=true"
            echo "csharp=true"
            echo "server=true"
            echo "workflows=true"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        if: github.event_name != 'workflow_dispatch'
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4
        if: github.event_name != 'workflow_dispatch'
        id: filter
        with:
          filters: |
            web:
              - 'OPC_UA_Clients/Release2/IJT_Web_Client/**'
              - '.github/workflows/ci.yml'
            console:
              - 'OPC_UA_Clients/Release2/IJT_Console_Client/**'
              - '.github/workflows/ci.yml'
            node:
              - 'OPC_UA_Clients/Release1/IJT_Node_Client/**'
              - '.github/workflows/ci.yml'
            docker:
              - 'OPC_UA_Clients/Release2/IJT_Web_Client/Dockerfile'
              - 'OPC_UA_Clients/Release2/IJT_Web_Client/**'
              - '.github/workflows/ci.yml'
            testclient:
              - 'OPC_UA_Clients/Release2/IJT_Test_Client/**'
              - '.github/workflows/ci.yml'
            csharp:
              - 'OPC_UA_Clients/Release2/IJT_CSharp_Client/**'
              - '.github/workflows/ci.yml'
            server:
              - 'OPC_UA_Servers/**'
              - '.github/workflows/ci.yml'
            workflows:
              - '.github/workflows/**'

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Web Client
  #   Python: pytest + bandit (pyproject.toml)
  #   JS:     vitest + eslint (JSON) + npm audit
  # ───────────────────────────────────────────────────────────────────────────
  web-client:
    name: "Release2 / IJT Web Client"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
    outputs:
      mypy_result:   ${{ steps.mypy.outcome }}      # zizmor: ignore[template-injection]
      ruff_result:   ${{ steps.pylint.outcome }}    # zizmor: ignore[template-injection]
      eslint_result: ${{ steps.eslint.outcome }}    # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Web_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: OPC_UA_Clients/Release2/IJT_Web_Client/package-lock.json

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install JS Dependencies
        run: npm ci

      - name: Python Unit Tests
        id: pytest
        continue-on-error: true
        run: |
          mkdir -p "$(pwd)/test-results"
          python -m pytest tests/python/unit -q \
            --rootdir=. \
            --junitxml="$(pwd)/test-results/pytest.xml" \
            --cov=. \
            --cov-report=xml:"$(pwd)/test-results/coverage.xml" \
            --cov-report=term-missing

      - name: JS Unit Tests
        id: vitest
        continue-on-error: true
        run: npx vitest run --coverage --reporter=verbose --reporter=junit --outputFile.junit=test-results/vitest.xml

      - name: ESLint
        id: eslint
        continue-on-error: true
        run: npx eslint src/javascripts --format json --output-file test-results/eslint.json

      - name: Bandit (Python Security)
        id: bandit
        continue-on-error: true
        run: python -m bandit -r . -c pyproject.toml --severity-level medium -f json -o test-results/bandit.json

      - name: Ruff (Python Linting)
        id: pylint
        continue-on-error: true
        run: python -m ruff check . --output-format=github

      - name: mypy (Type Checking)
        id: mypy
        continue-on-error: true
        run: python -m mypy . --ignore-missing-imports --no-error-summary

      - name: npm Audit (JS Security)
        id: npm_audit
        continue-on-error: true
        run: npm audit --audit-level=high --json > test-results/npm-audit.json

      - name: "Publish Test Reports — Python"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — Python Tests"
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/pytest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Publish Test Reports — JS"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — JS Tests (Vitest)"
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/vitest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-web-client
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/
          retention-days: 14

      - name: Fail if Any Check Failed
        if: always() && (
          steps.pytest.outcome    == 'failure' ||
          steps.vitest.outcome    == 'failure' ||
          steps.eslint.outcome    == 'failure' ||
          steps.bandit.outcome    == 'failure' ||
          steps.pylint.outcome    == 'failure' ||
          steps.mypy.outcome      == 'failure' ||
          steps.npm_audit.outcome == 'failure')
        env:
          PYTEST_OUTCOME:    ${{ steps.pytest.outcome }}
          VITEST_OUTCOME:    ${{ steps.vitest.outcome }}
          ESLINT_OUTCOME:    ${{ steps.eslint.outcome }}
          BANDIT_OUTCOME:    ${{ steps.bandit.outcome }}
          PYLINT_OUTCOME:    ${{ steps.pylint.outcome }}
          MYPY_OUTCOME:      ${{ steps.mypy.outcome }}
          NPM_AUDIT_OUTCOME: ${{ steps.npm_audit.outcome }}
        run: |
          echo "One or more checks failed:"
          echo "  pytest     -> $PYTEST_OUTCOME"
          echo "  vitest     -> $VITEST_OUTCOME"
          echo "  eslint     -> $ESLINT_OUTCOME"
          echo "  bandit     -> $BANDIT_OUTCOME"
          echo "  ruff       -> $PYLINT_OUTCOME"
          echo "  mypy       -> $MYPY_OUTCOME"
          echo "  npm audit  -> $NPM_AUDIT_OUTCOME"
          exit 1


  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Console Client
  #   Python: pytest + bandit (pyproject.toml)
  # ───────────────────────────────────────────────────────────────────────────
  console-client:
    name: "Release2 / IJT Console Client"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.console == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    outputs:
      mypy_result: ${{ steps.mypy.outcome }}   # zizmor: ignore[template-injection]
      ruff_result: ${{ steps.pylint.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Console_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            OPC_UA_Clients/Release2/IJT_Console_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Console_Client/requirements-dev.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - run: mkdir -p test-results

      - name: Python Unit Tests
        id: pytest
        continue-on-error: true
        run: |
          python -m pytest tests/unit/ -q \
            --junitxml=test-results/pytest.xml \
            --cov=. \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term-missing

      - name: Bandit (Python Security)
        id: bandit
        continue-on-error: true
        run: python -m bandit -r . -c pyproject.toml --severity-level medium -f json -o test-results/bandit.json

      - name: Ruff (Python Linting)
        id: pylint
        continue-on-error: true
        run: python -m ruff check . --output-format=github

      - name: mypy (Type Checking)
        id: mypy
        continue-on-error: true
        run: python -m mypy . --ignore-missing-imports --no-error-summary

      - name: Publish Test Reports
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        with:
          name: "Console Client — Tests"
          path: OPC_UA_Clients/Release2/IJT_Console_Client/test-results/pytest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-console-client
          path: OPC_UA_Clients/Release2/IJT_Console_Client/test-results/
          retention-days: 14

      - name: Fail if Any Check Failed
        if: always() && (
          steps.pytest.outcome == 'failure' ||
          steps.bandit.outcome == 'failure' ||
          steps.pylint.outcome == 'failure' ||
          steps.mypy.outcome   == 'failure')
        env:
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
          PYLINT_OUTCOME: ${{ steps.pylint.outcome }}
          MYPY_OUTCOME:   ${{ steps.mypy.outcome }}
        run: |
          echo "One or more checks failed:"
          echo "  pytest  -> $PYTEST_OUTCOME"
          echo "  bandit  -> $BANDIT_OUTCOME"
          echo "  ruff    -> $PYLINT_OUTCOME"
          echo "  mypy    -> $MYPY_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Release1 / IJT Node Client
  #   JS: vitest + eslint (JSON) + npm audit
  # ───────────────────────────────────────────────────────────────────────────
  node-client:
    name: "Release1 / IJT Node Client"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.node == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    outputs:
      eslint_result: ${{ steps.eslint.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release1/IJT_Node_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: OPC_UA_Clients/Release1/IJT_Node_Client/package-lock.json

      - name: Install JS Dependencies
        run: npm ci

      - run: mkdir -p test-results

      - name: JS Unit Tests
        id: vitest
        continue-on-error: true
        run: npx vitest run --coverage --reporter=verbose --reporter=junit --outputFile.junit=test-results/vitest.xml

      - name: ESLint
        id: eslint
        continue-on-error: true
        run: npx eslint javascripts/ --format json --output-file test-results/eslint.json

      - name: npm Audit (JS Security)
        id: npm_audit
        continue-on-error: true
        run: npm audit --audit-level=high --json > test-results/npm-audit.json

      - name: Publish Test Reports
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        with:
          name: "Node Client — Tests"
          path: OPC_UA_Clients/Release1/IJT_Node_Client/test-results/vitest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-node-client
          path: OPC_UA_Clients/Release1/IJT_Node_Client/test-results/
          retention-days: 14

      - name: Fail if Any Check Failed
        if: always() && (
          steps.vitest.outcome    == 'failure' ||
          steps.eslint.outcome    == 'failure' ||
          steps.npm_audit.outcome == 'failure')
        env:
          VITEST_OUTCOME:    ${{ steps.vitest.outcome }}
          ESLINT_OUTCOME:    ${{ steps.eslint.outcome }}
          NPM_AUDIT_OUTCOME: ${{ steps.npm_audit.outcome }}
        run: |
          echo "One or more checks failed:"
          echo "  vitest     -> $VITEST_OUTCOME"
          echo "  eslint     -> $ESLINT_OUTCOME"
          echo "  npm audit  -> $NPM_AUDIT_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Web Client — Docker Smoke
  # Builds the image, starts the Compose stack, verifies HTTP + WebSocket.
  # ───────────────────────────────────────────────────────────────────────────
  docker-smoke:
    name: "Release2 / IJT Web Client — Docker Smoke"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.docker == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Web_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build Docker Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: OPC_UA_Clients/Release2/IJT_Web_Client
          tags: ijt_web_client:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Compose Stack
        run: docker compose up -d --no-build

      - name: Wait for HTTP Readiness
        shell: bash
        run: |
          set -euo pipefail
          for _i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              echo "HTTP endpoint is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for http://127.0.0.1:3000"
          docker ps
          docker logs ijt_web_client || true
          exit 1

      - name: Verify WebSocket Port
        shell: bash
        run: |
          timeout 30 bash -c \
            'until (echo > /dev/tcp/127.0.0.1/8001) >/dev/null 2>&1; do sleep 1; done'

      - name: Show Container Status
        if: always()
        run: docker ps --filter name=ijt_web_client

      - name: Show Recent Logs
        if: always()
        run: docker logs --tail 120 ijt_web_client

      - name: Teardown Compose Stack
        if: always()
        run: docker compose down -v

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT C# Client
  #   dotnet build (warnaserror) + dotnet test (xUnit) + format check + vuln scan
  # ───────────────────────────────────────────────────────────────────────────
  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT C# Client — Unit Tests (no server required)
  #   dotnet build + xUnit (Category!=Live) + format check + vuln scan
  # ───────────────────────────────────────────────────────────────────────────
  csharp-unit:
    name: "Release2 / IJT C# Client — Unit Tests"
    runs-on: windows-latest
    needs: [changes]
    # Runs when C# client paths or ci.yml changed (push or PR), or on manual dispatch.
    # Nightly integration covers cross-component regressions.
    if: needs.changes.outputs.csharp == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
    outputs:
      build_result:  ${{ steps.build.outcome }}     # zizmor: ignore[template-injection]
      format_result: ${{ steps.format.outcome }}    # zizmor: ignore[template-injection]
      vuln_result:   ${{ steps.vuln_scan.outcome }} # zizmor: ignore[template-injection]
      coverage_pct:  ${{ steps.coverage.outputs.pct }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_CSharp_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: '10.x'

      - name: Prepare C# test-result artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          '<?xml version="1.0"?><testsuites tests="0" failures="0"><testsuite name="IJT_CSharp_Client.Tests.Unit" tests="0"/></testsuites>' | Out-File test-results\tests.xml -Encoding UTF8
          New-Item -ItemType File -Force -Path test-results\vuln-scan.txt | Out-Null

      - name: Cache NuGet Packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore NuGet Packages
        run: |
          $target = "Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj"
          $lockFiles = Get-ChildItem -Path . -Recurse -Filter "packages.lock.json" -File -ErrorAction SilentlyContinue
          if ($lockFiles.Count -gt 0) {
            Write-Host "Lock files detected — using locked mode restore."
            dotnet restore $target --locked-mode
          } else {
            Write-Host "No lock files yet — using normal restore."
            dotnet restore $target
          }

      - name: Vulnerable Package Scan
        id: vuln_scan
        continue-on-error: true
        run: |
          $output = dotnet list Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj package --vulnerable --include-transitive 2>&1
          $output | Out-File test-results\vuln-scan.txt
          Write-Host $output
          if ($output -match "has the following vulnerable packages") {
            Write-Host "##[error]Vulnerable NuGet packages detected — see vuln-scan.txt"
            exit 1
          }

      - name: Build (zero warnings)
        id: build
        continue-on-error: true
        run: dotnet build Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj --no-restore -warnaserror --configuration Release

      - name: Run xUnit Unit Tests
        id: tests
        if: steps.build.outcome == 'success'
        continue-on-error: true
        env:
          IJT_PHASE1_ONLY: 'true'
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          New-Item -ItemType Directory -Force -Path test-results\coverage | Out-Null
          dotnet test Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj `
            --no-build `
            --no-restore `
            --configuration Release `
            --filter "Category!=Live" `
            --logger "trx;LogFileName=tests.trx" `
            --logger "console;verbosity=normal" `
            --results-directory test-results `
            --collect:"XPlat Code Coverage" `
            --settings coverlet.runsettings `
            --blame-hang --blame-hang-timeout 60s

      - name: Collect Coverage Report
        id: coverage
        if: always()
        shell: pwsh
        working-directory: OPC_UA_Clients/Release2/IJT_CSharp_Client
        run: |
          # Coverlet writes to test-results/<GUID>/coverage.cobertura.xml — copy to canonical path.
          $covXml = Get-ChildItem test-results -Recurse -Filter "coverage.cobertura.xml" | Select-Object -First 1
          if ($covXml) {
            Copy-Item $covXml.FullName test-results\coverage\cobertura.xml -Force
            [xml]$cov = Get-Content test-results\coverage\cobertura.xml
            $pct = [math]::Round([double]$cov.coverage.'line-rate' * 100, 1)
            Write-Host "C# line coverage: $pct%"
            "pct=$pct" | Out-File $Env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "Coverage XML not generated (tests may have failed or --collect flag not picked up)"
            "pct=" | Out-File $Env:GITHUB_OUTPUT -Append
          }

      - name: Format Check
        id: format
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: dotnet format IJT_CSharp_Client.sln --verify-no-changes --no-restore 2>&1

      - name: Convert TRX to JUnit XML
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          $trx   = "test-results\tests.trx"
          $junit = "test-results\tests.xml"
          if (Test-Path $trx) {
            [xml]$x = Get-Content $trx
            $ns = @{ t = "http://microsoft.com/schemas/VisualStudio/TeamTest/2010" }
            $results = Select-Xml -Xml $x -XPath "//t:UnitTestResult" -Namespace $ns | Select-Object -ExpandProperty Node
            $passed  = ($results | Where-Object { $_.outcome -eq "Passed"  }).Count
            $failed  = ($results | Where-Object { $_.outcome -eq "Failed"  }).Count
            $skipped = ($results | Where-Object { $_.outcome -eq "NotExecuted" }).Count
            $total   = $results.Count
            $xml  = '<?xml version="1.0" encoding="UTF-8"?>' + "`n"
            $xml += "<testsuites tests=`"$total`" failures=`"$failed`" skipped=`"$skipped`">`n"
            $xml += "  <testsuite name=`"IJT_CSharp_Client.Tests.Unit`" tests=`"$total`" failures=`"$failed`" skipped=`"$skipped`">`n"
            foreach ($r in $results) {
              $name = [System.Security.SecurityElement]::Escape($r.testName)
              $outcome = $r.outcome
              if ($outcome -eq "Passed") {
                $xml += "    <testcase name=`"$name`" classname=`"IJT`" />`n"
              } elseif ($outcome -eq "NotExecuted") {
                $msgRaw = ([string]$r.Output.ErrorInfo.Message).Trim()
                if ([string]::IsNullOrWhiteSpace($msgRaw)) { $msgRaw = "Test skipped by xUnit" }
                $msg = [System.Security.SecurityElement]::Escape($msgRaw)
                $xml += "    <testcase name=`"$name`" classname=`"IJT`"><skipped message=`"$msg`">$msg</skipped></testcase>`n"
              } else {
                $msg = [System.Security.SecurityElement]::Escape($r.Output.ErrorInfo.Message)
                $xml += "    <testcase name=`"$name`" classname=`"IJT`"><failure>$msg</failure></testcase>`n"
              }
            }
            $xml += "  </testsuite>`n</testsuites>"
            $xml | Out-File $junit -Encoding UTF8
            Write-Host "Converted TRX → JUnit: $total tests, $failed failures, $skipped skipped"
          } else {
            Write-Host "No TRX file found — creating empty JUnit"
            '<?xml version="1.0"?><testsuites tests="0" failures="0"><testsuite name="IJT_CSharp_Client.Tests.Unit" tests="0"/></testsuites>' | Out-File $junit -Encoding UTF8
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-csharp-unit
          path: OPC_UA_Clients/Release2/IJT_CSharp_Client/test-results/
          retention-days: 14

      - name: Fail if Any Check Failed
        if: always() && (
          steps.build.outcome     == 'failure' ||
          steps.tests.outcome     == 'failure' ||
          steps.format.outcome    == 'failure' ||
          steps.vuln_scan.outcome == 'failure')
        env:
          BUILD_OUTCOME:     ${{ steps.build.outcome }}
          TESTS_OUTCOME:     ${{ steps.tests.outcome }}
          FORMAT_OUTCOME:    ${{ steps.format.outcome }}
          VULN_SCAN_OUTCOME: ${{ steps.vuln_scan.outcome }}
        run: |
          echo "One or more C# unit checks failed:"
          echo "  build     -> $BUILD_OUTCOME"
          echo "  tests     -> $TESTS_OUTCOME"
          echo "  format    -> $FORMAT_OUTCOME"
          echo "  vuln scan -> $VULN_SCAN_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Test Client
  #   Python: pytest unit tests (tests/unit/ — no server) + bandit + ruff + mypy
  # ───────────────────────────────────────────────────────────────────────────
  test-client:
    name: "Release2 / IJT Test Client"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.testclient == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    outputs:
      mypy_result: ${{ steps.mypy.outcome }}   # zizmor: ignore[template-injection]
      ruff_result: ${{ steps.pylint.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Test_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            OPC_UA_Clients/Release2/IJT_Test_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Test_Client/requirements-dev.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - run: mkdir -p test-results

      - name: Run Unit Tests
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/unit/ -v \
            --junitxml=test-results/pytest.xml \
            --cov=helpers \
            --cov-report=xml:test-results/coverage.xml \
            --cov-fail-under=90 \
            2>&1 | tee test-results/pytest-output.txt

      - name: Bandit (Python Security)
        id: bandit
        continue-on-error: true
        run: python -m bandit -r . -c pyproject.toml --severity-level medium -f json -o test-results/bandit.json

      - name: Ruff (Python Linting)
        id: pylint
        continue-on-error: true
        run: python -m ruff check . --output-format=github

      - name: mypy (Type Checking)
        id: mypy
        continue-on-error: true
        run: python -m mypy . --ignore-missing-imports --no-error-summary

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-test-client
          path: OPC_UA_Clients/Release2/IJT_Test_Client/test-results/
          retention-days: 14

      - name: Fail if Any Check Failed
        if: always() && (
          steps.pytest.outcome == 'failure' ||
          steps.bandit.outcome == 'failure' ||
          steps.pylint.outcome == 'failure' ||
          steps.mypy.outcome   == 'failure')
        env:
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
          PYLINT_OUTCOME: ${{ steps.pylint.outcome }}
          MYPY_OUTCOME:   ${{ steps.mypy.outcome }}
        run: |
          echo "One or more checks failed:"
          echo "  pytest  -> $PYTEST_OUTCOME"
          echo "  bandit  -> $BANDIT_OUTCOME"
          echo "  ruff    -> $PYLINT_OUTCOME"
          echo "  mypy    -> $MYPY_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # OPC UA Server — Windows Smoke
  #   Extract OPC_UA_IJT_Server_Simulator.zip, launch the EXE directly,
  #   wait for TCP 40451, run all 10 smoke checks, kill the process.
  #
  # The server auto-creates its PKI directory (certificates) on first launch —
  # no pre-seeded certificates are needed.
  # ───────────────────────────────────────────────────────────────────────────

  server-smoke-windows:
    name: "Release2 / OPC UA Server — Windows Smoke"
    runs-on: windows-latest
    needs: [changes]
    if: needs.changes.outputs.server == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract server ZIP
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force
          Write-Host "Extracted ZIP contents:"
          Get-ChildItem "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" | Select-Object Name

      - name: Start OPC UA Server (background)
        run: |
          $proc = Start-Process `
            -FilePath "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\opcua_ijt_demo_application.exe" `
            -WorkingDirectory "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" `
            -PassThru -WindowStyle Hidden
          Write-Host "Server PID: $($proc.Id)"
          echo "SERVER_PID=$($proc.Id)" >> $env:GITHUB_ENV

      - name: Wait for OPC UA port 40451
        run: |
          $timeout = 60
          $start   = Get-Date
          while (((Get-Date) - $start).TotalSeconds -lt $timeout) {
            if (Test-NetConnection -ComputerName localhost -Port 40451 `
                  -InformationLevel Quiet -WarningAction SilentlyContinue) {
              Write-Host "Port 40451 is open"
              exit 0
            }
            Write-Host "Waiting for server..."
            Start-Sleep -Seconds 3
          }
          Write-Host "ERROR: Timeout waiting for port 40451"
          exit 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install smoke test dependencies
        run: pip install -r OPC_UA_Servers/Release2/tests/requirements.txt

      - name: Run smoke test (10 checks)
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          python OPC_UA_Servers/Release2/tests/smoke_test.py `
            --tcp-timeout 30 `
            --junitxml test-results/smoke.xml

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-server-smoke
          path: test-results/smoke.xml
          retention-days: 14

      - name: Stop OPC UA Server
        if: always()
        run: |
          if ($env:SERVER_PID) {
            Stop-Process -Id $env:SERVER_PID -Force -ErrorAction SilentlyContinue
            Write-Host "OPC UA server stopped"
          }

  # ───────────────────────────────────────────────────────────────────────────
  # Combined Report — always runs after all jobs.
  # Writes the root-level summary table to the Actions Summary page.
  # ───────────────────────────────────────────────────────────────────────────
  report:
    name: "📋 Test Report"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, web-client, console-client, node-client, docker-smoke, csharp-unit, test-client, server-smoke-windows, actionlint, zizmor]
    if: always()
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Download All Test Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: all-results/

      - name: "Report — Web Client Python Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — Python Tests"
          path: all-results/results-web-client/pytest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Web Client JS Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — JS Tests (Vitest)"
          path: all-results/results-web-client/vitest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Console Client Python Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always() && needs.console-client.result != 'skipped'
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Console Client — Python Tests"
          path: all-results/results-console-client/pytest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Node Client JS Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always() && needs.node-client.result != 'skipped'
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Node Client — JS Tests (Vitest)"
          path: all-results/results-node-client/vitest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Test Client Python Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Test Client — Python Tests (Unit)"
          path: all-results/results-test-client/pytest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — C# Client Unit Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "C# Client — Unit Tests (xUnit)"
          path: all-results/results-csharp-unit/tests.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — OPC UA Server Smoke (Windows)"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always() && needs.server-smoke-windows.result != 'skipped'
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "OPC UA Server — Smoke Tests (Windows)"
          path: all-results/results-server-smoke/smoke.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Generate Summary Table
        env:
          # ── Job-level results ──────────────────────────────────
          WEB_RESULT:      ${{ needs.web-client.result }}
          CONSOLE_RESULT:  ${{ needs.console-client.result }}
          NODE_RESULT:     ${{ needs.node-client.result }}
          DOCKER_RESULT:   ${{ needs.docker-smoke.result }}
          CS_UNIT_RESULT:  ${{ needs.csharp-unit.result }}
          TC_RESULT:       ${{ needs.test-client.result }}
          SS_WIN_RESULT:   ${{ needs.server-smoke-windows.result }}
          AL_RESULT:       ${{ needs.actionlint.result }}
          ZZ_RESULT:       ${{ needs.zizmor.result }}
          # ── Per-tool step outcomes ─────────────────────────────
          WEB_RUFF:        ${{ needs.web-client.outputs.ruff_result }}
          WEB_ESLINT:      ${{ needs.web-client.outputs.eslint_result }}
          WEB_MYPY:        ${{ needs.web-client.outputs.mypy_result }}
          CONSOLE_RUFF:    ${{ needs.console-client.outputs.ruff_result }}
          CONSOLE_MYPY:    ${{ needs.console-client.outputs.mypy_result }}
          NODE_ESLINT:     ${{ needs.node-client.outputs.eslint_result }}
          CS_BUILD:        ${{ needs.csharp-unit.outputs.build_result }}
          CS_FORMAT:       ${{ needs.csharp-unit.outputs.format_result }}
          CS_VULN:         ${{ needs.csharp-unit.outputs.vuln_result }}
          TC_RUFF:         ${{ needs.test-client.outputs.ruff_result }}
          TC_MYPY:         ${{ needs.test-client.outputs.mypy_result }}
          # ── Commit context ─────────────────────────────────────
          GH_SHA:          ${{ github.sha }}
          GH_BRANCH:       ${{ github.ref_name }}
          GH_RUN_NUMBER:   ${{ github.run_number }}
          GH_RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET, json, os, glob
          from collections import Counter

          # ── Parsers ──────────────────────────────────────────────────────────

          def iter_suites(root):
              """Return all testsuite nodes for both bare and nested JUnit XML."""
              return [root] if root.tag == "testsuite" else root.findall(".//testsuite")

          def parse_junit(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      root   = ET.parse(path).getroot()
                      suites = iter_suites(root)
                      t  = sum(int(s.get("tests",    0)) for s in suites)
                      f  = sum(int(s.get("failures", 0)) + int(s.get("errors", 0)) for s in suites)
                      sk = sum(int(s.get("skipped",  0)) for s in suites)
                      return t, t - f - sk, f, sk
                  except Exception as exc:
                      print(f"[WARN] parse_junit({path}): {exc}")
              return None, None, None, None

          def collect_skips(pattern):
              """Extract skipped test names and reasons from JUnit XML."""
              skips_list = []
              for path in glob.glob(pattern, recursive=True):
                  try:
                      root = ET.parse(path).getroot()
                      for tc in root.findall(".//testcase"):
                          el = tc.find("skipped")
                          if el is not None:
                              name = tc.get("name", "unknown")
                              msg = (el.get("message") or el.text or "").split("\n")[0][:200]
                              skips_list.append((name, msg or "no reason given"))
                  except Exception as exc:
                      print(f"[WARN] collect_skips({path}): {exc}")
              return skips_list

          def md_cell(value):
              """Escape text for a GitHub markdown table cell."""
              text = str(value or "").replace("\r", " ").replace("\n", " ")
              return text.replace("|", "\\|").replace("<", "&lt;").replace(">", "&gt;")

          def format_skip_section(label, skips_list, skip_count=None):
              """Collapsible markdown section with skip reasons grouped by count."""
              reported_count = skip_count if skip_count is not None else len(skips_list)
              if reported_count is not None:
                  reported_count = max(reported_count, len(skips_list))
              if not skips_list and (reported_count is None or reported_count <= 0):
                  return []
              reasons = Counter(msg for _, msg in skips_list)
              if reported_count is not None and reported_count > len(skips_list):
                  reasons["Skip details unavailable in JUnit XML"] += reported_count - len(skips_list)
              lines = [
                  "",
                  f"<details><summary>⏭️ <b>{label}</b> — {reported_count} skipped</summary>",
                  "",
                  "| Reason | Count |",
                  "|:-------|------:|",
              ]
              for reason, count in reasons.most_common():
                  lines.append(f"| {md_cell(reason)} | {count} |")
              lines += ["", "</details>"]
              return lines

          def parse_coverage(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      rate = ET.parse(path).getroot().get("line-rate")
                      if rate is not None:
                          return round(float(rate) * 100, 1)
                  except Exception:
                      pass
              return None

          def parse_bandit(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      with open(path) as _f:
                          r = json.load(_f).get("results", [])
                      return (sum(1 for i in r if i["issue_severity"] == "HIGH"),
                              sum(1 for i in r if i["issue_severity"] == "MEDIUM"))
                  except Exception:
                      pass
              return None, None

          def parse_npm_audit(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      with open(path) as _f:
                          v = json.load(_f).get("metadata", {}).get("vulnerabilities", {})
                      return v.get("critical", 0), v.get("high", 0)
                  except Exception:
                      pass
              return None, None

          def parse_eslint(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      with open(path) as _f:
                          data = json.load(_f)
                      return (sum(r.get("errorCount",   0) for r in data),
                              sum(r.get("warningCount", 0) for r in data))
                  except Exception:
                      pass
              return None, None

          # ── Formatters ───────────────────────────────────────────────────────

          def job_icon(r):
              return {"success": "✅", "failure": "❌", "cancelled": "🚫", "skipped": "⏭️"}.get(r, "⚠️")

          def tests(total, passed, failed, skipped=0):
              if total is None:
                  return "—"
              if failed == 0:
                  return f"✅ {total:,}"
              return f"❌ {passed:,} / {total:,}"

          def skips(sk):
              return "—" if sk is None else str(sk)

          def cov(pct):
              if pct is None:
                  return "—"
              icon = "✅" if pct >= 90 else ("⚠️" if pct >= 70 else "❌")
              return f"{pct:.0f}% {icon}"

          def tool(r, label):
              if not r or r in ("", "unknown"):
                  return "—"
              icon = {"success": "✅", "failure": "❌", "cancelled": "🚫", "skipped": "⏭️"}.get(r, "⚠️")
              return f"{label} {icon}"

          def bandit_fmt(high, medium):
              if high is None:
                  return "—"
              if high == 0 and medium == 0:
                  return "✅ No issues"
              return f"❌ {high} high, {medium} medium"

          def npm_fmt(crit, high):
              if crit is None:
                  return "—"
              if crit == 0 and high == 0:
                  return "✅ No issues"
              return f"❌ {crit} critical, {high} high"

          def eslint_fmt(step_r, esl_tuple):
              errors, warnings = esl_tuple
              warn_count = warnings or 0
              if errors is not None:
                  if errors == 0 and warn_count == 0:
                      return "eslint ✅"
                  if errors == 0:
                      return f"eslint ⚠️ ({warn_count} warnings)"
                  return f"eslint ❌ ({errors} errors, {warn_count} warnings)"
              return tool(step_r, "eslint")

          def lint(*items):
              parts = [p for p in items if p != "—"]
              return " · ".join(parts) or "—"

          # ── Load ENV ─────────────────────────────────────────────────────────

          E = os.environ.get

          web_r    = E("WEB_RESULT",     "unknown")
          con_r    = E("CONSOLE_RESULT", "unknown")
          nod_r    = E("NODE_RESULT",    "unknown")
          dck_r    = E("DOCKER_RESULT",  "unknown")
          cs_u_r   = E("CS_UNIT_RESULT", "unknown")
          tc_r     = E("TC_RESULT",      "unknown")
          ss_r     = E("SS_WIN_RESULT",  "unknown")
          al_r     = E("AL_RESULT",      "unknown")
          zz_r     = E("ZZ_RESULT",      "unknown")

          web_ruff   = E("WEB_RUFF",    "")
          web_eslint = E("WEB_ESLINT",  "")
          web_mypy   = E("WEB_MYPY",    "")
          con_ruff   = E("CONSOLE_RUFF","")
          con_mypy   = E("CONSOLE_MYPY","")
          nod_eslint = E("NODE_ESLINT", "")
          cs_build   = E("CS_BUILD",    "")
          cs_format  = E("CS_FORMAT",   "")
          cs_vuln    = E("CS_VULN",     "")
          tc_ruff    = E("TC_RUFF",     "")
          tc_mypy    = E("TC_MYPY",     "")

          sha      = (E("GH_SHA",        "") or "")[:8]
          branch   = E("GH_BRANCH",      "main")
          run_num  = E("GH_RUN_NUMBER",  "")
          run_url  = E("GH_RUN_URL",     "")

          # ── Parse artifacts ──────────────────────────────────────────────────

          web_py_t = parse_junit("all-results/results-web-client/pytest.xml")
          web_js_t = parse_junit("all-results/results-web-client/vitest.xml")
          web_esl  = parse_eslint("all-results/results-web-client/eslint.json")
          web_ban  = parse_bandit("all-results/results-web-client/bandit.json")
          web_npm  = parse_npm_audit("all-results/results-web-client/npm-audit.json")
          web_cov  = parse_coverage("all-results/results-web-client/coverage.xml")
          web_js_cov = parse_coverage("all-results/results-web-client/coverage/cobertura-coverage.xml")

          con_py_t = parse_junit("all-results/results-console-client/pytest.xml")
          con_ban  = parse_bandit("all-results/results-console-client/bandit.json")
          con_cov  = parse_coverage("all-results/results-console-client/coverage.xml")

          nod_js_t = parse_junit("all-results/results-node-client/vitest.xml")
          nod_esl  = parse_eslint("all-results/results-node-client/eslint.json")
          nod_npm  = parse_npm_audit("all-results/results-node-client/npm-audit.json")

          cs_unit_t = parse_junit("all-results/results-csharp-unit/tests.xml")
          cs_cov    = parse_coverage("all-results/results-csharp-unit/coverage/cobertura.xml")

          tc_py_t  = parse_junit("all-results/results-test-client/pytest.xml")
          tc_ban   = parse_bandit("all-results/results-test-client/bandit.json")
          tc_cov   = parse_coverage("all-results/results-test-client/coverage.xml")

          nod_cov  = parse_coverage("all-results/results-node-client/coverage/cobertura-coverage.xml")

          ss_smoke = parse_junit("all-results/results-server-smoke/smoke.xml")

          # ── Collect skip details from JUnit XML ──────────────────────────

          web_py_skips = collect_skips("all-results/results-web-client/pytest.xml")
          web_js_skips = collect_skips("all-results/results-web-client/vitest.xml")
          con_py_skips = collect_skips("all-results/results-console-client/pytest.xml")
          nod_js_skips = collect_skips("all-results/results-node-client/vitest.xml")
          cs_unit_skips = collect_skips("all-results/results-csharp-unit/tests.xml")
          tc_py_skips  = collect_skips("all-results/results-test-client/pytest.xml")
          ss_smoke_skips = collect_skips("all-results/results-server-smoke/smoke.xml")

          # ── Artifact sanity gate ─────────────────────────────────────────────

          artifact_warnings = []
          def _warn(job_result, val, job_name, artifact):
              if job_result == "success" and val is None:
                  artifact_warnings.append(
                      f"⚠️ **{job_name}**: job succeeded but `{artifact}` not found — possible silent failure"
                  )
          _warn(web_r,  web_py_t[0], "web-client",           "pytest.xml")
          _warn(web_r,  web_js_t[0], "web-client",           "vitest.xml")
          _warn(web_r,  web_js_cov,  "web-client",           "coverage/cobertura-coverage.xml")
          _warn(con_r,  con_py_t[0], "console-client",       "pytest.xml")
          _warn(nod_r,  nod_js_t[0], "node-client",          "vitest.xml")
          _warn(cs_u_r, cs_unit_t[0],"csharp-unit",          "tests.xml")
          _warn(cs_u_r, cs_cov,      "csharp-unit",          "coverage/cobertura.xml")
          _warn(tc_r,   tc_py_t[0],  "test-client",          "pytest.xml")
          _warn(tc_r,   tc_ban[0],   "test-client",          "bandit.json")
          _warn(tc_r,   tc_cov,      "test-client",          "coverage.xml")
          _warn(ss_r,   ss_smoke[0], "server-smoke-windows", "smoke.xml")

          # ── Overall status ────────────────────────────────────────────────────

          all_jobs = [web_r, con_r, nod_r, dck_r, cs_u_r, tc_r, ss_r, al_r, zz_r]
          n_pass  = sum(1 for r in all_jobs if r == "success")
          n_fail  = sum(1 for r in all_jobs if r == "failure")
          n_total = len(all_jobs)

          if n_fail == 0:
              status_icon = "✅"
              status_msg  = f"All {n_pass} / {n_total} jobs passed"
          else:
              status_icon = "❌"
              status_msg  = f"{n_fail} / {n_total} jobs failed  ·  {n_pass} passed"

          suites   = [web_py_t, web_js_t, con_py_t, nod_js_t, cs_unit_t, tc_py_t, ss_smoke]
          total_t  = sum(s[0] for s in suites if s[0] is not None)
          total_f  = sum(s[2] for s in suites if s[2] is not None)
          total_sk = sum(s[3] for s in suites if s[3] is not None)

          if total_t > 0:
              totals = f"{total_t:,} tests  ·  {total_f} failed  ·  {total_sk} skipped"
          else:
              totals = "no test data"

          run_link = f"[#{run_num}]({run_url})" if run_url else f"#{run_num}"
          sha_str  = f"`{sha}`" if sha else "—"

          # ── Build report ──────────────────────────────────────────────────────

          out = [
              "## IJT OPC UA — CI",
              "",
              f"> {status_icon} **{status_msg}** &nbsp;·&nbsp; {totals}",
              f"> **Branch:** `{branch}` &nbsp;·&nbsp; **Commit:** {sha_str} &nbsp;·&nbsp; **Run:** {run_link}",
              "",
              "---",
              "",
              "### 🧪 Test Results",
              "",
              "| Component | Platform | Tests | Skipped | Coverage |",
              "|:----------|:--------:|------:|--------:|:--------:|",
              f"| Web Client — Python      | Ubuntu  | {tests(*web_py_t)} | {skips(web_py_t[3])} | {cov(web_cov)} |",
              f"| Web Client — JavaScript  | Ubuntu  | {tests(*web_js_t)} | {skips(web_js_t[3])} | {cov(web_js_cov)} |",
              f"| Console Client — Python  | Ubuntu  | {tests(*con_py_t)} | {skips(con_py_t[3])} | {cov(con_cov)} |",
              f"| Node Client — JavaScript | Ubuntu  | {tests(*nod_js_t)} | {skips(nod_js_t[3])} | {cov(nod_cov)} |",
              f"| C# Client — Unit (xUnit) | Windows | {tests(*cs_unit_t)} | {skips(cs_unit_t[3])} | {cov(cs_cov)} |",
              f"| Test Client — Python (Unit) | Ubuntu | {tests(*tc_py_t)} | {skips(tc_py_t[3])} | {cov(tc_cov)} |",
              f"| OPC UA Server — Smoke    | Windows | {tests(*ss_smoke)} | {skips(ss_smoke[3])} | Not Applicable |",
              "",
              "---",
              "",
              "### 🛡️ Code Quality",
              "",
              "| Component | Lint | Type Check | Security | Dependencies |",
              "|:----------|:-----|:----------:|:--------:|:------------:|",
              f"| Web Client     | {lint(tool(web_ruff, 'ruff'), eslint_fmt(web_eslint, web_esl))} | {tool(web_mypy, 'mypy')} | {bandit_fmt(*web_ban)} | {npm_fmt(*web_npm)} |",
              f"| Console Client | {tool(con_ruff, 'ruff')} | {tool(con_mypy, 'mypy')} | {bandit_fmt(*con_ban)} | Not Applicable |",
              f"| Node Client    | {eslint_fmt(nod_eslint, nod_esl)} | Not Applicable | Not Configured | {npm_fmt(*nod_npm)} |",
              f"| C# Client      | {lint(tool(cs_build, 'build'), tool(cs_format, 'format'))} | Not Applicable | {tool(cs_vuln, 'nuget')} | Not Applicable |",
              f"| Test Client    | {tool(tc_ruff, 'ruff')} | {tool(tc_mypy, 'mypy')} | {bandit_fmt(*tc_ban)} | Not Applicable |",
              "",
              "---",
              "",
              "### 🏗️ Infrastructure",
              "",
              "| Check | Status |",
              "|:------|:------:|",
              f"| Web Client — Docker Smoke (HTTP + WebSocket) | {job_icon(dck_r)} |",
              f"| GHA Workflow Lint (actionlint)               | {job_icon(al_r)} |",
              f"| GHA Security Audit (zizmor)                  | {job_icon(zz_r)} |",
              "",
              "---",
              "",
              "> 📦 **Artifacts** — JUnit XML · Coverage XML · ESLint JSON · Bandit JSON &nbsp;·&nbsp; 📋 **Checks** tab — per-test drill-down",
              "> Coverage key: ✅ ≥ 90% &nbsp;·&nbsp; ⚠️ 70–89% (improvement needed) &nbsp;·&nbsp; ❌ < 70% (critical) &nbsp;·&nbsp; Per-component thresholds in `pyproject.toml` / `vitest.config.mjs`",
          ]

          # ── Inline skip details (collapsible) ─────────────────────────────

          skip_sections = []
          skip_sections += format_skip_section("Web Client — Python", web_py_skips, web_py_t[3])
          skip_sections += format_skip_section("Web Client — JavaScript", web_js_skips, web_js_t[3])
          skip_sections += format_skip_section("Console Client — Python", con_py_skips, con_py_t[3])
          skip_sections += format_skip_section("Node Client — JavaScript", nod_js_skips, nod_js_t[3])
          skip_sections += format_skip_section("C# Client — Unit", cs_unit_skips, cs_unit_t[3])
          skip_sections += format_skip_section("Test Client — Python", tc_py_skips, tc_py_t[3])
          skip_sections += format_skip_section("OPC UA Server — Smoke", ss_smoke_skips, ss_smoke[3])

          if skip_sections:
              out += ["", "---", "", "### ⏭️ Skip Details"]
              out += skip_sections

          # ── Skip budget check ─────────────────────────────────────────────────
          # Known expected skips per TEST_TIERS.md; any extra skip is a warning.
          skip_budget = {
              "web-client (Python)":      1,  # Windows-only _SetupLock test
              "web-client (JS)":          0,
              "console-client (Python)":  0,
              "node-client (JS)":         1,  # git unavailable in CI (vitest)
              "csharp-unit":             15,  # IJT_PHASE1_ONLY filter
              "test-client (Python)":     0,
              "server-smoke (Windows)":   0,
          }
          actual_skips = {
              "web-client (Python)":      web_py_t[3],
              "web-client (JS)":          web_js_t[3],
              "console-client (Python)":  con_py_t[3],
              "node-client (JS)":         nod_js_t[3],
              "csharp-unit":              cs_unit_t[3],
              "test-client (Python)":     tc_py_t[3],
              "server-smoke (Windows)":   ss_smoke[3],
          }
          budget_warnings = []
          for suite, budget in skip_budget.items():
              actual = actual_skips[suite]
              if actual is not None and actual > budget:
                  budget_warnings.append(
                      f"⚠️ **{suite}**: {actual} skips (budget: {budget}) — unexpected skips detected"
                  )
          if budget_warnings:
              out += ["", "---", "", "### ⏭️ Skip Budget Exceeded", ""]
              out += budget_warnings

          if artifact_warnings:
              out += ["", "---", "", "### ⚠️ Artifact Warnings", ""]
              out += artifact_warnings

          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout"), "a", encoding="utf-8") as fh:
              fh.write("\n".join(out) + "\n")
          print("Summary written.")
          PYEOF

  # ───────────────────────────────────────────────────────────────────────────
  # GitHub Actions Workflow Lint (actionlint)
  # ───────────────────────────────────────────────────────────────────────────
  actionlint:
    name: "GHA Workflow Lint (actionlint)"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          curl -L -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          tar xzf actionlint.tar.gz actionlint

      - name: Run actionlint
        run: ./actionlint -color

  # ───────────────────────────────────────────────────────────────────────────
  # GHA Security Audit (zizmor) — promoted from integration.yml to block merges
  #   Skipped on fork PRs (no security-events: write access on forked repos).
  #   First-party PRs and push-to-main always run.
  # ───────────────────────────────────────────────────────────────────────────
  zizmor:
    name: "GHA Security Audit (zizmor)"
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 5
    # Skip fork PRs: they cannot write to Code Scanning (no security-events: write).
    # Non-PR events (push, workflow_dispatch) always run.
    if: (needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      security-events: write  # required to upload SARIF to Code Scanning

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run zizmor (GHA security audit → SARIF upload)
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e  # v0.5.3
        with:
          inputs: .github/workflows/

  # ───────────────────────────────────────────────────────────────────────────
  # CodeQL Analysis — handled by the dedicated .github/workflows/codeql.yml
  # workflow (Advanced Setup). GitHub Default Setup was disabled in repo
  # Settings → Security → Code scanning to avoid duplicate SARIF uploads.
  # ───────────────────────────────────────────────────────────────────────────

  # ───────────────────────────────────────────────────────────────────────────
  # Branch-protection aggregator — converts path-filtered "skipped" jobs to
  # "success" so the branch protection rule can check a single status name
  # instead of tracking all 9 individual jobs.
  #
  # Rule: configure branch protection to require only "All checks passed".
  # "skipped" is treated as success (path filter didn't touch that component).
  # "failure" or "cancelled" causes this job to fail.
  # ───────────────────────────────────────────────────────────────────────────
  all-required:
    name: "All checks passed"
    needs: [web-client, console-client, node-client, docker-smoke, csharp-unit, test-client, server-smoke-windows, actionlint, zizmor]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed (skipped = success)
        env:
          RESULTS: >-
            ${{ needs.web-client.result }}
            ${{ needs.console-client.result }}
            ${{ needs.node-client.result }}
            ${{ needs.docker-smoke.result }}
            ${{ needs.csharp-unit.result }}
            ${{ needs.test-client.result }}
            ${{ needs.server-smoke-windows.result }}
            ${{ needs.actionlint.result }}
            ${{ needs.zizmor.result }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '\b(failure|cancelled)\b'; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required checks passed (skipped jobs count as success)."
