# ─────────────────────────────────────────────────────────────────────────────
# CI — IJT OPC UA Unit, Static, and Smoke Gates
#
# TIER: ci (blocking) — must pass on every push / PR to main.
# See docs/TEST_TIERS.md for tier policy, skip budget rules, and the full list
# of known expected skips.
#
# Jobs:
#   web-client-python    Web Client Python      pytest · Ruff · mypy · Bandit · infra lint
#   web-client-js        Web Client JavaScript  Vitest · ESLint · npm audit
#   console-client       Console Client         Python pytest · Bandit
#   node-client          Node Client            Vitest · ESLint · npm audit
#   docker-smoke         Web Client Docker      Docker build + HTTP/WS readiness
#   test-client          Test Client            pytest unit (tests/unit/) · Bandit · Ruff · mypy
#   server-smoke-windows OPC UA Server          Windows native smoke (10 checks)
#   csharp-unit          C# Client              dotnet build · xUnit (unit-only categories) · format
#   csharp-vuln          C# Client              NuGet vulnerability scan
#   actionlint           GHA workflow lint             actionlint (all .github/workflows/*.yml)
#   zizmor               GHA security audit            zizmor → SARIF upload (skipped on fork PRs)
#   pre-commit           Local hook parity             pre-commit run --all-files
#   report               Combined summary (always runs after all jobs)
#
# Live / integration / security tests: see .github/workflows/integration.yml
#
# Standards used:
#   Python security : bandit    (pyproject.toml [tool.bandit]  ·  -c pyproject.toml)
#   JS security     : npm audit (--audit-level=high)
#   Test reports    : JUnit XML → dorny/test-reporter (Checks tab)
#   ESLint results  : JSON artifact → parsed in report job
#   Summary table   : $GITHUB_STEP_SUMMARY (Actions Summary tab)
# ─────────────────────────────────────────────────────────────────────────────

name: "CI — Unit, Static, and Smoke Gates"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Opt into Node.js 24 for all actions (suppresses the Node.js 20 deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:


  # ───────────────────────────────────────────────────────────────────────────
  # Enable full CI matrix
  # ───────────────────────────────────────────────────────────────────────────
  changes:
    name: "Enable full CI matrix"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      web:        ${{ steps.full.outputs.web }}
      console:    ${{ steps.full.outputs.console }}
      node:       ${{ steps.full.outputs.node }}
      docker:     ${{ steps.full.outputs.docker }}
      testclient: ${{ steps.full.outputs.testclient }}
      csharp:     ${{ steps.full.outputs.csharp }}
      server:     ${{ steps.full.outputs.server }}
      workflows:  ${{ steps.full.outputs.workflows }}
    steps:
      - name: "All jobs enabled"
        id: full
        run: |
          {
            echo "web=true"
            echo "console=true"
            echo "node=true"
            echo "docker=true"
            echo "testclient=true"
            echo "csharp=true"
            echo "server=true"
            echo "workflows=true"
          } >> "$GITHUB_OUTPUT"

  # ───────────────────────────────────────────────────────────────────────────
  # Web Client — Python lane
  #   Runs the Python/static half of the local Phase 1 runner.
  # ───────────────────────────────────────────────────────────────────────────
  web-client-python:
    name: "Web Client - Python"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
    outputs:
      mypy_result:   ${{ steps.web_python_runner.outcome }} # zizmor: ignore[template-injection]
      ruff_result:   ${{ steps.web_python_runner.outcome }} # zizmor: ignore[template-injection]
      bandit_result: ${{ steps.web_python_runner.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Web_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Run Web Client Python Phase 1 runner
        id: web_python_runner
        continue-on-error: true
        run: python run_all_tests.py --phase1-python

      - name: "Publish Test Reports — Python"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — Python Tests"
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/pytest.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-web-client-python
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/
          retention-days: 14

      - name: Fail if Runner Failed
        if: always() && steps.web_python_runner.outcome == 'failure'
        env:
          WEB_RUNNER_OUTCOME: ${{ steps.web_python_runner.outcome }}
        run: |
          echo "Web Client Python Phase 1 runner failed: $WEB_RUNNER_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Web Client — JavaScript lane
  #   Runs the JavaScript/static half of the local Phase 1 runner.
  # ───────────────────────────────────────────────────────────────────────────
  web-client-js:
    name: "Web Client - JavaScript"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
    outputs:
      eslint_result: ${{ steps.web_js_runner.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Web_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"

      - name: Run Web Client JavaScript Phase 1 runner
        id: web_js_runner
        continue-on-error: true
        run: python run_all_tests.py --phase1-js

      - name: "Publish Test Reports — JS"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — JS Tests (Vitest)"
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/vitest.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-web-client-js
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/
          retention-days: 14

      - name: Fail if Runner Failed
        if: always() && steps.web_js_runner.outcome == 'failure'
        env:
          WEB_RUNNER_OUTCOME: ${{ steps.web_js_runner.outcome }}
        run: |
          echo "Web Client JavaScript Phase 1 runner failed: $WEB_RUNNER_OUTCOME"
          exit 1


  # ───────────────────────────────────────────────────────────────────────────
  # Console Client
  #   Python: pytest + bandit (pyproject.toml) + report-only pip-audit JSON
  # ───────────────────────────────────────────────────────────────────────────
  console-client:
    name: "Console Client"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.console == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    outputs:
      mypy_result: ${{ steps.mypy.outcome }}   # zizmor: ignore[template-injection]
      ruff_result: ${{ steps.pylint.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Console_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c "${{ github.workspace }}/constraints.txt" -r requirements.txt -r requirements-dev.txt

      - run: mkdir -p test-results

      - name: Python Unit Tests
        id: pytest
        continue-on-error: true
        run: |
          python -m pytest tests/unit/ -q \
            --junitxml=test-results/pytest.xml \
            --cov=. \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term-missing

      - name: Bandit (Python Security)
        id: bandit
        continue-on-error: true
        run: python -m bandit -r . -c "${{ github.workspace }}/pyproject.toml" --severity-level medium -f json -o test-results/bandit.json

      - name: pip-audit (Python Dependency Audit Report)
        id: pip_audit
        continue-on-error: true
        run: python -m pip_audit --format json -o test-results/pip-audit.json --progress-spinner off

      - name: Ruff (Python Linting)
        id: pylint
        continue-on-error: true
        run: python -m ruff check . --output-format=github

      - name: mypy (Type Checking)
        id: mypy
        continue-on-error: true
        run: python -m mypy . --ignore-missing-imports --no-error-summary

      - name: Publish Test Reports
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        with:
          name: "Console Client — Tests"
          path: OPC_UA_Clients/Release2/IJT_Console_Client/test-results/pytest.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-console-client
          path: OPC_UA_Clients/Release2/IJT_Console_Client/test-results/
          retention-days: 14

      - name: Fail if Any Check Failed
        if: always() && (
          steps.pytest.outcome == 'failure' ||
          steps.bandit.outcome == 'failure' ||
          steps.pylint.outcome == 'failure' ||
          steps.mypy.outcome   == 'failure')
        env:
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
          PYLINT_OUTCOME: ${{ steps.pylint.outcome }}
          MYPY_OUTCOME:   ${{ steps.mypy.outcome }}
        run: |
          echo "One or more checks failed:"
          echo "  pytest  -> $PYTEST_OUTCOME"
          echo "  bandit  -> $BANDIT_OUTCOME"
          echo "  ruff    -> $PYLINT_OUTCOME"
          echo "  mypy    -> $MYPY_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Node Client
  #   JS: vitest + eslint (JSON) + npm audit
  # ───────────────────────────────────────────────────────────────────────────
  node-client:
    name: "Node Client"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.node == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    outputs:
      eslint_result: ${{ steps.eslint.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release1/IJT_Node_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"

      - name: Install JS Dependencies
        run: npm ci

      - run: mkdir -p test-results

      - name: JS Unit Tests
        id: vitest
        continue-on-error: true
        run: npx vitest run --coverage --reporter=verbose --reporter=junit --outputFile.junit=test-results/vitest.xml

      - name: ESLint
        id: eslint
        continue-on-error: true
        run: npx eslint javascripts/ --format json --output-file test-results/eslint.json

      - name: npm Audit (JS Security)
        id: npm_audit
        continue-on-error: true
        run: npm audit --audit-level=high --json > test-results/npm-audit.json

      - name: Publish Test Reports
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        with:
          name: "Node Client — Tests"
          path: OPC_UA_Clients/Release1/IJT_Node_Client/test-results/vitest.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-node-client
          path: OPC_UA_Clients/Release1/IJT_Node_Client/test-results/
          retention-days: 14

      - name: Fail if Any Check Failed
        if: always() && (
          steps.vitest.outcome    == 'failure' ||
          steps.eslint.outcome    == 'failure' ||
          steps.npm_audit.outcome == 'failure')
        env:
          VITEST_OUTCOME:    ${{ steps.vitest.outcome }}
          ESLINT_OUTCOME:    ${{ steps.eslint.outcome }}
          NPM_AUDIT_OUTCOME: ${{ steps.npm_audit.outcome }}
        run: |
          echo "One or more checks failed:"
          echo "  vitest     -> $VITEST_OUTCOME"
          echo "  eslint     -> $ESLINT_OUTCOME"
          echo "  npm audit  -> $NPM_AUDIT_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Web Client - Docker Smoke
  # Builds the image, starts the Compose stack, verifies HTTP + WebSocket.
  # ───────────────────────────────────────────────────────────────────────────
  docker-smoke:
    name: "Web Client - Docker Smoke"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.docker == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DOCKER_BUILD_SUMMARY: "false"
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Web_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: Build Docker Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: OPC_UA_Clients/Release2/IJT_Web_Client/Dockerfile
          tags: ijt_web_client:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Compose Stack
        # ``--wait --wait-timeout 120`` makes compose itself the synchronization
        # primitive: the step exits success only after the ijt_web_client
        # compose healthcheck (curl -f http://localhost:3000) reports healthy.
        # 120s covers start_period 20s + interval 30s × retries 3 ≈ 110s budget
        # with margin. Replaces the previous "up -d" + manual curl loop.
        run: docker compose up -d --no-build --wait --wait-timeout 120

      - name: Verify WebSocket Port
        shell: bash
        # The compose healthcheck only proves HTTP :3000 readiness. WebSocket
        # :8001 is still gated separately until the healthcheck is expanded.
        run: |
          timeout 30 bash -c \
            'until (echo > /dev/tcp/127.0.0.1/8001) >/dev/null 2>&1; do sleep 1; done'

      - name: Show Container Status
        if: always()
        run: docker ps --filter name=ijt_web_client

      - name: Show Recent Logs
        if: always()
        run: docker logs --tail 120 ijt_web_client

      - name: Teardown Compose Stack
        if: always()
        run: docker compose down -v

  # ───────────────────────────────────────────────────────────────────────────
  # C# Client
  #   dotnet build (warnaserror) + dotnet test (xUnit) + format check
  # ───────────────────────────────────────────────────────────────────────────
  # ───────────────────────────────────────────────────────────────────────────
  # C# Client - Unit Tests (no server required)
  #   dotnet build + xUnit (excludes Live and OpcUaSecurity categories) + format check
  # ───────────────────────────────────────────────────────────────────────────
  csharp-unit:
    name: "C# Client - Unit Tests"
    runs-on: windows-latest
    needs: [changes]
    # Full CI policy: changes job always enables this lane on push, PR, and manual dispatch.
    # Nightly integration covers cross-component regressions.
    if: needs.changes.outputs.csharp == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
    outputs:
      build_result:  ${{ steps.build.outcome }}     # zizmor: ignore[template-injection]
      format_result: ${{ steps.format.outcome }}    # zizmor: ignore[template-injection]
      coverage_pct:  ${{ steps.coverage.outputs.pct }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_CSharp_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: '10.x'

      - name: Prepare C# test-result artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          '<?xml version="1.0"?><testsuites tests="0" failures="0"><testsuite name="IJT_CSharp_Client.Tests.Unit" tests="0"/></testsuites>' | Out-File test-results\tests.xml -Encoding UTF8

      - name: Restore NuGet Packages
        run: |
          $target = "Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj"
          $lockFiles = Get-ChildItem -Path . -Recurse -Filter "packages.lock.json" -File -ErrorAction SilentlyContinue
          if ($lockFiles.Count -gt 0) {
            Write-Host "Lock files detected — using locked mode restore."
            dotnet restore $target --locked-mode
          } else {
            Write-Host "No lock files yet — using normal restore."
            dotnet restore $target
          }

      - name: Build (zero warnings)
        id: build
        continue-on-error: true
        run: dotnet build Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj --no-restore -warnaserror --configuration Release

      - name: OPC UA Security build contract
        id: opcua_security_build_contract
        if: steps.build.outcome == 'success'
        shell: pwsh
        continue-on-error: true
        run: |
          $target = "Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj"
          $artifacts = Join-Path (Get-Location).Path "obj\opcua-security-artifacts\csharp-client-opcua-security-build-contract"
          if (Test-Path $artifacts) {
            Remove-Item -LiteralPath $artifacts -Recurse -Force
          }

          $props = @("-p:UseArtifactsOutput=true", "-p:ArtifactsPath=$artifacts")
          $lockFiles = Get-ChildItem -Path . -Recurse -Filter "packages.lock.json" -File -ErrorAction SilentlyContinue
          if ($lockFiles.Count -gt 0) {
            dotnet restore $target --locked-mode @props
          } else {
            dotnet restore $target @props
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          dotnet build $target --no-restore --configuration Release @props
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $projects = @(
            "IJT_CSharp_Client.Tests",
            "IJT_CSharp_Client",
            "UAModel.IJTTightening",
            "UAModel.IJTBase",
            "UAModel.MachineryResult"
          )
          foreach ($project in $projects) {
            $objDir = Join-Path $artifacts "obj\$project"
            $binDir = Join-Path $artifacts "bin\$project"
            $assets = Get-ChildItem -Path $objDir -Recurse -Filter "project.assets.json" -ErrorAction SilentlyContinue | Select-Object -First 1
            $dll = Get-ChildItem -Path $binDir -Recurse -Filter "$project.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
            if (-not $assets) {
              throw "Missing isolated obj artifact for $project under $objDir"
            }
            if (-not $dll) {
              throw "Missing isolated bin artifact for $project under $binDir"
            }
          }
          Write-Host "OPC UA Security build contract verified isolated artifacts under $artifacts"

      - name: Run xUnit Unit Tests
        id: tests
        if: steps.build.outcome == 'success'
        continue-on-error: true
        env:
          IJT_PHASE1_ONLY: 'true'
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          New-Item -ItemType Directory -Force -Path test-results\coverage | Out-Null
          dotnet test Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj `
            --no-build `
            --no-restore `
            --configuration Release `
            --filter "Category!=Live&Category!=OpcUaSecurity" `
            --logger "trx;LogFileName=tests.trx" `
            --logger "console;verbosity=normal" `
            --results-directory test-results `
            --collect:"XPlat Code Coverage" `
            --settings coverlet.runsettings `
            --blame-hang --blame-hang-timeout 60s

      - name: Collect Coverage Report
        id: coverage
        if: always()
        shell: pwsh
        working-directory: OPC_UA_Clients/Release2/IJT_CSharp_Client
        run: |
          # Coverlet writes to test-results/<GUID>/coverage.cobertura.xml — copy to canonical path.
          $covXml = Get-ChildItem test-results -Recurse -Filter "coverage.cobertura.xml" | Select-Object -First 1
          if ($covXml) {
            Copy-Item $covXml.FullName test-results\coverage\cobertura.xml -Force
            [xml]$cov = Get-Content test-results\coverage\cobertura.xml
            $pct = [math]::Round([double]$cov.coverage.'line-rate' * 100, 1)
            Write-Host "C# line coverage: $pct%"
            "pct=$pct" | Out-File $Env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "Coverage XML not generated (tests may have failed or --collect flag not picked up)"
            "pct=" | Out-File $Env:GITHUB_OUTPUT -Append
          }

      - name: Format Check
        id: format
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: dotnet format IJT_CSharp_Client.sln --verify-no-changes --no-restore 2>&1

      - name: Convert TRX to JUnit XML
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          $trx   = "test-results\tests.trx"
          $junit = "test-results\tests.xml"
          if (Test-Path $trx) {
            [xml]$x = Get-Content $trx
            $ns = @{ t = "http://microsoft.com/schemas/VisualStudio/TeamTest/2010" }
            $results = Select-Xml -Xml $x -XPath "//t:UnitTestResult" -Namespace $ns | Select-Object -ExpandProperty Node
            $passed  = ($results | Where-Object { $_.outcome -eq "Passed"  }).Count
            $failed  = ($results | Where-Object { $_.outcome -eq "Failed"  }).Count
            $skipped = ($results | Where-Object { $_.outcome -eq "NotExecuted" }).Count
            $total   = $results.Count
            $xml  = '<?xml version="1.0" encoding="UTF-8"?>' + "`n"
            $xml += "<testsuites tests=`"$total`" failures=`"$failed`" skipped=`"$skipped`">`n"
            $xml += "  <testsuite name=`"IJT_CSharp_Client.Tests.Unit`" tests=`"$total`" failures=`"$failed`" skipped=`"$skipped`">`n"
            foreach ($r in $results) {
              $name = [System.Security.SecurityElement]::Escape($r.testName)
              $outcome = $r.outcome
              if ($outcome -eq "Passed") {
                $xml += "    <testcase name=`"$name`" classname=`"IJT`" />`n"
              } elseif ($outcome -eq "NotExecuted") {
                $msgRaw = ([string]$r.Output.ErrorInfo.Message).Trim()
                if ([string]::IsNullOrWhiteSpace($msgRaw)) { $msgRaw = "Test skipped by xUnit" }
                $msg = [System.Security.SecurityElement]::Escape($msgRaw)
                $xml += "    <testcase name=`"$name`" classname=`"IJT`"><skipped message=`"$msg`">$msg</skipped></testcase>`n"
              } else {
                $msg = [System.Security.SecurityElement]::Escape($r.Output.ErrorInfo.Message)
                $xml += "    <testcase name=`"$name`" classname=`"IJT`"><failure>$msg</failure></testcase>`n"
              }
            }
            $xml += "  </testsuite>`n</testsuites>"
            $xml | Out-File $junit -Encoding UTF8
            Write-Host "Converted TRX → JUnit: $total tests, $failed failures, $skipped skipped"
          } else {
            Write-Host "No TRX file found — creating empty JUnit"
            '<?xml version="1.0"?><testsuites tests="0" failures="0"><testsuite name="IJT_CSharp_Client.Tests.Unit" tests="0"/></testsuites>' | Out-File $junit -Encoding UTF8
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-csharp-unit
          path: OPC_UA_Clients/Release2/IJT_CSharp_Client/test-results/
          retention-days: 14

      - name: Fail if Any Check Failed
        if: always() && (
          steps.build.outcome     == 'failure' ||
          steps.opcua_security_build_contract.outcome == 'failure' ||
          steps.tests.outcome     == 'failure' ||
          steps.format.outcome    == 'failure')
        env:
          BUILD_OUTCOME:                   ${{ steps.build.outcome }}
          OPCUA_SECURITY_CONTRACT_OUTCOME: ${{ steps.opcua_security_build_contract.outcome }}
          TESTS_OUTCOME:                   ${{ steps.tests.outcome }}
          FORMAT_OUTCOME:                  ${{ steps.format.outcome }}
        run: |
          echo "One or more C# unit checks failed:"
          echo "  build                    -> $BUILD_OUTCOME"
          echo "  opcua security contract  -> $OPCUA_SECURITY_CONTRACT_OUTCOME"
          echo "  tests                    -> $TESTS_OUTCOME"
          echo "  format                   -> $FORMAT_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Test Client
  #   Python: pytest unit tests (tests/unit/ — no server) + bandit + ruff + mypy + report-only pip-audit JSON
  # ───────────────────────────────────────────────────────────────────────────
  test-client:
    name: "Test Client"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.testclient == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    outputs:
      mypy_result: ${{ steps.mypy.outcome }}   # zizmor: ignore[template-injection]
      ruff_result: ${{ steps.pylint.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Test_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c "${{ github.workspace }}/constraints.txt" -r requirements.txt -r requirements-dev.txt

      - run: mkdir -p test-results

      - name: Run Unit Tests
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/unit/ -v \
            --junitxml=test-results/pytest.xml \
            --cov=helpers \
            --cov-report=xml:test-results/coverage.xml \
            --cov-fail-under=90 \
            2>&1 | tee test-results/pytest-output.txt

      - name: Bandit (Python Security)
        id: bandit
        continue-on-error: true
        run: python -m bandit -r . -c "${{ github.workspace }}/pyproject.toml" --severity-level medium -f json -o test-results/bandit.json

      - name: pip-audit (Python Dependency Audit Report)
        id: pip_audit
        continue-on-error: true
        run: python -m pip_audit --format json -o test-results/pip-audit.json --progress-spinner off

      - name: Ruff (Python Linting)
        id: pylint
        continue-on-error: true
        run: python -m ruff check . --output-format=github

      - name: mypy (Type Checking)
        id: mypy
        continue-on-error: true
        run: python -m mypy . --ignore-missing-imports --no-error-summary

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-test-client
          path: OPC_UA_Clients/Release2/IJT_Test_Client/test-results/
          retention-days: 14

      - name: Fail if Any Check Failed
        if: always() && (
          steps.pytest.outcome == 'failure' ||
          steps.bandit.outcome == 'failure' ||
          steps.pylint.outcome == 'failure' ||
          steps.mypy.outcome   == 'failure')
        env:
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
          PYLINT_OUTCOME: ${{ steps.pylint.outcome }}
          MYPY_OUTCOME:   ${{ steps.mypy.outcome }}
        run: |
          echo "One or more checks failed:"
          echo "  pytest  -> $PYTEST_OUTCOME"
          echo "  bandit  -> $BANDIT_OUTCOME"
          echo "  ruff    -> $PYLINT_OUTCOME"
          echo "  mypy    -> $MYPY_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # OPC UA Server — Windows Smoke
  #   Extract OPC_UA_IJT_Server_Simulator.zip, launch the EXE directly,
  #   wait for TCP 40451, run all 10 smoke checks, kill the process.
  #
  # The server auto-creates its PKI directory (certificates) on first launch —
  # no pre-seeded certificates are needed.
  # ───────────────────────────────────────────────────────────────────────────

  server-smoke-windows:
    name: "OPC UA Server - Windows Smoke"
    runs-on: windows-latest
    needs: [changes]
    if: needs.changes.outputs.server == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract server ZIP
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force
          Write-Host "Extracted ZIP contents:"
          Get-ChildItem "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" | Select-Object Name

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Start OPC UA Server with HELLO readiness
        working-directory: ${{ github.workspace }}
        run: |
          python scripts/start_server_on_port.py `
            --port 40451 `
            --diagnostics-dir test-results/readiness

      - name: Install smoke test dependencies
        run: pip install -c "${{ github.workspace }}/constraints.txt" -r OPC_UA_Servers/Release2/tests/requirements.txt

      - name: Run smoke test (10 checks)
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          python OPC_UA_Servers/Release2/tests/smoke_test.py `
            --tcp-timeout 30 `
            --junitxml test-results/smoke.xml

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-server-smoke
          path: |
            test-results/smoke.xml
            test-results/readiness/**
          retention-days: 14

      - name: Stop OPC UA Server
        if: always()
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40451 --stop

  # ───────────────────────────────────────────────────────────────────────────
  # Combined Report — always runs after all jobs.
  # Writes the root-level summary table to the Actions Summary page.
  # ───────────────────────────────────────────────────────────────────────────
  report:
    name: "📋 CI Report"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [changes, web-client-python, web-client-js, console-client, node-client, docker-smoke, csharp-unit, csharp-vuln, test-client, server-smoke-windows, actionlint, zizmor, pre-commit]
    if: always()
    permissions:
      actions: read
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install reporting dependencies
        # Install reporting/* requirements (defusedxml etc) so the summary
        # script imports succeed in this lean report-only job.
        run: |
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet -c "${{ github.workspace }}/constraints.txt" -r reporting/requirements.txt

      - name: Download All Test Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: all-results/

      - name: "Report — Web Client Python Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always() && needs.web-client-python.result != 'skipped'
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — Python Tests"
          path: all-results/results-web-client-python/pytest.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Web Client JS Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always() && needs.web-client-js.result != 'skipped'
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — JS Tests (Vitest)"
          path: all-results/results-web-client-js/vitest.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Console Client Python Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always() && needs.console-client.result != 'skipped'
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Console Client — Python Tests"
          path: all-results/results-console-client/pytest.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Node Client JS Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always() && needs.node-client.result != 'skipped'
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Node Client — JS Tests (Vitest)"
          path: all-results/results-node-client/vitest.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Test Client Python Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always() && needs.test-client.result != 'skipped'
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Test Client — Python Tests (Unit)"
          path: all-results/results-test-client/pytest.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — C# Client Unit Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always() && needs.csharp-unit.result != 'skipped'
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "C# Client — Unit Tests (xUnit)"
          path: all-results/results-csharp-unit/tests.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — OPC UA Server Smoke (Windows)"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always() && needs.server-smoke-windows.result != 'skipped'
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "OPC UA Server — Smoke Tests (Windows)"
          path: all-results/results-server-smoke/smoke.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: Generate Summary Table
        env:
          # ── Job-level results ──────────────────────────────────
          WEB_PY_RESULT:   ${{ needs.web-client-python.result }}
          WEB_JS_RESULT:   ${{ needs.web-client-js.result }}
          CONSOLE_RESULT:  ${{ needs.console-client.result }}
          NODE_RESULT:     ${{ needs.node-client.result }}
          DOCKER_RESULT:   ${{ needs.docker-smoke.result }}
          CS_UNIT_RESULT:  ${{ needs.csharp-unit.result }}
          CS_VULN_RESULT:  ${{ needs.csharp-vuln.result }}
          TC_RESULT:       ${{ needs.test-client.result }}
          SS_WIN_RESULT:   ${{ needs.server-smoke-windows.result }}
          AL_RESULT:       ${{ needs.actionlint.result }}
          ZZ_RESULT:       ${{ needs.zizmor.result }}
          PC_RESULT:       ${{ needs.pre-commit.result }}
          # ── Per-tool step outcomes ─────────────────────────────
          WEB_PY_RUFF:     ${{ needs.web-client-python.outputs.ruff_result }}
          WEB_PY_MYPY:     ${{ needs.web-client-python.outputs.mypy_result }}
          WEB_JS_ESLINT:   ${{ needs.web-client-js.outputs.eslint_result }}
          CONSOLE_RUFF:    ${{ needs.console-client.outputs.ruff_result }}
          CONSOLE_MYPY:    ${{ needs.console-client.outputs.mypy_result }}
          NODE_ESLINT:     ${{ needs.node-client.outputs.eslint_result }}
          CS_BUILD:        ${{ needs.csharp-unit.outputs.build_result }}
          CS_FORMAT:       ${{ needs.csharp-unit.outputs.format_result }}
          CS_VULN:         ${{ needs.csharp-vuln.result }}
          TC_RUFF:         ${{ needs.test-client.outputs.ruff_result }}
          TC_MYPY:         ${{ needs.test-client.outputs.mypy_result }}
          # ── Commit context ─────────────────────────────────────
          GH_SHA:          ${{ github.sha }}
          GH_BRANCH:       ${{ github.ref_name }}
          GH_RUN_NUMBER:   ${{ github.run_number }}
          GH_RUN_URL:      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_REPOSITORY:   ${{ github.repository }}
          GH_RUN_ID:       ${{ github.run_id }}
          GH_API_URL:      ${{ github.api_url }}
          GH_TOKEN:        ${{ github.token }}
          REPORT_JOB_NAME: "📋 CI Report"
        run: |
          python3 reporting/ci_run_summary.py

      - name: Collect Timing JSON
        if: always()
        env:
          TIMING_WORKFLOW_NAME: "CI — Unit, Static, and Smoke Gates"
          TIMING_OUTPUT_DIR: timing-results
          GH_REPOSITORY:  ${{ github.repository }}
          GH_RUN_ID:      ${{ github.run_id }}
          GH_RUN_NUMBER:  ${{ github.run_number }}
          GH_SHA:         ${{ github.sha }}
          GH_BRANCH:      ${{ github.ref_name }}
          GH_RUN_URL:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_API_URL:     ${{ github.api_url }}
          GH_TOKEN:       ${{ github.token }}
          REPORT_JOB_NAME: "📋 CI Report"
        run: |
          python3 scripts/reporting/collect_timing.py

      - name: Upload Timing Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: timing-ci
          path: timing-results/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # GitHub Actions Workflow Lint (actionlint)
  # ───────────────────────────────────────────────────────────────────────────
  actionlint:
    name: "GHA Workflow Lint (actionlint)"
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          curl -L -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          tar xzf actionlint.tar.gz actionlint

      - name: Run actionlint
        run: ./actionlint -color

  # ───────────────────────────────────────────────────────────────────────────
  # GHA Security Audit (zizmor) — promoted from integration.yml to block merges
  #   Skipped on fork PRs (no security-events: write access on forked repos).
  #   First-party PRs and push-to-main always run.
  # ───────────────────────────────────────────────────────────────────────────
  zizmor:
    name: "GHA Security Audit (zizmor)"
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 5
    # Skip fork PRs: they cannot write to Code Scanning (no security-events: write).
    # Non-PR events (push, workflow_dispatch) always run.
    if: (needs.changes.outputs.workflows == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      security-events: write  # required to upload SARIF to Code Scanning

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run zizmor (GHA security audit → SARIF upload)
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d  # v0.5.6
        with:
          inputs: .github/workflows/

  # ───────────────────────────────────────────────────────────────────────────
  # Pre-commit gate — runs `.pre-commit-config.yaml` against all files.
  #   Closes the "hooks not installed locally" gap: ensures that whatever a
  #   developer's local pre-commit would have caught is also enforced at PR
  #   time, regardless of whether they ran `pre-commit install` on their
  #   machine. Cached pre-commit hook envs keyed on the config hash keep
  #   cold runs under ~30s and warm runs near-instant.
  #
  #   SKIP excludes the npm-backed hooks because they are already gated by
  #   the dedicated JS jobs with full `npm ci` setup — re-running them here
  #   would require duplicate dependency installs without adding signal.
  # ───────────────────────────────────────────────────────────────────────────
  pre-commit:
    name: "Pre-commit hooks (all files)"
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      SKIP: eslint-node-client,css-node-client,eslint-web-client,stylelint-web-client
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install pre-commit and root test dependencies
        run: |
          python -m pip install --upgrade -c "${{ github.workspace }}/constraints.txt" "pre-commit==4.5.1"
          python -m pip install -c "${{ github.workspace }}/constraints.txt" -r "${{ github.workspace }}/tests/requirements.txt"

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure --color=always

  # ───────────────────────────────────────────────────────────────────────────
  # C# NuGet Vulnerability Scan — lightweight dependency gate.
  #   Runs on every CI push and PR as part of the full matrix.
  #   Nightly drift is covered by integration.yml.
  #   No build needed — just restore + scan.
  # ───────────────────────────────────────────────────────────────────────────
  csharp-vuln:
    name: "C# Client - NuGet Vuln Scan"
    runs-on: windows-latest
    needs: [changes]
    if: needs.changes.outputs.csharp == 'true' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    permissions:
      contents: read
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_CSharp_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: "10.x"

      - name: Restore NuGet Packages
        shell: pwsh
        run: |
          $target = "Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj"
          dotnet restore $target --locked-mode

      - name: Scan for Vulnerable Packages
        shell: pwsh
        run: |
          $target = "Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj"
          $output = dotnet list $target package --vulnerable --include-transitive --no-restore 2>&1
          Write-Host $output
          if ($output -match "has the following vulnerable packages") {
            Write-Host "##[error]Vulnerable NuGet packages detected."
            exit 1
          }

  # ───────────────────────────────────────────────────────────────────────────
  # Security — CodeQL — handled by the dedicated .github/workflows/codeql.yml
  # workflow (Advanced Setup). GitHub Default Setup was disabled in repo
  # Settings → Security → Code scanning to avoid duplicate SARIF uploads.
  # ───────────────────────────────────────────────────────────────────────────

  # ───────────────────────────────────────────────────────────────────────────
  # CI aggregator — converts lane-level "skipped" jobs to "success" so CI
  # has one readable gate result instead of requiring users to scan all
  # component jobs.
  #
  # Ruleset 15294123 currently requires only the CodeQL Analyze contexts; this
  # job is still kept as CI's own aggregate validation signal.
  # "skipped" is treated as success (for example, a lane-level precondition).
  # "failure" or "cancelled" causes this job to fail.
  # ───────────────────────────────────────────────────────────────────────────
  all-required:
    name: "All checks passed"
    needs: [web-client-python, web-client-js, console-client, node-client, docker-smoke, csharp-unit, csharp-vuln, test-client, server-smoke-windows, actionlint, zizmor, pre-commit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed (skipped = success)
        env:
          RESULTS: >-
            ${{ needs.web-client-python.result }}
            ${{ needs.web-client-js.result }}
            ${{ needs.console-client.result }}
            ${{ needs.node-client.result }}
            ${{ needs.docker-smoke.result }}
            ${{ needs.csharp-unit.result }}
            ${{ needs.csharp-vuln.result }}
            ${{ needs.test-client.result }}
            ${{ needs.server-smoke-windows.result }}
            ${{ needs.actionlint.result }}
            ${{ needs.zizmor.result }}
            ${{ needs.pre-commit.result }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE '\b(failure|cancelled)\b'; then
            echo "One or more required jobs failed or were cancelled."
            exit 1
          fi
          echo "All required checks passed (skipped jobs count as success)."
