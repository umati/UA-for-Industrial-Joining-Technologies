# ─────────────────────────────────────────────────────────────────────────────
# Integration — Live System Tests
#
# TIER: integration (non-blocking) — skips and failures are tracked but do
# not gate merges. See docs/TEST_TIERS.md for the full tier policy and the
# known-expected-skips table.
#
# Jobs:
#   server-smoke-docker  OPC UA Server          Linux native Docker build + smoke
#   webclient-docker     Web Client             Docker unit/prod tests
#   int-testclient       Test Client            Windows: OPC UA server (port 40462) + Test Client full suite
#   live-webclient       Web Client             Windows: local runner web-client-live-* matrix
#   live-webclient-browser Web Client           Linux Playwright container: web-client-e2e-* matrix
#   live-console         Console Client         Windows: Console Client live tests (port 40461)
#   csharp-live          C# Client              Windows: xUnit live tests (port 40464) - nightly
#   report               Combined summary                 Always runs after all jobs
# (zizmor promoted to ci.yml — removed from integration)
#
# Triggers:
#   - Nightly at 2am UTC
#   - Manual dispatch (workflow_dispatch)
#   - Push / PR touching server or client code paths (see path filters below)
# ─────────────────────────────────────────────────────────────────────────────

name: "Integration — Live System Tests"

on:
  schedule:
    - cron: '0 2 * * *'   # nightly at 2am UTC
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]
    paths:
      # OPC UA Server — code/binary/Dockerfile/test changes (docs-only changes excluded)
      - 'OPC_UA_Servers/Release2/*.zip'
      - 'OPC_UA_Servers/Release2/Dockerfile'
      - 'OPC_UA_Servers/Release2/tests/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator_Linux/**'
      # Web Client — local live suites cover Python backend contracts and Playwright E2E.
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/**'
      # Test Client — every change is an OPC UA conformance test change
      - 'OPC_UA_Clients/Release2/IJT_Test_Client/**'
      # Console Client — live tests run here (not in fast CI)
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/*.py'
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/tests/live/**'
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/requirements*.txt'
      # Any workflow file — zizmor audits all of .github/workflows/
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      # Same paths as push — run live tests on PRs that touch server/client code
      # so regressions are caught before merge, not after.
      - 'OPC_UA_Servers/Release2/*.zip'
      - 'OPC_UA_Servers/Release2/Dockerfile'
      - 'OPC_UA_Servers/Release2/tests/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator_Linux/**'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/**'
      - 'OPC_UA_Clients/Release2/IJT_Test_Client/**'
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/*.py'
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/tests/live/**'
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/requirements*.txt'
      # Any workflow file — zizmor audits all of .github/workflows/
      - '.github/workflows/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # OPC UA Server - Docker Smoke
  #   Extract the Linux ZIP to satisfy the COPY instructions in the Dockerfile,
  #   build the native Linux Docker image (layer-cached via GitHub Actions cache),
  #   start the container, wait for TCP 40451, run all 10 smoke checks, tear down.
  # ───────────────────────────────────────────────────────────────────────────
  server-smoke-docker:
    name: "OPC UA Server - Docker Smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: docker-hub
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}   # empty string when secret absent

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract server ZIP (required for Docker COPY instructions)
        working-directory: OPC_UA_Servers/Release2
        run: |
          unzip -q OPC_UA_IJT_Server_Simulator_Linux.zip
          echo "Extracted: $(ls OPC_UA_IJT_Server_Simulator_Linux/)"

      - name: Install hadolint (binary — avoids a Docker Hub pull)
        # Using the released binary instead of `docker run hadolint/hadolint`
        # saves one unauthenticated Docker Hub pull (and avoids rate-limit risk).
        # SHA-256 is taken from the official hadolint v2.12.0 release checksums file.
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          echo "56de6d5e5ec427e17b74fa48d51271c7fc0d61244bf5c90e828aab8362d55010  /usr/local/bin/hadolint" \
            | sha256sum --check --strict -
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfile (hadolint)
        run: |
          hadolint --ignore DL3008 --ignore DL3009 OPC_UA_Servers/Release2/Dockerfile
          echo "Dockerfile lint OK"

      - name: Log in to Docker Hub (optional — increases pull rate limit)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build Docker image (Linux native binary, no cache write)
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: OPC_UA_Servers/Release2
          tags: opcua-ijt-server:ci
          load: true
          cache-from: type=gha

      - name: Build Docker image (Linux native binary, trusted cache write)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: OPC_UA_Servers/Release2
          tags: opcua-ijt-server:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start OPC UA Server container
        run: |
          docker run -d --name opcua-server \
            -p 40451:40451 opcua-ijt-server:ci
          echo "Container started"

      - name: Wait for OPC UA port 40451
        # Linux binary starts in ~3 s; allow up to 60 s total.
        run: |
          for i in $(seq 1 12); do
            if nc -z localhost 40451 2>/dev/null; then
              echo "Port 40451 open after $((i * 5)) s"
              exit 0
            fi
            echo "Waiting... attempt $i/12"
            sleep 5
          done
          echo "ERROR: Timeout — dumping container logs:"
          docker logs opcua-server --tail 60
          exit 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install smoke test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r OPC_UA_Servers/Release2/tests/requirements.txt

      - name: Run smoke test (10 checks)
        run: |
          mkdir -p test-results
          python OPC_UA_Servers/Release2/tests/smoke_test.py \
            --tcp-timeout 30 \
            --junitxml test-results/smoke.xml

      - name: Upload Server Smoke results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-server-smoke-docker
          path: test-results/smoke.xml
          retention-days: 14

      - name: Dump container logs
        if: always()
        run: docker logs opcua-server --tail 60 || true  # diagnostic only; ignore errors if container already gone

      - name: Teardown container
        if: always()
        run: docker rm -f opcua-server || true

  # ───────────────────────────────────────────────────────────────────────────
  # Web Client - Docker Tests
  #   Builds both the 'test' target (Python unit + JS vitest inside container)
  #   and the 'production' target (HTTP health check on port 3000).
  # ───────────────────────────────────────────────────────────────────────────
  webclient-docker:
    name: "Web Client - Docker Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: docker-hub
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}   # empty string when secret absent

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Log in to Docker Hub (optional — increases pull rate limit)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build Web Client Docker image (test target)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: OPC_UA_Clients/Release2/IJT_Web_Client
          target: test
          tags: ijt-web-client:test-ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Python unit tests inside Docker
        run: |
          mkdir -p test-results
          docker run --rm \
            -v "${{ github.workspace }}/test-results:/out" \
            ijt-web-client:test-ci \
            python -m pytest tests/python/unit/ \
              -m "not checkout_hygiene" \
              -v --tb=short --no-header \
              --junitxml=/out/pytest-unit.xml

      - name: Run JS unit tests (vitest) inside Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/test-results:/out" \
            ijt-web-client:test-ci \
            npx vitest run --reporter=verbose --reporter=junit --outputFile.junit=/out/vitest.xml

      - name: Upload Web Client Docker results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-webclient-docker
          path: test-results/
          retention-days: 14

      - name: Build Web Client Docker image (production target)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: OPC_UA_Clients/Release2/IJT_Web_Client
          target: production
          tags: ijt-web-client:prod-ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start production container and verify HTTP health
        run: |
          docker run -d --name ijt-web-prod \
            -p 3000:3000 \
            -e IS_DOCKER=true \
            ijt-web-client:prod-ci
          echo "Waiting for HTTP on port 3000..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000 >/dev/null 2>&1; then
              echo "HTTP 200 OK after $((i * 3))s"
              exit 0
            fi
            echo "Attempt $i/20..."
            sleep 3
          done
          echo "ERROR: HTTP health check timed out. Container logs:"
          docker logs ijt-web-prod --tail 40
          exit 1

      - name: Teardown Web Client container
        if: always()
        run: docker rm -f ijt-web-prod || true

  # ───────────────────────────────────────────────────────────────────────────
  # Test Client - Windows Live Tests
  #   Runs the full IJT Test Client suite against the native Windows OPC UA
  #   server binary.  Split from the old monolithic integration-tests job so
  #   it runs in parallel with int-live-others (Web Client + Console).
  # ───────────────────────────────────────────────────────────────────────────
  int-testclient:
    name: "Test Client - Windows Live (port 40462)"
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install `
            -r OPC_UA_Servers/Release2/tests/requirements.txt `
            -r OPC_UA_Clients/Release2/IJT_Test_Client/requirements.txt `
            -r OPC_UA_Clients/Release2/IJT_Test_Client/requirements-dev.txt

      - name: Extract server ZIP
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force

      - name: Start OPC UA server on port 40462
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40462

      - name: Run smoke test (quick server sanity check)
        env:
          OPCUA_SERVER_URL: opc.tcp://localhost:40462
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          python OPC_UA_Servers/Release2/tests/smoke_test.py `
            --tcp-timeout 30 `
            --junitxml test-results/smoke-sanity.xml

      - name: Run IJT Test Client tests (all tests)
        working-directory: OPC_UA_Clients/Release2/IJT_Test_Client
        env:
          OPCUA_SERVER_URL: opc.tcp://localhost:40462
          OPCUA_CAPABILITIES_FILE: server_capabilities.simulator.yaml
        run: |
          python -m pytest `
            conformance/ assets/ joining_process/ results/ joint/ events/ common/ `
            -v --tb=short -rs --timeout=120 `
            --durations=30 `
            --junitxml=test-results/pytest.xml `
            --html=test-results/report.html --self-contained-html

      - name: Generate Excel report and CI Step Summary
        if: always()
        working-directory: OPC_UA_Clients/Release2/IJT_Test_Client
        env:
          OPCUA_SERVER_URL: opc.tcp://localhost:40462
          OPCUA_CAPABILITIES_FILE: server_capabilities.simulator.yaml
        run: |
          python scripts/make_excel_report.py
          python scripts/make_ci_summary.py

      - name: Collect test results into flat directory
        if: always()
        shell: pwsh
        run: |
          Copy-Item OPC_UA_Clients/Release2/IJT_Test_Client/test-results/pytest.xml `
            test-results/pytest.xml -ErrorAction SilentlyContinue
          Copy-Item OPC_UA_Clients/Release2/IJT_Test_Client/test-results/report.html `
            test-results/report.html -ErrorAction SilentlyContinue
          Copy-Item OPC_UA_Clients/Release2/IJT_Test_Client/test-results/report.xlsx `
            test-results/report.xlsx -ErrorAction SilentlyContinue
          Copy-Item OPC_UA_Clients/Release2/IJT_Test_Client/test-results/summary.md `
            test-results/summary.md -ErrorAction SilentlyContinue

      - name: Upload Test Client results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-testclient
          path: |
            test-results/pytest.xml
            test-results/smoke-sanity.xml
            test-results/report.html
            test-results/report.xlsx
            test-results/summary.md
          retention-days: 14

      - name: Stop OPC UA server
        if: always()
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40462 --stop

  # ───────────────────────────────────────────────────────────────────────────
  # Web Client - Windows Live Runner Matrix
  #   Runs the non-browser Web Client live suites on Windows.
  #   Each suite owns its OPC UA server, WebSocket backend, and results directory.
  # ───────────────────────────────────────────────────────────────────────────
  live-webclient:
    name: "Web Client - ${{ matrix.label }}"
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: web-client-live-opcua-direct
            label: "Direct OPC UA"
          - suite: web-client-live-websocket-api
            label: "WebSocket API"
          - suite: web-client-live-websocket-connection
            label: "WebSocket Connection"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"

      - name: Run Web Client local live suite
        run: python run_all_tests.py --suite "${{ matrix.suite }}" --verbose

      - name: Upload Web Client results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-live-webclient-${{ matrix.suite }}
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Web Client - Browser E2E Runner Matrix
  #   Runs every Playwright/headless-Chromium suite in the pinned Linux
  #   Playwright image. Windows browser compatibility coverage is tracked
  #   separately so the bulk browser logic suite does not depend on
  #   Windows-hosted Chromium process stability.
  # ───────────────────────────────────────────────────────────────────────────
  live-webclient-browser:
    name: "Web Client Browser - ${{ matrix.label }}"
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble@sha256:83192064c7510f7ee73dd63dc5f22a5e01a92c81a2e6a9c715d9e3fe55471fd9
      options: --ipc=host
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: web-client-e2e-smoke
            label: "Browser Smoke"
            feature_shard: ""
            shard_suffix: ""
          - suite: web-client-e2e-features
            label: "Browser Features (1/2)"
            feature_shard: "1/2"
            shard_suffix: "-shard-1of2"
          - suite: web-client-e2e-features
            label: "Browser Features (2/2)"
            feature_shard: "2/2"
            shard_suffix: "-shard-2of2"
          - suite: web-client-e2e-regression
            label: "Browser Regression"
            feature_shard: ""
            shard_suffix: ""

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Install setup-python OS helper
        run: |
          apt-get update
          apt-get install -y --no-install-recommends lsb-release
          rm -rf /var/lib/apt/lists/*

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"

      - name: Run Web Client browser e2e suite
        env:
          IJT_PLAYWRIGHT_SHARD: ${{ matrix.feature_shard || '' }}
        run: python run_all_tests.py --suite "${{ matrix.suite }}" --verbose

      - name: Upload Web Client browser results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-live-webclient-${{ matrix.suite }}${{ matrix.shard_suffix || '' }}
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Console Client - Windows Live Tests (port 40461)
  #   Runs Console Client live test suite against a dedicated server instance.
  #   Uses dedicated port 40461 — safe to run in parallel with other live jobs.
  # ───────────────────────────────────────────────────────────────────────────
  live-console:
    name: "Console Client - Windows Live Tests (port 40461)"
    runs-on: windows-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install Console Client dependencies
        run: |
          python -m pip install --upgrade pip
          pip install `
            -r OPC_UA_Clients/Release2/IJT_Console_Client/requirements.txt `
            -r OPC_UA_Clients/Release2/IJT_Console_Client/requirements-dev.txt

      - name: Extract server ZIP
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force

      - name: Start OPC UA server on port 40461
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40461

      - name: Run Console Client live tests
        working-directory: OPC_UA_Clients/Release2/IJT_Console_Client
        env:
          OPCUA_SERVER_URL: opc.tcp://localhost:40461
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          python -m pytest tests/live/ `
            -v --tb=short --timeout=120 `
            --junitxml=test-results/pytest-live.xml

      - name: Upload Console Client results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-live-console
          path: OPC_UA_Clients/Release2/IJT_Console_Client/test-results/
          retention-days: 14

      - name: Stop OPC UA server
        if: always()
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40461 --stop

  # ───────────────────────────────────────────────────────────────────────────
  # C# Client - Live Tests (nightly, port 40464)
  #   Nightly drift detection for live C# behavior outside fast CI.
  #   Non-blocking: failures are visible but do not gate merges.
  #   Port 40464 is the C# client's dedicated port — see docs/TEST_TIERS.md.
  # ───────────────────────────────────────────────────────────────────────────
  csharp-live:
    name: "C# Client - Live Tests (port 40464)"
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_CSharp_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract server ZIP
        working-directory: ${{ github.workspace }}
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force

      - name: Start OPC UA server on port 40464
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40464

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: '10.x'

      - name: Prepare C# test-result artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          '<?xml version="1.0"?><testsuites tests="0" failures="0"><testsuite name="IJT_CSharp_Client.Tests.Live" tests="0"/></testsuites>' | Out-File test-results\tests.xml -Encoding UTF8

      - name: Restore NuGet Packages
        run: |
          $target = "Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj"
          $lockFiles = Get-ChildItem -Path . -Recurse -Filter "packages.lock.json" -File -ErrorAction SilentlyContinue
          if ($lockFiles.Count -gt 0) {
            Write-Host "Lock files detected — using locked mode restore."
            dotnet restore $target --locked-mode
          } else {
            Write-Host "No lock files yet — using normal restore."
            dotnet restore $target
          }

      - name: Scan for Vulnerable NuGet Packages
        shell: pwsh
        run: |
          $target = "Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj"
          $output = dotnet list $target package --vulnerable --include-transitive --no-restore 2>&1
          $scanExit = $LASTEXITCODE
          Write-Host $output
          if ($output -match "has the following vulnerable packages") {
            Write-Host "##[warning]Vulnerable NuGet packages detected (nightly scan)."
            exit 0
          }
          if ($scanExit -ne 0) {
            exit $scanExit
          }

      - name: Build
        id: build
        continue-on-error: true
        run: dotnet build Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj --no-restore --configuration Release

      - name: Run xUnit Live Tests
        id: tests
        if: steps.build.outcome == 'success'
        continue-on-error: true
        env:
          IJT_AUTO_ACCEPT: 'true'
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          dotnet test Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj `
            --no-build `
            --no-restore `
            --configuration Release `
            --filter "Category=Live" `
            --logger "trx;LogFileName=tests.trx" `
            --logger "console;verbosity=normal" `
            --results-directory test-results `
            --blame-hang --blame-hang-timeout 120s

      - name: Convert TRX to JUnit XML
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          $trx   = "test-results\tests.trx"
          $junit = "test-results\tests.xml"
          if (Test-Path $trx) {
            [xml]$x = Get-Content $trx
            $ns = @{ t = "http://microsoft.com/schemas/VisualStudio/TeamTest/2010" }
            $results = Select-Xml -Xml $x -XPath "//t:UnitTestResult" -Namespace $ns | Select-Object -ExpandProperty Node
            $passed  = ($results | Where-Object { $_.outcome -eq "Passed"  }).Count
            $failed  = ($results | Where-Object { $_.outcome -eq "Failed"  }).Count
            $skipped = ($results | Where-Object { $_.outcome -eq "NotExecuted" }).Count
            $total   = $results.Count
            $xml  = '<?xml version="1.0" encoding="UTF-8"?>' + "`n"
            $xml += "<testsuites tests=`"$total`" failures=`"$failed`" skipped=`"$skipped`">`n"
            $xml += "  <testsuite name=`"IJT_CSharp_Client.Tests.Live`" tests=`"$total`" failures=`"$failed`" skipped=`"$skipped`">`n"
            foreach ($r in $results) {
              $name = [System.Security.SecurityElement]::Escape($r.testName)
              $outcome = $r.outcome
              if ($outcome -eq "Passed") {
                $xml += "    <testcase name=`"$name`" classname=`"IJT`" />`n"
              } elseif ($outcome -eq "NotExecuted") {
                $msgRaw = ([string]$r.Output.ErrorInfo.Message).Trim()
                if ([string]::IsNullOrWhiteSpace($msgRaw)) { $msgRaw = "Test skipped by xUnit" }
                $msg = [System.Security.SecurityElement]::Escape($msgRaw)
                $xml += "    <testcase name=`"$name`" classname=`"IJT`"><skipped message=`"$msg`">$msg</skipped></testcase>`n"
              } else {
                $msg = [System.Security.SecurityElement]::Escape($r.Output.ErrorInfo.Message)
                $xml += "    <testcase name=`"$name`" classname=`"IJT`"><failure>$msg</failure></testcase>`n"
              }
            }
            $xml += "  </testsuite>`n</testsuites>"
            $xml | Out-File $junit -Encoding UTF8
            Write-Host "Converted TRX → JUnit: $total tests, $failed failures, $skipped skipped"
          } else {
            Write-Host "No TRX file found — creating empty JUnit"
            '<?xml version="1.0"?><testsuites tests="0" failures="0"><testsuite name="IJT_CSharp_Client.Tests.Live" tests="0"/></testsuites>' | Out-File $junit -Encoding UTF8
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-csharp-live
          path: OPC_UA_Clients/Release2/IJT_CSharp_Client/test-results/
          retention-days: 14

      - name: Stop OPC UA server
        if: always()
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40464 --stop

      - name: Fail if Tests Failed
        if: always() && (steps.build.outcome == 'failure' || steps.tests.outcome == 'failure')
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
        run: |
          echo "C# live tests failed:"
          echo "  build -> $BUILD_OUTCOME"
          echo "  tests -> $TESTS_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Combined Report — always runs after all jobs.
  # Writes the root-level summary table to the Actions Summary page.
  # ───────────────────────────────────────────────────────────────────────────
  report:
    name: "📋 Extended Test Report"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [server-smoke-docker, webclient-docker, int-testclient, live-webclient, live-webclient-browser, live-console, csharp-live]
    if: always()
    permissions:
      actions: read
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Download All Test Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: all-results/

      - name: "Report — OPC UA Server Smoke (Docker)"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "OPC UA Server — Smoke Tests (Docker Linux)"
          path: all-results/results-server-smoke-docker/smoke.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Web Client Docker Python Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client Docker — Python Tests"
          path: all-results/results-webclient-docker/pytest-unit.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Web Client Docker JS Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client Docker — JS Tests (Vitest)"
          path: all-results/results-webclient-docker/vitest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Test Client Conformance Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Test Client — Conformance Tests (Live)"
          path: all-results/results-testclient/pytest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Web Client Integration Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — Local Live Suites"
          path: all-results/results-live-webclient-*/**/*.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Console Client Live Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Console Client — Live Tests"
          path: all-results/results-live-console/**/pytest-live.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — C# Client Live Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "C# Client — Live Tests (xUnit)"
          path: all-results/results-csharp-live/tests.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Generate Summary Table
        env:
          SD_RESULT:   ${{ needs.server-smoke-docker.result }}
          WD_RESULT:   ${{ needs.webclient-docker.result }}
          TC_RESULT:   ${{ needs.int-testclient.result }}
          WC_RESULT:   ${{ needs.live-webclient.result }}
          WB_RESULT:   ${{ needs.live-webclient-browser.result }}
          CON_RESULT:  ${{ needs.live-console.result }}
          CS_RESULT:   ${{ needs.csharp-live.result }}
          GH_SHA:         ${{ github.sha }}
          GH_BRANCH:      ${{ github.ref_name }}
          GH_RUN_NUMBER:  ${{ github.run_number }}
          GH_RUN_URL:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_REPOSITORY:  ${{ github.repository }}
          GH_RUN_ID:      ${{ github.run_id }}
          GH_API_URL:     ${{ github.api_url }}
          GH_TOKEN:       ${{ github.token }}
          REPORT_JOB_NAME: "📋 Extended Test Report"
        run: |
          python3 - << 'PYEOF'
          import datetime, glob, json, os, sys, urllib.request
          import xml.etree.ElementTree as ET
          from collections import Counter

          # ── Parsers ──────────────────────────────────────────────────────

          def iter_suites(root):
              """Return all testsuite nodes for both bare and nested JUnit XML."""
              return [root] if root.tag == "testsuite" else root.findall(".//testsuite")

          def parse_junit(pattern):
              total = passed = failed = skipped = 0
              found = False
              for path in glob.glob(pattern, recursive=True):
                  try:
                      root   = ET.parse(path).getroot()
                      suites = iter_suites(root)
                      t  = sum(int(s.get("tests",    0)) for s in suites)
                      f  = sum(int(s.get("failures", 0)) + int(s.get("errors", 0)) for s in suites)
                      sk = sum(int(s.get("skipped",  0)) for s in suites)
                      total += t
                      passed += t - f - sk
                      failed += f
                      skipped += sk
                      found = True
                  except Exception as exc:
                      print(f"[WARN] parse_junit({path}): {exc}")
              if found:
                  return total, passed, failed, skipped
              return None, None, None, None

          def collect_skips(pattern):
              """Extract skipped test names and reasons from JUnit XML."""
              skips_list = []
              for path in glob.glob(pattern, recursive=True):
                  try:
                      root = ET.parse(path).getroot()
                      for tc in root.findall(".//testcase"):
                          el = tc.find("skipped")
                          if el is not None:
                              name = tc.get("name", "unknown")
                              msg = (el.get("message") or el.text or "").split("\n")[0][:200]
                              skips_list.append((name, msg or "no reason given"))
                  except Exception as exc:
                      print(f"[WARN] collect_skips({path}): {exc}")
              return skips_list

          def md_cell(value):
              """Escape text for a GitHub markdown table cell."""
              text = str(value or "").replace("\r", " ").replace("\n", " ")
              return text.replace("|", "\\|").replace("<", "&lt;").replace(">", "&gt;")

          def format_skip_section(label, skips_list, skip_count=None):
              """Collapsible markdown section with skip reasons grouped by count."""
              reported_count = skip_count if skip_count is not None else len(skips_list)
              if reported_count is not None:
                  reported_count = max(reported_count, len(skips_list))
              if not skips_list and (reported_count is None or reported_count <= 0):
                  return []
              reasons = Counter(msg for _, msg in skips_list)
              if reported_count is not None and reported_count > len(skips_list):
                  reasons["Skip details unavailable in JUnit XML"] += reported_count - len(skips_list)
              lines = [
                  "",
                  f"<details><summary>⏭️ <b>{label}</b> — {reported_count} skipped</summary>",
                  "",
                  "| Reason | Count |",
                  "|:-------|------:|",
              ]
              for reason, count in reasons.most_common():
                  lines.append(f"| {md_cell(reason)} | {count} |")
              lines += ["", "</details>"]
              return lines

          def skip_note_inline(skips_list, skip_count=None, default="—"):
              """Short inline note for table Notes column."""
              if skips_list:
                  reasons = Counter(msg for _, msg in skips_list)
                  top = reasons.most_common(1)[0][0] if reasons else ""
                  if len(reasons) == 1:
                      return md_cell(top[:60])
                  return f"{len(reasons)} skip reasons — see below"
              if skip_count is not None and skip_count > 0:
                  return "Skip details unavailable in JUnit XML"
              return default

          def load_integration_baseline(path="tests/baselines/integration-test-counts.json"):
              """Load the committed Integration test-count baseline."""
              try:
                  with open(path, encoding="utf-8") as fh:
                      payload = json.load(fh)
                  suites = payload.get("suites", {})
                  if payload.get("schema_version") != 1 or not isinstance(suites, dict):
                      raise ValueError("unsupported baseline schema")
                  return payload, None
              except Exception as exc:
                  return {"suites": {}, "skip_tolerance_default": 0}, (
                      f"⚠️ **Integration baseline unavailable**: `{path}` could not be loaded "
                      f"({md_cell(exc)}). Test-count deltas and skip drift warnings are disabled."
                  )

          def baseline_suite(baseline, key):
              entry = baseline.get("suites", {}).get(key)
              return entry if isinstance(entry, dict) else None

          def format_count_delta(total, baseline):
              """Return a compact nonzero test-count delta such as (+3) or (-2)."""
              if total is None or not baseline:
                  return ""
              try:
                  expected = int(baseline.get("tests"))
              except (TypeError, ValueError):
                  return ""
              delta = total - expected
              return "" if delta == 0 else f" ({delta:+d})"

          def integration_drift_warnings(baseline, suite_counts):
              """Build non-failing warnings for test-count and skip-count drift."""
              warnings = []
              default_tolerance = int(baseline.get("skip_tolerance_default", 0) or 0)
              for key, label, counts in suite_counts:
                  entry = baseline_suite(baseline, key)
                  if not entry or counts[0] is None:
                      continue
                  total, _passed, _failed, skipped = counts
                  expected_tests = entry.get("tests")
                  if expected_tests is not None:
                      delta = total - int(expected_tests)
                      if delta != 0:
                          reanchor_command = f"python tests/tools/update_integration_baseline.py --run {run_id} --suite {key}"
                          warnings.append(
                              f"⚠️ **{label}**: {total:,} tests ({delta:+d} vs baseline "
                              f"{int(expected_tests):,}) — investigate suite collection drift."
                              f" After review, re-anchor with `{reanchor_command}`."
                          )

                  expected_skips = entry.get("skipped")
                  if expected_skips is None or skipped is None:
                      continue
                  tolerance = int(entry.get("skip_tolerance", default_tolerance) or 0)
                  skip_delta = skipped - int(expected_skips)
                  if skip_delta > tolerance:
                      reanchor_command = f"python tests/tools/update_integration_baseline.py --run {run_id} --suite {key}"
                      warnings.append(
                          f"⚠️ **{label}**: {skipped:,} skipped ({skip_delta:+d} vs baseline "
                          f"{int(expected_skips):,}; tolerance +{tolerance}) — investigate skip drift."
                          f" After review, re-anchor with `{reanchor_command}`."
                      )
              return warnings

          def non_test_client_skip_failures(suite_counts):
              """Build hard failures for skips outside IJT Test Client conformance."""
              failures = []
              for key, label, counts in suite_counts:
                  if key == "tc_tests" or counts[3] is None:
                      continue
                  skipped = int(counts[3])
                  if skipped:
                      failures.append(
                          f"❌ **{label}**: {skipped:,} skipped — only IJT Test Client conformance "
                          "may skip Not Implemented / Not Supported coverage."
                      )
              return failures

          def seconds(value):
              """Parse a timing-artifact duration as float seconds."""
              try:
                  return float(value or 0.0)
              except (TypeError, ValueError):
                  return 0.0

          def format_duration(value):
              """Format seconds compactly for the GitHub Actions summary."""
              value = seconds(value)
              if value >= 60.0:
                  return f"{value / 60.0:.1f} min"
              return f"{value:.1f} s"

          def format_optional_duration(value):
              """Format an optional duration; running jobs have no completed duration yet."""
              return "—" if value is None else format_duration(value)

          def parse_actions_time(value):
              """Parse an Actions API timestamp into a timezone-aware datetime."""
              text = str(value or "").strip()
              if not text:
                  return None
              try:
                  return datetime.datetime.fromisoformat(text.replace("Z", "+00:00"))
              except ValueError:
                  return None

          def next_link(header):
              """Return the next pagination URL from a GitHub Link header."""
              for part in str(header or "").split(","):
                  pieces = [piece.strip() for piece in part.split(";")]
                  if len(pieces) < 2 or pieces[1] != 'rel="next"':
                      continue
                  target = pieces[0]
                  if target.startswith("<") and target.endswith(">"):
                      return target[1:-1]
              return None

          def job_durations(path):
              """Load completed current-run job durations, excluding this report job."""
              token = os.environ.get("GH_TOKEN") or os.environ.get("GITHUB_TOKEN")
              if not path or not token:
                  return []
              report_job_name = os.environ.get("REPORT_JOB_NAME", "").strip()
              api_root = (
                  os.environ.get("GH_API_URL")
                  or os.environ.get("GITHUB_API_URL")
                  or "https://api.github.com"
              ).rstrip("/")
              url = f"{api_root}/{path.lstrip('/')}"
              headers = {
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "User-Agent": "ijt-integration-report",
                  "X-GitHub-Api-Version": "2022-11-28",
              }
              rows = []
              try:
                  while url:
                      request = urllib.request.Request(url, headers=headers)
                      with urllib.request.urlopen(request, timeout=20) as response:
                          payload = json.load(response)
                          for job in payload.get("jobs", []):
                              name = str(job.get("name") or "unknown")
                              if report_job_name and name == report_job_name:
                                  continue
                              started = parse_actions_time(job.get("started_at"))
                              completed = parse_actions_time(job.get("completed_at"))
                              duration = None
                              if started and completed:
                                  duration = max((completed - started).total_seconds(), 0.0)
                              if duration is None and job.get("status") != "completed":
                                  continue
                              rows.append(
                                  (
                                      name,
                                      duration,
                                      str(job.get("conclusion") or job.get("status") or "unknown"),
                                  )
                              )
                          url = next_link(response.headers.get("Link"))
              except Exception as exc:
                  print(f"[WARN] job_durations({path}): {exc}")
                  return []
              return sorted(rows, key=lambda row: (row[1] is None, -(row[1] or 0.0), row[0]))

          def browser_feature_timings(pattern):
              """Load Web Client Browser Features stage timing artifacts."""
              rows = []
              for path in sorted(glob.glob(pattern, recursive=True)):
                  try:
                      with open(path, encoding="utf-8") as fh:
                          payload = json.load(fh)
                  except Exception as exc:
                      print(f"[WARN] browser_feature_timings({path}): {exc}")
                      continue

                  artifact = os.path.basename(os.path.dirname(path))
                  if artifact.endswith("-shard-1of2"):
                      shard = "1/2"
                  elif artifact.endswith("-shard-2of2"):
                      shard = "2/2"
                  else:
                      shard = "full"

                  stages = {
                      stage.get("name", ""): seconds(stage.get("duration_seconds"))
                      for stage in payload.get("stages", [])
                      if isinstance(stage, dict)
                  }
                  total = seconds(payload.get("total_seconds"))
                  setup = sum(
                      stages.get(name, 0.0)
                      for name in ("pip-install", "npm-install", "playwright-install")
                  )
                  body = stages.get("playwright-features", 0.0)
                  rows.append(
                      {
                          "shard": shard,
                          "total": total,
                          "pip": stages.get("pip-install", 0.0),
                          "npm": stages.get("npm-install", 0.0),
                          "playwright_install": stages.get("playwright-install", 0.0),
                          "playwright_features": body,
                          "other": max(total - setup - body, 0.0),
                      }
                  )
              return rows

          def trx_duration_seconds(value):
              """Parse TRX duration strings such as 00:00:05.1234567."""
              text = str(value or "").strip()
              if not text:
                  return 0.0
              try:
                  parts = text.split(":")
                  if len(parts) == 3:
                      hours, minutes, secs = parts
                      return (int(hours) * 3600) + (int(minutes) * 60) + float(secs)
                  return float(text)
              except (TypeError, ValueError):
                  return 0.0

          def split_csharp_test_name(name):
              """Return class and method from a fully qualified xUnit test name."""
              text = str(name or "unknown")
              if "." not in text:
                  return "unknown", text
              return text.rsplit(".", 1)

          def short_csharp_class(name):
              """Keep C# timing tables compact in the Actions summary."""
              return str(name or "unknown").rsplit(".", 1)[-1]

          def csharp_live_timings(pattern):
              """Load C# Live per-test timings from TRX artifacts."""
              results = []
              for path in sorted(glob.glob(pattern, recursive=True)):
                  try:
                      root = ET.parse(path).getroot()
                  except Exception as exc:
                      print(f"[WARN] csharp_live_timings({path}): {exc}")
                      continue

                  for node in root.iter():
                      if not str(node.tag).endswith("UnitTestResult"):
                          continue
                      test_name = node.get("testName") or "unknown"
                      class_name, method_name = split_csharp_test_name(test_name)
                      results.append(
                          {
                              "class": class_name,
                              "method": method_name,
                              "duration": trx_duration_seconds(node.get("duration")),
                              "outcome": node.get("outcome") or "unknown",
                          }
                      )

              if not results:
                  return None

              classes = {}
              for row in results:
                  bucket = classes.setdefault(
                      row["class"],
                      {"class": row["class"], "tests": 0, "total": 0.0, "max": 0.0},
                  )
                  bucket["tests"] += 1
                  bucket["total"] += row["duration"]
                  bucket["max"] = max(bucket["max"], row["duration"])
              class_rows = sorted(
                  classes.values(),
                  key=lambda row: (-row["total"], short_csharp_class(row["class"])),
              )
              top_rows = sorted(results, key=lambda row: row["duration"], reverse=True)[:10]
              return {"classes": class_rows, "top": top_rows}

          # ── Formatters ───────────────────────────────────────────────────

          def job_icon(r):
              return {
                  "success": "✅",
                  "failure": "❌",
                  "cancelled": "🚫",
                  "skipped": "⏭️",
              }.get(r, "⚠️")

          def tests(total, passed, failed, skipped=0, baseline=None):
              if total is None:
                  return "—"
              delta = format_count_delta(total, baseline)
              if failed == 0:
                  return f"✅ {total:,}{delta}"
              return f"❌ {passed:,} / {total:,}{delta}"

          def skips(sk):
              return "—" if sk is None else str(sk)

          # ── Load ENV ─────────────────────────────────────────────────────

          E = os.environ.get

          sd_r  = E("SD_RESULT",  "unknown")
          wd_r  = E("WD_RESULT",  "unknown")
          tc_r  = E("TC_RESULT",  "unknown")
          wc_r  = E("WC_RESULT",  "unknown")
          wb_r  = E("WB_RESULT",  "unknown")
          con_r = E("CON_RESULT", "unknown")
          cs_r  = E("CS_RESULT",  "unknown")

          sha     = (E("GH_SHA",        "") or "")[:8]
          branch  = E("GH_BRANCH",      "main")
          run_num = E("GH_RUN_NUMBER",  "")
          run_url = E("GH_RUN_URL",     "")

          # ── Parse artifacts ──────────────────────────────────────────────

          sd_smoke  = parse_junit("all-results/results-server-smoke-docker/smoke.xml")
          wd_py     = parse_junit("all-results/results-webclient-docker/pytest-unit.xml")
          wd_js     = parse_junit("all-results/results-webclient-docker/vitest.xml")
          tc_smoke  = parse_junit("all-results/results-testclient/smoke-sanity.xml")
          tc_tests  = parse_junit("all-results/results-testclient/pytest.xml")
          wc_live   = parse_junit("all-results/results-live-webclient-web-client-live-*/**/*.xml")
          wc_browser = parse_junit("all-results/results-live-webclient-web-client-e2e-*/**/*.xml")
          con_live  = parse_junit("all-results/results-live-console/**/pytest-live.xml")
          cs_live   = parse_junit("all-results/results-csharp-live/tests.xml")
          wc_feature_timings = browser_feature_timings(
              "all-results/results-live-webclient-web-client-e2e-features*/**/timing-latest.json"
          )
          cs_live_timings = csharp_live_timings("all-results/results-csharp-live/**/*.trx")
          job_timings = job_durations(
              f"repos/{E('GH_REPOSITORY', '')}/actions/runs/{E('GH_RUN_ID', '')}/jobs"
          )
          integration_baseline, baseline_warning = load_integration_baseline()

          # ── Collect skip details from JUnit XML ───────────────────────

          sd_smoke_skips = collect_skips("all-results/results-server-smoke-docker/smoke.xml")
          wd_py_skips = collect_skips("all-results/results-webclient-docker/pytest-unit.xml")
          wd_js_skips = collect_skips("all-results/results-webclient-docker/vitest.xml")
          tc_smoke_skips = collect_skips("all-results/results-testclient/smoke-sanity.xml")
          tc_conf_skips = collect_skips("all-results/results-testclient/pytest.xml")
          con_live_skips = collect_skips("all-results/results-live-console/**/pytest-live.xml")
          wc_live_skips = collect_skips("all-results/results-live-webclient-web-client-live-*/**/*.xml")
          wc_browser_skips = collect_skips("all-results/results-live-webclient-web-client-e2e-*/**/*.xml")
          cs_live_skips = collect_skips("all-results/results-csharp-live/tests.xml")

          # ── Artifact sanity gate ─────────────────────────────────────────

          artifact_warnings = []
          def _warn(job_result, val, job_name, artifact):
              if job_result == "success" and val is None:
                  artifact_warnings.append(
                      f"⚠️ **{job_name}**: job succeeded but `{artifact}` not found — possible silent failure"
                  )
          _warn(sd_r,  sd_smoke[0],  "server-smoke-docker", "smoke.xml")
          _warn(wd_r,  wd_py[0],     "webclient-docker",    "pytest-unit.xml")
          _warn(wd_r,  wd_js[0],     "webclient-docker",    "vitest.xml")
          _warn(tc_r,  tc_smoke[0],  "int-testclient",      "smoke-sanity.xml")
          _warn(tc_r,  tc_tests[0],  "int-testclient",      "pytest.xml")
          _warn(wc_r,  wc_live[0],   "live-webclient",      "JUnit XML")
          _warn(wb_r,  wc_browser[0], "live-webclient-browser", "JUnit XML")
          _warn(con_r, con_live[0],  "live-console",        "pytest-live.xml")
          _warn(cs_r,  cs_live[0],   "csharp-live",         "tests.xml")

          suite_counts = [
              ("sd_smoke", "OPC UA Server — Docker Smoke", sd_smoke),
              ("wd_py", "Web Client — Docker Python Unit", wd_py),
              ("wd_js", "Web Client — Docker JavaScript", wd_js),
              ("tc_smoke", "Test Client — Smoke Sanity", tc_smoke),
              ("tc_tests", "Test Client — Conformance", tc_tests),
              ("wc_live", "Web Client — Python/WebSocket Live", wc_live),
              ("wc_browser", "Web Client — Browser E2E", wc_browser),
              ("con_live", "Console Client — Live", con_live),
              ("cs_live", "C# Client — Live", cs_live),
          ]
          skip_policy_failures = non_test_client_skip_failures(suite_counts)
          report_warnings = integration_drift_warnings(integration_baseline, suite_counts)
          if baseline_warning:
              report_warnings.insert(0, baseline_warning)

          # ── Overall status ────────────────────────────────────────────────

          all_suites_data = [sd_smoke, wd_py, wd_js, tc_smoke, tc_tests, wc_live, wc_browser, con_live, cs_live]
          total_t  = sum(s[0] for s in all_suites_data if s[0] is not None)
          total_f  = sum(s[2] for s in all_suites_data if s[2] is not None)
          total_sk = sum(s[3] for s in all_suites_data if s[3] is not None)
          if total_t > 0:
              totals_str = f"{total_t:,} tests &nbsp;·&nbsp; {total_f} failed &nbsp;·&nbsp; {total_sk} skipped"
          else:
              totals_str = "no test data"

          core_jobs = [sd_r, wd_r, tc_r, wc_r, wb_r, con_r, cs_r]
          n_pass  = sum(1 for r in core_jobs if r == "success")
          n_fail  = sum(1 for r in core_jobs if r == "failure")
          n_total = len(core_jobs)

          if n_fail == 0 and not skip_policy_failures:
              status_icon = "✅"
              status_msg  = f"All {n_pass} / {n_total} jobs passed &nbsp;·&nbsp; {totals_str}"
          else:
              status_icon = "❌"
              if skip_policy_failures and n_fail == 0:
                  status_msg = f"Skip policy gate failed &nbsp;·&nbsp; {totals_str}"
              else:
                  status_msg = f"{n_fail} / {n_total} jobs failed &nbsp;·&nbsp; {n_pass} passed &nbsp;·&nbsp; {totals_str}"

          run_link = f"[#{run_num}]({run_url})" if run_url else f"#{run_num}"
          sha_str  = f"`{sha}`" if sha else "—"

          # ── Build report ──────────────────────────────────────────────────

          out = [
              "## IJT OPC UA — Integration",
              "",
              f"> {status_icon} **{status_msg}**",
              f"> **Branch:** `{branch}` &nbsp;·&nbsp; **Commit:** {sha_str} &nbsp;·&nbsp; **Run:** {run_link}",
              "> Nightly integration and live tests — full OPC UA stack on Windows + Linux browser container + Docker",
              "",
              "---",
              "",
          ]

          if skip_policy_failures:
              out += ["### ❌ Skip Policy Failures", ""]
              out += skip_policy_failures
              out += ["", "---", ""]

          if report_warnings:
              out += ["### ⚠️ Report Warnings", ""]
              out += report_warnings
              out += ["", "---", ""]

          if job_timings:
              out += [
                  "### ⏱️ Job Durations",
                  "",
                  "> Source: current workflow run jobs API. Report job duration is excluded because a report cannot measure its own completed duration; see the workflow run page for its time.",
                  "",
                  "| Job | Duration | Status |",
                  "|:----|---------:|:-------|",
              ]
              long_pole_marked = False
              for name, duration, conclusion in job_timings:
                  marker = ""
                  if duration is not None and not long_pole_marked:
                      marker = "🏁 "
                      long_pole_marked = True
                  out.append(
                      f"| {marker}{md_cell(name)} | {format_optional_duration(duration)} | "
                      f"{job_icon(conclusion)} {md_cell(conclusion)} |"
                  )
              out += ["", "---", ""]

          out += [
              "### 🐳 Docker Tests",
              "",
              "> Platform: Ubuntu latest — containerized OPC UA server",
              "",
              "| Suite | Tests | Skipped |",
              "|:------|------:|--------:|",
              f"| OPC UA Server — Smoke    | {tests(*sd_smoke, baseline=baseline_suite(integration_baseline, 'sd_smoke'))} | {skips(sd_smoke[3])} |",
              f"| Web Client — Python unit | {tests(*wd_py, baseline=baseline_suite(integration_baseline, 'wd_py'))} | {skips(wd_py[3])} |",
              f"| Web Client — JavaScript  | {tests(*wd_js, baseline=baseline_suite(integration_baseline, 'wd_js'))} | {skips(wd_js[3])} |",
              "",
              "---",
              "",
              "### 🖥️ Live Integration Tests",
              "",
              "> Platform: Windows Server — native OPC UA server (dedicated ports per client)",
              "",
              "| Suite | Port | Tests | Skipped | Notes |",
              "|:------|-----:|------:|--------:|:------|",
              f"| Test Client — Smoke sanity       | 40462 | {tests(*tc_smoke, baseline=baseline_suite(integration_baseline, 'tc_smoke'))} | {skips(tc_smoke[3])} | Server and namespace reachability |",
              f"| Test Client — Conformance (live) | 40462 | {tests(*tc_tests, baseline=baseline_suite(integration_baseline, 'tc_tests'))} | {skips(tc_tests[3])} | {skip_note_inline(tc_conf_skips, tc_tests[3])} |",
              f"| Web Client — Python/WebSocket    | 40463/40466/40467 | {tests(*wc_live, baseline=baseline_suite(integration_baseline, 'wc_live'))} | {skips(wc_live[3])} | {skip_note_inline(wc_live_skips, wc_live[3], 'OPC UA subscriptions + WebSocket')} |",
              f"| Console Client — Live            | 40461 | {tests(*con_live, baseline=baseline_suite(integration_baseline, 'con_live'))} | {skips(con_live[3])} | {skip_note_inline(con_live_skips, con_live[3])} |",
              f"| C# Client — Live (xUnit)         | 40464 | {tests(*cs_live, baseline=baseline_suite(integration_baseline, 'cs_live'))} | {skips(cs_live[3])} | {skip_note_inline(cs_live_skips, cs_live[3], 'Nightly drift detection')} |",
              "",
              "---",
              "",
              "### Browser E2E Tests",
              "",
              "> Platform: Ubuntu latest — pinned Playwright Linux container `mcr.microsoft.com/playwright:v1.60.0-noble@sha256:83192064c7510f7ee73dd63dc5f22a5e01a92c81a2e6a9c715d9e3fe55471fd9`",
              "",
              "| Suite | Surface | Tests | Skipped | Notes |",
              "|:------|:--------|------:|--------:|:------|",
              f"| Web Client — Browser E2E | Chromium DOM/JS + OPC UA WebSocket + result/event UX | {tests(*wc_browser, baseline=baseline_suite(integration_baseline, 'wc_browser'))} | {skips(wc_browser[3])} | {skip_note_inline(wc_browser_skips, wc_browser[3], 'Headless Chromium in pinned Linux image')} |",
          ]

          if wc_feature_timings:
              out += [
                  "",
                  "### Browser Features Timing",
                  "",
                  "> Source: Web Client `timing-latest.json` artifacts for the Browser Features matrix rows.",
                  "",
                  "| Shard | Total | pip-install | npm-install | Playwright install | Playwright features | Other |",
                  "|:------|------:|------------:|------------:|-------------------:|--------------------:|------:|",
              ]
              for row in wc_feature_timings:
                  out.append(
                      f"| {row['shard']} | {format_duration(row['total'])} | "
                      f"{format_duration(row['pip'])} | {format_duration(row['npm'])} | "
                      f"{format_duration(row['playwright_install'])} | "
                      f"{format_duration(row['playwright_features'])} | "
                      f"{format_duration(row['other'])} |"
                  )

          if cs_live_timings:
              out += [
                  "",
                  "### C# Live Timing",
                  "",
                  "> Source: C# Live `tests.trx`; timings exclude restore, build, and server startup.",
                  "",
                  "| Class | Tests | Total | Avg | Max |",
                  "|:------|------:|------:|----:|----:|",
              ]
              for row in cs_live_timings["classes"]:
                  avg = row["total"] / row["tests"] if row["tests"] else 0.0
                  out.append(
                      f"| {md_cell(short_csharp_class(row['class']))} | {row['tests']} | "
                      f"{format_duration(row['total'])} | {format_duration(avg)} | "
                      f"{format_duration(row['max'])} |"
                  )

              out += [
                  "",
                  "#### Top C# Live Tests",
                  "",
                  "| Test | Duration | Outcome |",
                  "|:-----|---------:|:--------|",
              ]
              for row in cs_live_timings["top"]:
                  out.append(
                      f"| {md_cell(row['method'])} | {format_duration(row['duration'])} | "
                      f"{md_cell(row['outcome'])} |"
                  )

          # ── Inline skip details (collapsible) ──────────────────────────

          skip_sections = []
          skip_sections += format_skip_section("OPC UA Server — Docker Smoke", sd_smoke_skips, sd_smoke[3])
          skip_sections += format_skip_section("Web Client — Docker Python Unit", wd_py_skips, wd_py[3])
          skip_sections += format_skip_section("Web Client — Docker JavaScript", wd_js_skips, wd_js[3])
          skip_sections += format_skip_section("Test Client — Smoke Sanity", tc_smoke_skips, tc_smoke[3])
          skip_sections += format_skip_section("Test Client — Conformance", tc_conf_skips, tc_tests[3])
          skip_sections += format_skip_section("Console Client — Live", con_live_skips, con_live[3])
          skip_sections += format_skip_section("Web Client — Python/WebSocket Live", wc_live_skips, wc_live[3])
          skip_sections += format_skip_section("Web Client — Browser E2E", wc_browser_skips, wc_browser[3])
          skip_sections += format_skip_section("C# Client — Live", cs_live_skips, cs_live[3])

          if skip_sections:
              out += ["", "---", "", "### ⏭️ Skip Details"]
              out += skip_sections

          out += [
              "",
              "---",
              "",
              "> 📦 **Artifacts** — JUnit XML &nbsp;·&nbsp; 📋 **Checks** tab — per-test drill-down",
              "> 🔒 Security audit (zizmor) results are in **CI** → Security → Code Scanning",
          ]

          if artifact_warnings:
              out += ["", "---", "", "### ⚠️ Artifact Warnings", ""]
              out += artifact_warnings

          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout"), "a", encoding="utf-8") as fh:
              fh.write("\n".join(out) + "\n")
          print("Summary written.")
          if skip_policy_failures:
              sys.exit(1)
          PYEOF
