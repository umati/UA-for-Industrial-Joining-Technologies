# ─────────────────────────────────────────────────────────────────────────────
# System Tests — Live OPC UA, Browser, Docker, Conformance
#
# TIER: integration (non-blocking) — skips and failures are tracked but do
# not gate merges. See docs/TEST_TIERS.md for the full tier policy and the
# known-expected-skips table.
#
# Jobs:
#   server-smoke-docker  OPC UA Server          Linux native Docker build + smoke
#   webclient-docker     Web Client             Docker unit/prod tests
#   int-testclient       Test Client            Windows: OPC UA server (port 40462) + Test Client full suite
#   live-webclient       Web Client             Windows: local runner web-client-live-* matrix
#   live-webclient-browser Web Client           Linux ubuntu-latest: web-client-e2e-* matrix; runs inside owned ghcr.io/.../ijt-browser-ci image (digest pinned in .github/docker/ijt-browser-ci/image-pin.json) with --network=none
#   live-console         Console Client         Windows: Console Client live tests (port 40461)
#   csharp-live          C# Client              Windows: xUnit live tests (port 40464) - nightly
#   crypto-path-filter   OPC UA Security        Decides whether OPC UA security jobs should run
#   csharp-client-opcua-security C# Client             Windows + Linux OPC UA security tests
#   console-client-opcua-security Console Client       Windows + Linux OPC UA security tests
#   report               Combined summary                 Always runs after all jobs
# (zizmor promoted to ci.yml — removed from integration)
#
# Triggers:
#   - Nightly at 2am UTC
#   - Manual dispatch (workflow_dispatch)
#   - Push / PR touching server or client code paths (see path filters below)
# ─────────────────────────────────────────────────────────────────────────────

name: "System Tests — Live OPC UA, Browser, Docker, Conformance"

on:
  schedule:
    - cron: '0 2 * * *'   # nightly at 2am UTC
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]
    paths:
      - '.dockerignore'
      - 'constraints.txt'
      # OPC UA Server — code/binary/Dockerfile/test changes (docs-only changes excluded)
      - 'OPC_UA_Servers/Release2/*.zip'
      - 'OPC_UA_Servers/Release2/*.json'
      - 'OPC_UA_Servers/Release2/run_all_tests.py'
      - 'OPC_UA_Servers/Release2/opcua_security.users.yaml'
      - 'OPC_UA_Servers/Release2/Dockerfile'
      - 'OPC_UA_Servers/Release2/docker-compose.yml'
      - 'OPC_UA_Servers/Release2/tests/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator_Linux/**'
      # Web Client — local live suites cover Python backend contracts and Playwright E2E.
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/**'
      # Test Client — every change is an OPC UA conformance test change
      - 'OPC_UA_Clients/Release2/IJT_Test_Client/**'
      # Console Client — live/OPC UA security tests run here (not in fast CI)
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/**'
      # C# Client — OPC UA security and live tests
      - 'OPC_UA_Clients/Release2/IJT_CSharp_Client/**'
      # Browser CI image inputs — live browser job consumes PR/main SHA image
      # when these changed, otherwise the reviewed image pin.
      - '.github/docker/ijt-browser-ci/**'
      - '!.github/docker/ijt-browser-ci/README.md'
      # Browser CI image pin — the live browser job consumes this reviewed digest
      - '.github/docker/ijt-browser-ci/image-pin.json'
      - '.github/scripts/compute_browser_image_fingerprint.py'
      # Reporting code — summary generation is part of Integration correctness
      - 'reporting/**'
      - 'scripts/reporting/**'
      # Any workflow file — zizmor audits all of .github/workflows/
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '.dockerignore'
      - 'constraints.txt'
      # Same paths as push — run live tests on PRs that touch server/client code
      # so regressions are caught before merge, not after.
      - 'OPC_UA_Servers/Release2/*.zip'
      - 'OPC_UA_Servers/Release2/*.json'
      - 'OPC_UA_Servers/Release2/run_all_tests.py'
      - 'OPC_UA_Servers/Release2/opcua_security.users.yaml'
      - 'OPC_UA_Servers/Release2/Dockerfile'
      - 'OPC_UA_Servers/Release2/docker-compose.yml'
      - 'OPC_UA_Servers/Release2/tests/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator_Linux/**'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/**'
      - 'OPC_UA_Clients/Release2/IJT_Test_Client/**'
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/**'
      - 'OPC_UA_Clients/Release2/IJT_CSharp_Client/**'
      # Browser CI image inputs — live browser job consumes PR/main SHA image
      # when these changed, otherwise the reviewed image pin.
      - '.github/docker/ijt-browser-ci/**'
      - '!.github/docker/ijt-browser-ci/README.md'
      # Browser CI image pin — the live browser job consumes this reviewed digest
      - '.github/docker/ijt-browser-ci/image-pin.json'
      - '.github/scripts/compute_browser_image_fingerprint.py'
      # Reporting code — summary generation is part of Integration correctness
      - 'reporting/**'
      - 'scripts/reporting/**'
      # Any workflow file — zizmor audits all of .github/workflows/
      - '.github/workflows/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # OPC UA Security Path Filter
  #   Runs the OPC UA security tests only for
  #   nightly/manual runs or PRs/pushes that touch crypto-relevant
  #   server/client paths.
  # ───────────────────────────────────────────────────────────────────────────
  crypto-path-filter:
    name: "OPC UA Security Path Filter"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      run_opcua_security: ${{ steps.filter.outputs.run_opcua_security }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - id: filter
        name: Detect crypto-relevant changes
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "schedule" || "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run_opcua_security=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha || github.event.before || '' }}"
          head="${{ github.event.pull_request.head.sha || github.sha }}"

          if [[ -n "$base" ]] && git cat-file -e "$base^{commit}" 2>/dev/null; then
            changed="$(git diff --name-only "$base" "$head")"
          elif git rev-parse HEAD^ >/dev/null 2>&1; then
            changed="$(git diff --name-only HEAD^ HEAD)"
          else
            changed="$(git show --name-only --format= HEAD)"
          fi

          printf '%s\n' "$changed"
          if printf '%s\n' "$changed" | grep -Eq '^(\.dockerignore|constraints\.txt|OPC_UA_Servers/Release2/.*\.zip|OPC_UA_Servers/Release2/.*\.json|OPC_UA_Servers/Release2/run_all_tests\.py|OPC_UA_Servers/Release2/opcua_security\.users\.yaml|OPC_UA_Servers/Release2/Dockerfile|OPC_UA_Servers/Release2/docker-compose\.yml|OPC_UA_Servers/Release2/tests/|OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator/|OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator_Linux/|OPC_UA_Clients/Release2/IJT_CSharp_Client/|OPC_UA_Clients/Release2/IJT_Console_Client/|\.github/workflows/integration\.yml)'; then
            echo "run_opcua_security=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_opcua_security=false" >> "$GITHUB_OUTPUT"
          fi

  # ───────────────────────────────────────────────────────────────────────────
  # OPC UA Server - Docker Smoke
  #   Extract the Linux ZIP to satisfy the COPY instructions in the Dockerfile,
  #   build the native Linux Docker image (layer-cached via GitHub Actions cache),
  #   start the container, wait for TCP 40451, run all 10 smoke checks, tear down.
  # ───────────────────────────────────────────────────────────────────────────
  server-smoke-docker:
    name: "OPC UA Server - Docker Smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: docker-hub
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}   # empty string when secret absent
      DOCKER_BUILD_SUMMARY: "false"
      DOCKER_BUILD_RECORD_UPLOAD: "false"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract server ZIP (required for Docker COPY instructions)
        working-directory: OPC_UA_Servers/Release2
        run: |
          unzip -q OPC_UA_IJT_Server_Simulator_Linux.zip
          echo "Extracted: $(ls OPC_UA_IJT_Server_Simulator_Linux/)"

      - name: Install hadolint (binary — avoids a Docker Hub pull)
        # Using the released binary instead of `docker run hadolint/hadolint`
        # saves one unauthenticated Docker Hub pull (and avoids rate-limit risk).
        # SHA-256 is taken from the official hadolint v2.12.0 release checksums file.
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          echo "56de6d5e5ec427e17b74fa48d51271c7fc0d61244bf5c90e828aab8362d55010  /usr/local/bin/hadolint" \
            | sha256sum --check --strict -
          chmod +x /usr/local/bin/hadolint

      - name: Lint Dockerfile (hadolint)
        run: |
          hadolint --ignore DL3008 --ignore DL3009 OPC_UA_Servers/Release2/Dockerfile
          echo "Dockerfile lint OK"

      - name: Log in to Docker Hub (optional — increases pull rate limit)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build Docker image (Linux native binary, no cache write)
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: OPC_UA_Servers/Release2
          tags: opcua-ijt-server:ci
          load: true
          cache-from: type=gha

      - name: Build Docker image (Linux native binary, trusted cache write)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: OPC_UA_Servers/Release2
          tags: opcua-ijt-server:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start OPC UA Server container
        run: |
          docker run -d --name opcua-server \
            -p 40451:40451 opcua-ijt-server:ci
          echo "Container started"

      - name: Wait for OPC UA port 40451
        # Linux binary starts in ~3 s; allow up to 60 s total.
        run: |
          for i in $(seq 1 12); do
            if nc -z localhost 40451 2>/dev/null; then
              echo "Port 40451 open after $((i * 5)) s"
              exit 0
            fi
            echo "Waiting... attempt $i/12"
            sleep 5
          done
          echo "ERROR: Timeout — dumping container logs:"
          docker logs opcua-server --tail 60
          exit 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install smoke test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c "${{ github.workspace }}/constraints.txt" -r OPC_UA_Servers/Release2/tests/requirements.txt

      - name: Run smoke test (10 checks)
        run: |
          mkdir -p test-results
          python OPC_UA_Servers/Release2/tests/smoke_test.py \
            --tcp-timeout 30 \
            --junitxml test-results/smoke.xml

      - name: Upload Server Smoke results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-server-smoke-docker
          path: test-results/smoke.xml
          retention-days: 14

      - name: Dump container logs
        if: always()
        run: docker logs opcua-server --tail 60 || true  # diagnostic only; ignore errors if container already gone

      - name: Teardown container
        if: always()
        run: docker rm -f opcua-server || true

  # ───────────────────────────────────────────────────────────────────────────
  # Web Client - Docker Tests
  #   Builds both the 'test' target (Python unit + JS vitest inside container)
  #   and the 'production' target (HTTP health check on port 3000).
  # ───────────────────────────────────────────────────────────────────────────
  webclient-docker:
    name: "Web Client - Docker Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: docker-hub
    permissions:
      contents: read
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}   # empty string when secret absent
      DOCKER_BUILD_SUMMARY: "false"
      DOCKER_BUILD_RECORD_UPLOAD: "false"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Log in to Docker Hub (optional — increases pull rate limit)
        if: env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build Web Client Docker image (test target)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: OPC_UA_Clients/Release2/IJT_Web_Client/Dockerfile
          target: test
          tags: ijt-web-client:test-ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Python unit tests inside Docker
        run: |
          mkdir -p test-results
          docker run --rm \
            -v "${{ github.workspace }}/test-results:/out" \
            ijt-web-client:test-ci \
            python -m pytest tests/python/unit/ \
              -m "not checkout_hygiene" \
              -v --tb=short --no-header \
              --junitxml=/out/pytest-unit.xml

      - name: Run JS unit tests (vitest) inside Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/test-results:/out" \
            ijt-web-client:test-ci \
            npx vitest run --reporter=verbose --reporter=junit --outputFile.junit=/out/vitest.xml

      - name: Upload Web Client Docker results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-webclient-docker
          path: test-results/
          retention-days: 14

      - name: Build Web Client Docker image (production target)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: OPC_UA_Clients/Release2/IJT_Web_Client/Dockerfile
          target: production
          tags: ijt-web-client:prod-ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start production container and verify HTTP health
        run: |
          docker run -d --name ijt-web-prod \
            -p 3000:3000 \
            -e IS_DOCKER=true \
            ijt-web-client:prod-ci
          echo "Waiting for HTTP on port 3000..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000 >/dev/null 2>&1; then
              echo "HTTP 200 OK after $((i * 3))s"
              exit 0
            fi
            echo "Attempt $i/20..."
            sleep 3
          done
          echo "ERROR: HTTP health check timed out. Container logs:"
          docker logs ijt-web-prod --tail 40
          exit 1

      - name: Teardown Web Client container
        if: always()
        run: docker rm -f ijt-web-prod || true

  # ───────────────────────────────────────────────────────────────────────────
  # Test Client - Windows Live Tests
  #   Runs the full IJT Test Client suite against the native Windows OPC UA
  #   server binary.  Split from the old monolithic integration-tests job so
  #   it runs in parallel with int-live-others (Web Client + Console).
  # ───────────────────────────────────────────────────────────────────────────
  int-testclient:
    name: "Test Client - Windows Live (port 40462)"
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install `
            -c "${{ github.workspace }}/constraints.txt" `
            -r OPC_UA_Servers/Release2/tests/requirements.txt `
            -r OPC_UA_Clients/Release2/IJT_Test_Client/requirements.txt `
            -r OPC_UA_Clients/Release2/IJT_Test_Client/requirements-dev.txt

      - name: Extract server ZIP
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force

      - name: Start OPC UA server on port 40462
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40462

      - name: Run smoke test (quick server sanity check)
        env:
          OPCUA_SERVER_URL: opc.tcp://localhost:40462
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          python OPC_UA_Servers/Release2/tests/smoke_test.py `
            --tcp-timeout 30 `
            --junitxml test-results/smoke-sanity.xml

      - name: Run IJT Test Client tests (all tests)
        working-directory: OPC_UA_Clients/Release2/IJT_Test_Client
        env:
          OPCUA_SERVER_URL: opc.tcp://localhost:40462
          OPCUA_CAPABILITIES_FILE: server_capabilities.simulator.yaml
        run: |
          python -m pytest `
            conformance/ assets/ joining_process/ results/ joint/ events/ common/ `
            -v --tb=short -rs --timeout=120 `
            --durations=30 `
            --junitxml=test-results/pytest.xml `
            --html=test-results/report.html --self-contained-html

      - name: Generate Excel report and CI Step Summary
        if: always()
        working-directory: OPC_UA_Clients/Release2/IJT_Test_Client
        env:
          OPCUA_SERVER_URL: opc.tcp://localhost:40462
          OPCUA_CAPABILITIES_FILE: server_capabilities.simulator.yaml
        run: |
          python scripts/make_excel_report.py
          python scripts/make_conformance_summary.py

      - name: Collect test results into flat directory
        if: always()
        shell: pwsh
        run: |
          Copy-Item OPC_UA_Clients/Release2/IJT_Test_Client/test-results/pytest.xml `
            test-results/pytest.xml -ErrorAction SilentlyContinue
          Copy-Item OPC_UA_Clients/Release2/IJT_Test_Client/test-results/report.html `
            test-results/report.html -ErrorAction SilentlyContinue
          Copy-Item OPC_UA_Clients/Release2/IJT_Test_Client/test-results/report.xlsx `
            test-results/report.xlsx -ErrorAction SilentlyContinue
          Copy-Item OPC_UA_Clients/Release2/IJT_Test_Client/test-results/summary.md `
            test-results/summary.md -ErrorAction SilentlyContinue

      - name: Upload Test Client results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-testclient
          path: |
            test-results/pytest.xml
            test-results/smoke-sanity.xml
            test-results/report.html
            test-results/report.xlsx
            test-results/summary.md
          retention-days: 14

      - name: Stop OPC UA server
        if: always()
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40462 --stop

  # ───────────────────────────────────────────────────────────────────────────
  # Web Client - Windows Live Runner Matrix
  #   Runs the non-browser Web Client live suites on Windows.
  #   Each suite owns its OPC UA server, WebSocket backend, and results directory.
  # ───────────────────────────────────────────────────────────────────────────
  live-webclient:
    name: "Web Client - ${{ matrix.label }}"
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: web-client-live-opcua-direct
            label: "Direct OPC UA"
          - suite: web-client-live-websocket-api
            label: "WebSocket API"
          - suite: web-client-live-websocket-connection
            label: "WebSocket Connection"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"

      - name: Run Web Client local live suite
        run: python run_all_tests.py --suite "${{ matrix.suite }}" --verbose

      - name: Upload Web Client results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-live-webclient-${{ matrix.suite }}
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Web Client - Browser E2E Runner Matrix
  #   Runs every Playwright/headless-Chromium suite inside the owned
  #   `ijt-browser-ci` image published to GHCR by
  #   `.github/workflows/build-browser-ci-image.yml`. The image is digest-
  #   pinned via `.github/docker/ijt-browser-ci/image-pin.json` and bakes
  #   Python 3.14, Node 24, Playwright + Chromium + Linux system libs, the
  #   pip wheelhouse, and the npm cache. The container runs with
  #   `--network=none`, `--user $(id -u):$(id -g)`, and
  #   `-v $GITHUB_WORKSPACE:/workspace`, so the only inputs are the checkout
  #   tree and the baked caches, and the only outputs are the test-results
  #   directories under the workspace.
  #
  #   The job intentionally does NOT use a job-level `container:` image:
  #   GitHub creates container-job runtimes before any workflow step runs,
  #   so a registry pull failure (e.g. transient GHCR outage) takes the
  #   whole job down with no in-job retry, fallback, or diagnostics
  #   possible. A step-level `docker run` keeps the pull, the digest guard,
  #   and the suite invocation inside steps that we control end-to-end.
  #   Windows browser compatibility coverage is tracked separately so the
  #   bulk browser logic suite does not depend on Windows-hosted Chromium
  #   process stability.
  # ───────────────────────────────────────────────────────────────────────────
  live-webclient-browser:
    name: "Web Client Browser - ${{ matrix.label }}"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: web-client-e2e-smoke
            label: "Browser Smoke"
            feature_shard: ""
            shard_suffix: ""
          - suite: web-client-e2e-features
            label: "Browser Features (1/2)"
            feature_shard: "1/2"
            shard_suffix: "-shard-1of2"
          - suite: web-client-e2e-features
            label: "Browser Features (2/2)"
            feature_shard: "2/2"
            shard_suffix: "-shard-2of2"
          - suite: web-client-e2e-regression
            label: "Browser Regression"
            feature_shard: ""
            shard_suffix: ""

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve IJT Browser CI image reference (digest-qualified)
        id: image
        env:
          PIN_PATH: .github/docker/ijt-browser-ci/image-pin.json
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          set -euo pipefail
          IMG="$(jq -r .image "$PIN_PATH")"
          DIG="$(jq -r .digest "$PIN_PATH")"
          CURRENT_INPUTS_FINGERPRINT="$(python .github/scripts/compute_browser_image_fingerprint.py --format value)"
          PIN_INPUTS_FINGERPRINT="$(jq -r '.inputs_fingerprint // empty' "$PIN_PATH")"

          browser_image_inputs_changed() {
            local base_sha="$1"
            local head_sha="$2"
            local changed_browser_image_input=false

            git fetch --no-tags --depth=1 origin "$base_sha" "$head_sha"
            changed_files="$(git diff --name-only "$base_sha" "$head_sha")"
            while IFS= read -r changed; do
              [[ -n "$changed" ]] || continue
              case "$changed" in
                .dockerignore)
                  changed_browser_image_input=true
                  ;;
                constraints.txt)
                  changed_browser_image_input=true
                  ;;
                OPC_UA_Clients/Release2/IJT_Web_Client/package.json)
                  changed_browser_image_input=true
                  ;;
                OPC_UA_Clients/Release2/IJT_Web_Client/package-lock.json)
                  changed_browser_image_input=true
                  ;;
                OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt)
                  changed_browser_image_input=true
                  ;;
                OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt)
                  changed_browser_image_input=true
                  ;;
                .github/docker/ijt-browser-ci/image-pin.json)
                  ;;
                .github/docker/ijt-browser-ci/README.md)
                  ;;
                .github/docker/ijt-browser-ci/*)
                  changed_browser_image_input=true
                  ;;
                .github/scripts/update_browser_ci_image_pin.py)
                  changed_browser_image_input=true
                  ;;
                .github/scripts/compute_browser_image_fingerprint.py)
                  changed_browser_image_input=true
                  ;;
                .github/workflows/build-browser-ci-image.yml)
                  changed_browser_image_input=true
                  ;;
              esac
            done <<< "$changed_files"

            [[ "$changed_browser_image_input" == "true" ]]
          }

          pull_tag_and_resolve_digest() {
            local tag="$1"
            local source="$2"
            local expected_sha="$3"
            local attempt=0
            local max_attempts=30
            local delay=20

            echo "Waiting for ${source}: ${tag}"
            until docker pull "$tag"; do
              attempt=$((attempt + 1))
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::error file=${PIN_PATH}::Timed out waiting for ${source}." >&2
                echo "::error::  tag:      ${tag}" >&2
                echo "::error::  workflow: .github/workflows/build-browser-ci-image.yml" >&2
                echo "::error::  reason:   browser image input changed, but no matching PR/SHA image was published." >&2
                exit 1
              fi
              echo "image tag not ready (${attempt}/${max_attempts}); retrying in ${delay}s..." >&2
              sleep "$delay"
            done

            resolved_ref="$(
              docker image inspect "$tag" --format '{{range .RepoDigests}}{{println .}}{{end}}' \
                | grep -F "${IMG}@sha256:" \
                | head -n 1 || true
            )"
            if [[ -z "$resolved_ref" ]]; then
              echo "::error file=${PIN_PATH}::Pulled ${tag}, but Docker did not report a ${IMG}@sha256 digest." >&2
              exit 1
            fi
            DIG="${resolved_ref##*@}"
            echo "Resolved ${source} to ${IMG}@${DIG}"

            actual_sha="$(
              docker run --rm --network=none "${IMG}@${DIG}" \
                python -c "import json; print(json.load(open('/opt/ijt-browser-ci/metadata.json')).get('build_sha',''))"
            )"
            if [[ "$actual_sha" != "$expected_sha" ]]; then
              echo "::error file=${PIN_PATH}::Resolved ${source}, but image metadata does not match the expected source SHA." >&2
              echo "::error::  expected: ${expected_sha}" >&2
              echo "::error::  actual:   ${actual_sha}" >&2
              echo "::error::  image:    ${IMG}@${DIG}" >&2
              exit 1
            fi

            actual_fingerprint="$(
              docker run --rm --network=none "${IMG}@${DIG}" \
                python -c "import json; print(json.load(open('/opt/ijt-browser-ci/metadata.json')).get('inputs_fingerprint',''))"
            )"
            if [[ "$actual_fingerprint" != "$CURRENT_INPUTS_FINGERPRINT" ]]; then
              echo "::error file=${PIN_PATH}::Resolved ${source}, but image metadata does not match the current Browser CI input fingerprint." >&2
              echo "::error::  expected: ${CURRENT_INPUTS_FINGERPRINT}" >&2
              echo "::error::  actual:   ${actual_fingerprint}" >&2
              echo "::error::  image:    ${IMG}@${DIG}" >&2
              echo "::error::  manifest: .github/docker/ijt-browser-ci/inputs-manifest.json" >&2
              exit 1
            fi
          }

          image_source="reviewed image-pin.json"
          null_sha="0000000000000000000000000000000000000000"
          if [[ "$EVENT_NAME" == "pull_request" && "$PR_HEAD_REPO" == "$GITHUB_REPOSITORY" ]]; then
            if browser_image_inputs_changed "$PR_BASE_SHA" "$PR_HEAD_SHA"; then
              short_sha="${GITHUB_SHA::7}"
              pull_tag_and_resolve_digest "${IMG}:pr-${PR_NUMBER}-${short_sha}" "PR-scoped browser image" "$GITHUB_SHA"
              image_source="PR-scoped browser image"
            fi
          elif [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" && -n "$BEFORE_SHA" && "$BEFORE_SHA" != "$null_sha" ]]; then
            if browser_image_inputs_changed "$BEFORE_SHA" "$GITHUB_SHA"; then
              short_sha="${GITHUB_SHA::7}"
              pull_tag_and_resolve_digest "${IMG}:sha-${short_sha}" "main SHA browser image" "$GITHUB_SHA"
              image_source="main SHA browser image"
            fi
          fi

          if [[ "$image_source" == "reviewed image-pin.json" ]]; then
            if ! [[ "$PIN_INPUTS_FINGERPRINT" =~ ^[0-9a-f]{64}$ ]]; then
              echo "::error file=${PIN_PATH}::Reviewed Browser CI image pin is missing inputs_fingerprint." >&2
              echo "::error::  current:  ${CURRENT_INPUTS_FINGERPRINT}" >&2
              echo "::error::  manifest: .github/docker/ijt-browser-ci/inputs-manifest.json" >&2
              echo "::error::  action:   rebuild/publish ijt-browser-ci and refresh image-pin.json through the reviewed pin flow." >&2
              exit 1
            fi
            if [[ "$PIN_INPUTS_FINGERPRINT" != "$CURRENT_INPUTS_FINGERPRINT" ]]; then
              echo "::error file=${PIN_PATH}::Browser CI image pin is stale for the current dependency inputs." >&2
              echo "::error::  pinned:   ${PIN_INPUTS_FINGERPRINT}" >&2
              echo "::error::  current:  ${CURRENT_INPUTS_FINGERPRINT}" >&2
              echo "::error::  image:    ${IMG}@${DIG}" >&2
              echo "::error::  manifest: .github/docker/ijt-browser-ci/inputs-manifest.json" >&2
              echo "::error::  action:   rebuild/publish ijt-browser-ci and refresh image-pin.json through the reviewed pin flow." >&2
              exit 1
            fi
            actual_fingerprint="$(
              docker run --rm --network=none "${IMG}@${DIG}" \
                python -c "import json; print(json.load(open('/opt/ijt-browser-ci/metadata.json')).get('inputs_fingerprint',''))"
            )"
            if [[ "$actual_fingerprint" != "$CURRENT_INPUTS_FINGERPRINT" ]]; then
              echo "::error file=${PIN_PATH}::Reviewed Browser CI image metadata does not match the current input fingerprint." >&2
              echo "::error::  pinned:   ${PIN_INPUTS_FINGERPRINT}" >&2
              echo "::error::  current:  ${CURRENT_INPUTS_FINGERPRINT}" >&2
              echo "::error::  actual:   ${actual_fingerprint}" >&2
              echo "::error::  image:    ${IMG}@${DIG}" >&2
              echo "::error::  manifest: .github/docker/ijt-browser-ci/inputs-manifest.json" >&2
              echo "::error::  action:   rebuild/publish ijt-browser-ci and refresh image-pin.json through the reviewed pin flow." >&2
              exit 1
            fi
          fi

          if ! [[ "$DIG" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error file=$PIN_PATH::digest is not a valid sha256:<64hex> reference: $DIG" >&2
            exit 1
          fi
          REF="${IMG}@${DIG}"
          if ! [[ "$REF" =~ @sha256:[0-9a-f]{64}$ ]]; then
            echo "::error file=$PIN_PATH::Resolved IJT_BROWSER_CI_IMAGE is not digest-qualified: $REF" >&2
            exit 1
          fi
          echo "ijt_browser_ci_image=$REF" >> "$GITHUB_OUTPUT"
          echo "image_source=${image_source}" >> "$GITHUB_OUTPUT"
          echo "Resolved IJT_BROWSER_CI_IMAGE=$REF (${image_source}; inputs=${CURRENT_INPUTS_FINGERPRINT})"

      - name: Pull IJT Browser CI image (3-attempt retry)
        env:
          IMG: ${{ steps.image.outputs.ijt_browser_ci_image }}
          IMAGE_SOURCE: ${{ steps.image.outputs.image_source }}
          PIN_PATH: .github/docker/ijt-browser-ci/image-pin.json
        run: |
          set -euo pipefail
          # Retry 3x with backoff. GHCR is the SPOF this job depends on; if all
          # three attempts fail the diagnostic must name the digest, the
          # registry, and the image-build workflow so the operator can decide
          # whether to re-run the publish workflow or wait out a GHCR incident.
          attempt=0
          max_attempts=3
          delay=5
          until docker pull "$IMG"; do
            attempt=$((attempt + 1))
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error file=${PIN_PATH}::Failed to pull IJT Browser CI image after ${max_attempts} attempts." >&2
              echo "::error::  image:    ${IMG}" >&2
              echo "::error::  source:   ${IMAGE_SOURCE}" >&2
              echo "::error::  registry: ghcr.io (GHCR)" >&2
              echo "::error::  pin file: ${PIN_PATH}" >&2
              echo "::error::  republish: re-run .github/workflows/build-browser-ci-image.yml to regenerate the matching image, then re-run Integration." >&2
              exit 1
            fi
            echo "docker pull attempt ${attempt}/${max_attempts} failed; retrying in ${delay}s..." >&2
            sleep "$delay"
            delay=$((delay * 2))
          done
          docker image inspect "$IMG" --format 'id={{.Id}} created={{.Created}}'

      - name: Run Web Client browser e2e suite (offline, --network=none)
        env:
          IMG: ${{ steps.image.outputs.ijt_browser_ci_image }}
          SUITE: ${{ matrix.suite }}
          SHARD: ${{ matrix.feature_shard || '' }}
        run: |
          set -euo pipefail
          # GitHub metadata envs are propagated so the in-container Python
          # runner can stamp reports/summaries with the run identity. They are
          # informational only; the run still executes under --network=none.
          docker run --rm --init \
            --network=none \
            --user "$(id -u):$(id -g)" \
            -w /workspace \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -e CI=1 \
            -e IS_DOCKER=true \
            -e HOME=/opt/ijt-browser-ci/home \
            -e npm_config_cache=/opt/ijt-browser-ci/npm-cache \
            -e npm_config_offline=true \
            -e PIP_CACHE_DIR=/opt/ijt-browser-ci/pip-cache \
            -e PIP_NO_INDEX=1 \
            -e PIP_FIND_LINKS=/opt/ijt-browser-ci/pip-wheelhouse \
            -e SKIP_VENV_INSTALL=1 \
            -e PLAYWRIGHT_BROWSERS_PATH=/ms-playwright \
            -e IJT_PLAYWRIGHT_SHARD="$SHARD" \
            -e GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
            -e GITHUB_RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT}" \
            -e GITHUB_SHA="${GITHUB_SHA}" \
            -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            -e GITHUB_SERVER_URL="${GITHUB_SERVER_URL}" \
            "$IMG" \
            bash -lc "python run_all_tests.py --suite \"$SUITE\" --verbose"

      - name: Upload Web Client browser results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-live-webclient-${{ matrix.suite }}${{ matrix.shard_suffix || '' }}
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Console Client - Windows Live Tests (port 40461)
  #   Runs Console Client live test suite against a dedicated server instance.
  #   Uses dedicated port 40461 — safe to run in parallel with other live jobs.
  # ───────────────────────────────────────────────────────────────────────────
  live-console:
    name: "Console Client - Windows Live Tests (port 40461)"
    runs-on: windows-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install Console Client dependencies
        run: |
          python -m pip install --upgrade pip
          pip install `
            -c "${{ github.workspace }}/constraints.txt" `
            -r OPC_UA_Clients/Release2/IJT_Console_Client/requirements.txt `
            -r OPC_UA_Clients/Release2/IJT_Console_Client/requirements-dev.txt

      - name: Extract server ZIP
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force

      - name: Start OPC UA server on port 40461
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40461

      - name: Run Console Client live tests
        working-directory: OPC_UA_Clients/Release2/IJT_Console_Client
        env:
          OPCUA_SERVER_URL: opc.tcp://localhost:40461
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          python -m pytest tests/live/ `
            -v --tb=short --timeout=120 `
            -m "not opcua_security" `
            --junitxml=test-results/pytest-live.xml

      - name: Upload Console Client results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-live-console
          path: OPC_UA_Clients/Release2/IJT_Console_Client/test-results/
          retention-days: 14

      - name: Stop OPC UA server
        if: always()
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40461 --stop

  # ───────────────────────────────────────────────────────────────────────────
  # C# Client - Live Tests (nightly, port 40464)
  #   Nightly drift detection for live C# behavior outside fast CI.
  #   Non-blocking: failures are visible but do not gate merges.
  #   Port 40464 is the C# client's dedicated port — see docs/TEST_TIERS.md.
  # ───────────────────────────────────────────────────────────────────────────
  csharp-live:
    name: "C# Client - Live Tests (port 40464)"
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_CSharp_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract server ZIP
        working-directory: ${{ github.workspace }}
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force

      - name: Start OPC UA server on port 40464
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40464

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: '10.x'

      - name: Prepare C# test-result artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          '<?xml version="1.0"?><testsuites tests="0" failures="0"><testsuite name="IJT_CSharp_Client.Tests.Live" tests="0"/></testsuites>' | Out-File test-results\tests.xml -Encoding UTF8

      - name: Restore NuGet Packages
        run: |
          $target = "Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj"
          $lockFiles = Get-ChildItem -Path . -Recurse -Filter "packages.lock.json" -File -ErrorAction SilentlyContinue
          if ($lockFiles.Count -gt 0) {
            Write-Host "Lock files detected — using locked mode restore."
            dotnet restore $target --locked-mode
          } else {
            Write-Host "No lock files yet — using normal restore."
            dotnet restore $target
          }

      - name: Scan for Vulnerable NuGet Packages
        shell: pwsh
        run: |
          $target = "Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj"
          $output = dotnet list $target package --vulnerable --include-transitive --no-restore 2>&1
          $scanExit = $LASTEXITCODE
          Write-Host $output
          if ($output -match "has the following vulnerable packages") {
            Write-Host "##[warning]Vulnerable NuGet packages detected (nightly scan)."
            exit 0
          }
          if ($scanExit -ne 0) {
            exit $scanExit
          }

      - name: Build
        id: build
        continue-on-error: true
        run: dotnet build Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj --no-restore --configuration Release

      - name: Run xUnit Live Tests
        id: tests
        if: steps.build.outcome == 'success'
        continue-on-error: true
        env:
          IJT_AUTO_ACCEPT: 'true'
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          dotnet test Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj `
            --no-build `
            --no-restore `
            --configuration Release `
            --filter "Category=Live" `
            --logger "trx;LogFileName=tests.trx" `
            --logger "console;verbosity=normal" `
            --results-directory test-results `
            --blame-hang --blame-hang-timeout 120s

      - name: Convert TRX to JUnit XML
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          $trx   = "test-results\tests.trx"
          $junit = "test-results\tests.xml"
          if (Test-Path $trx) {
            [xml]$x = Get-Content $trx
            $ns = @{ t = "http://microsoft.com/schemas/VisualStudio/TeamTest/2010" }
            $results = Select-Xml -Xml $x -XPath "//t:UnitTestResult" -Namespace $ns | Select-Object -ExpandProperty Node
            $passed  = ($results | Where-Object { $_.outcome -eq "Passed"  }).Count
            $failed  = ($results | Where-Object { $_.outcome -eq "Failed"  }).Count
            $skipped = ($results | Where-Object { $_.outcome -eq "NotExecuted" }).Count
            $total   = $results.Count
            $xml  = '<?xml version="1.0" encoding="UTF-8"?>' + "`n"
            $xml += "<testsuites tests=`"$total`" failures=`"$failed`" skipped=`"$skipped`">`n"
            $xml += "  <testsuite name=`"IJT_CSharp_Client.Tests.Live`" tests=`"$total`" failures=`"$failed`" skipped=`"$skipped`">`n"
            foreach ($r in $results) {
              $name = [System.Security.SecurityElement]::Escape($r.testName)
              $outcome = $r.outcome
              if ($outcome -eq "Passed") {
                $xml += "    <testcase name=`"$name`" classname=`"IJT`" />`n"
              } elseif ($outcome -eq "NotExecuted") {
                $msgRaw = ([string]$r.Output.ErrorInfo.Message).Trim()
                if ([string]::IsNullOrWhiteSpace($msgRaw)) { $msgRaw = "Test skipped by xUnit" }
                $msg = [System.Security.SecurityElement]::Escape($msgRaw)
                $xml += "    <testcase name=`"$name`" classname=`"IJT`"><skipped message=`"$msg`">$msg</skipped></testcase>`n"
              } else {
                $msg = [System.Security.SecurityElement]::Escape($r.Output.ErrorInfo.Message)
                $xml += "    <testcase name=`"$name`" classname=`"IJT`"><failure>$msg</failure></testcase>`n"
              }
            }
            $xml += "  </testsuite>`n</testsuites>"
            $xml | Out-File $junit -Encoding UTF8
            Write-Host "Converted TRX → JUnit: $total tests, $failed failures, $skipped skipped"
          } else {
            Write-Host "No TRX file found — creating empty JUnit"
            '<?xml version="1.0"?><testsuites tests="0" failures="0"><testsuite name="IJT_CSharp_Client.Tests.Live" tests="0"/></testsuites>' | Out-File $junit -Encoding UTF8
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-csharp-live
          path: OPC_UA_Clients/Release2/IJT_CSharp_Client/test-results/
          retention-days: 14

      - name: Stop OPC UA server
        if: always()
        working-directory: ${{ github.workspace }}
        run: python scripts/start_server_on_port.py --port 40464 --stop

      - name: Fail if Tests Failed
        if: always() && (steps.build.outcome == 'failure' || steps.tests.outcome == 'failure')
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
        run: |
          echo "C# live tests failed:"
          echo "  build -> $BUILD_OUTCOME"
          echo "  tests -> $TESTS_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # C# Client - OPC UA Security
  #   csharp-client-opcua-security-windows: C# client against Windows server package on port 40475.
  #   csharp-client-opcua-security-linux: C# client against Linux Docker server package on port 40476.
  #   These jobs are intended to become required checks after Phase 1 evidence
  #   and the deferred branch-ruleset update.
  # ───────────────────────────────────────────────────────────────────────────
  csharp-client-opcua-security:
    name: "C# OPC UA Security - ${{ matrix.server_label }}"
    needs: crypto-path-filter
    if: needs.crypto-path-filter.outputs.run_opcua_security == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: csharp-client-opcua-security-windows
            server_label: Windows
            sut: windows
            port: 40475
            os: windows-latest
          - target: csharp-client-opcua-security-linux
            server_label: Linux
            sut: linux
            port: 40476
            os: ubuntu-latest
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_CSharp_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: '10.x'

      - name: Extract Windows server ZIP
        if: matrix.sut == 'windows'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force

      - name: Run C# OPC UA security tests
        env:
          IJT_OPCUA_SECURITY_SUT: ${{ matrix.sut }}
          IJT_OPCUA_SECURITY_TARGET: ${{ matrix.target }}
          # Hosted runners start without opcua-ijt-server:latest, so
          # docker compose builds the image once when needed. Do not force
          # --build on every isolated server start inside the OPC UA security target.
          IJT_DOCKER_COMPOSE_BUILD: "0"
          OPCUA_SERVER_PORT: ${{ matrix.port }}
          OPCUA_SERVER_URL: opc.tcp://localhost:${{ matrix.port }}
          IJT_SERVER_URL: opc.tcp://localhost:${{ matrix.port }}
        run: python run_all_tests.py --opcua-security --opcua-security-target ${{ matrix.target }} --opcua-security-sut ${{ matrix.sut }} --junit-xml test-results/opcua-security-${{ matrix.target }}.xml

      - name: Upload C# OPC UA security artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-csharp-client-opcua-security-${{ matrix.target }}
          path: OPC_UA_Clients/Release2/IJT_CSharp_Client/test-results/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Console Client - OPC UA Security
  #   console-client-opcua-security-windows: Console client against Windows server package on port 40477.
  #   console-client-opcua-security-linux: Console client against Linux Docker server package on port 40478.
  #   These jobs are intended to become required checks after Phase 1 evidence
  #   and the deferred branch-ruleset update.
  # ───────────────────────────────────────────────────────────────────────────
  console-client-opcua-security:
    name: "Console OPC UA Security - ${{ matrix.server_label }}"
    needs: crypto-path-filter
    if: needs.crypto-path-filter.outputs.run_opcua_security == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: console-client-opcua-security-windows
            server_label: Windows
            sut: windows
            port: 40477
            os: windows-latest
          - target: console-client-opcua-security-linux
            server_label: Linux
            sut: linux
            port: 40478
            os: ubuntu-latest
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Console_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Run Console OPC UA security tests
        env:
          IJT_OPCUA_SECURITY_SUT: ${{ matrix.sut }}
          IJT_OPCUA_SECURITY_TARGET: ${{ matrix.target }}
          # Hosted runners start without opcua-ijt-server:latest, so
          # docker compose builds the image once when needed. Do not force
          # --build on every isolated server start inside the OPC UA security target.
          IJT_DOCKER_COMPOSE_BUILD: "0"
          OPCUA_SERVER_PORT: ${{ matrix.port }}
          OPCUA_SERVER_URL: opc.tcp://localhost:${{ matrix.port }}
        run: python run_all_tests.py --opcua-security --opcua-security-target ${{ matrix.target }} --opcua-security-sut ${{ matrix.sut }} --junit-xml test-results/opcua-security-${{ matrix.target }}.xml

      - name: Upload Console OPC UA security artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-console-client-opcua-security-${{ matrix.target }}
          path: OPC_UA_Clients/Release2/IJT_Console_Client/test-results/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Combined Report — always runs after all jobs.
  # Writes the root-level summary table to the Actions Summary page.
  # ───────────────────────────────────────────────────────────────────────────
  report:
    name: "📋 System Tests Summary"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [server-smoke-docker, webclient-docker, int-testclient, live-webclient, live-webclient-browser, live-console, csharp-live, csharp-client-opcua-security, console-client-opcua-security]
    if: always()
    permissions:
      actions: read
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Download All Test Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: all-results/

      - name: "Report — OPC UA Server Smoke (Docker)"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "OPC UA Server — Smoke Tests (Docker Linux)"
          path: all-results/results-server-smoke-docker/smoke.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Web Client Docker Python Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client Docker — Python Tests"
          path: all-results/results-webclient-docker/pytest-unit.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Web Client Docker JS Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client Docker — JS Tests (Vitest)"
          path: all-results/results-webclient-docker/vitest.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Test Client Conformance Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Test Client — Conformance Tests (Live)"
          path: all-results/results-testclient/pytest.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Web Client Integration Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — Local Live Suites"
          path: all-results/results-live-webclient-*/**/*.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Console Client Live Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Console Client — Live Tests"
          path: all-results/results-live-console/**/pytest-live.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — C# Client Live Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "C# Client — Live Tests (xUnit)"
          path: all-results/results-csharp-live/tests.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — C# OPC UA Security"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "C# Client — OPC UA Security"
          path: all-results/results-csharp-client-opcua-security-*/opcua-security-*.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Console OPC UA Security"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Console Client — OPC UA Security"
          path: all-results/results-console-client-opcua-security-*/opcua-security-*.xml
          reporter: java-junit
          use-actions-summary: false
          fail-on-error: false
          fail-on-empty: false

      - name: Generate Summary Table
        env:
          SD_RESULT:   ${{ needs.server-smoke-docker.result }}
          WD_RESULT:   ${{ needs.webclient-docker.result }}
          TC_RESULT:   ${{ needs.int-testclient.result }}
          WC_RESULT:   ${{ needs.live-webclient.result }}
          WB_RESULT:   ${{ needs.live-webclient-browser.result }}
          CON_RESULT:  ${{ needs.live-console.result }}
          CS_RESULT:   ${{ needs.csharp-live.result }}
          CS_OPCUA_SECURITY_RESULT: ${{ needs.csharp-client-opcua-security.result }}
          CONSOLE_OPCUA_SECURITY_RESULT: ${{ needs.console-client-opcua-security.result }}
          GH_SHA:         ${{ github.sha }}
          GH_BRANCH:      ${{ github.ref_name }}
          GH_RUN_NUMBER:  ${{ github.run_number }}
          GH_RUN_URL:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_REPOSITORY:  ${{ github.repository }}
          GH_RUN_ID:      ${{ github.run_id }}
          GH_API_URL:     ${{ github.api_url }}
          GH_TOKEN:       ${{ github.token }}
          REPORT_JOB_NAME: "📋 System Tests Summary"
        run: |
          python3 reporting/system_tests_run_summary.py

      - name: Collect Timing JSON
        if: always()
        env:
          TIMING_WORKFLOW_NAME: "System Tests — Live OPC UA, Browser, Docker, Conformance"
          TIMING_OUTPUT_DIR: timing-results
          GH_REPOSITORY:  ${{ github.repository }}
          GH_RUN_ID:      ${{ github.run_id }}
          GH_RUN_NUMBER:  ${{ github.run_number }}
          GH_SHA:         ${{ github.sha }}
          GH_BRANCH:      ${{ github.ref_name }}
          GH_RUN_URL:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_API_URL:     ${{ github.api_url }}
          GH_TOKEN:       ${{ github.token }}
          REPORT_JOB_NAME: "📋 System Tests Summary"
        run: |
          python3 scripts/reporting/collect_timing.py

      - name: Upload Timing Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: timing-system-tests
          path: timing-results/
          retention-days: 14
