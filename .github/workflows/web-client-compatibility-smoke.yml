# ─────────────────────────────────────────────────────────────────────────────
# Web Client — Browser Compatibility Smoke
#
# This scheduled/manual workflow runs Web Client compatibility smoke specs
# against configured (OS, browser) cells. Today: windows-latest with the
# runner's installed Microsoft Edge channel. Audit-derived scope: Result bundle
# import via the visible file chooser, and Result bundle JSON export via browser
# download.
# ─────────────────────────────────────────────────────────────────────────────

name: "Web Client — Browser Compatibility Smoke"

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-client-compatibility-smoke:
    name: "Web Client — Browser Compatibility Smoke"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: pwsh
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            browser: msedge

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.14"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"

      - name: Capture browser and runner versions
        id: browser_probe
        env:
          BROWSER_CHANNEL: ${{ matrix.browser }}
        run: |
          $ErrorActionPreference = "Stop"
          switch ($env:BROWSER_CHANNEL) {
            "msedge" {
              $browserPath = @(
                "${env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe",
                "${env:ProgramFiles}\Microsoft\Edge\Application\msedge.exe"
              ) | Where-Object { Test-Path $_ } | Select-Object -First 1
            }
            default {
              throw "Unsupported browser matrix value: $env:BROWSER_CHANNEL"
            }
          }
          if (-not $browserPath) {
            throw "$env:BROWSER_CHANNEL executable was not found on this runner"
          }
          $browserVersion = (Get-Item $browserPath).VersionInfo.ProductVersion
          "browser_version=$browserVersion" >> $env:GITHUB_OUTPUT
          "image_os=$env:ImageOS" >> $env:GITHUB_OUTPUT
          "image_version=$env:ImageVersion" >> $env:GITHUB_OUTPUT

      - name: Run Web Client — Browser Compatibility Smoke
        run: python OPC_UA_Clients/Release2/IJT_Web_Client/run_all_tests.py --compatibility-smoke-only

      - name: Write compatibility smoke environment artifact
        if: always()
        env:
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_BROWSER: ${{ matrix.browser }}
          IMAGE_OS: ${{ steps.browser_probe.outputs.image_os }}
          IMAGE_VERSION: ${{ steps.browser_probe.outputs.image_version }}
          BROWSER_VERSION: ${{ steps.browser_probe.outputs.browser_version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $dir = "OPC_UA_Clients/Release2/IJT_Web_Client/test-results"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          @"
          RUNNER_OS=${env:RUNNER_OS}
          MatrixOS=$env:MATRIX_OS
          MatrixBrowser=$env:MATRIX_BROWSER
          ImageOS=$env:IMAGE_OS
          ImageVersion=$env:IMAGE_VERSION
          BrowserVersion=$env:BROWSER_VERSION
          RunURL=$env:RUN_URL
          "@ | Set-Content -Path "$dir/compatibility-smoke-environment.txt" -Encoding UTF8

      - name: Upload Web Client — Browser Compatibility Smoke results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-web-client-compatibility-smoke-${{ matrix.os }}-${{ matrix.browser }}
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/
          retention-days: 14
          if-no-files-found: warn

      - name: Open or update compatibility smoke issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_BROWSER: ${{ matrix.browser }}
          IMAGE_OS: ${{ steps.browser_probe.outputs.image_os }}
          IMAGE_VERSION: ${{ steps.browser_probe.outputs.image_version }}
          BROWSER_VERSION: ${{ steps.browser_probe.outputs.browser_version }}
          WORKFLOW_NAME: ${{ github.workflow }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $ErrorActionPreference = "Stop"
          $title = "[Web Client Compatibility Smoke] $env:MATRIX_OS / $env:MATRIX_BROWSER"
          $body = @"
          Web Client — Browser Compatibility Smoke failed.

          - Run: $env:RUN_URL
          - OS: $env:MATRIX_OS
          - Browser: $env:MATRIX_BROWSER
          - Browser version: $env:BROWSER_VERSION
          - ImageOS: $env:IMAGE_OS
          - ImageVersion: $env:IMAGE_VERSION
          - Workflow: $env:WORKFLOW_NAME
          - Commit: $env:COMMIT_SHA

          See artifact ``results-web-client-compatibility-smoke-$env:MATRIX_OS-$env:MATRIX_BROWSER`` for Playwright/JUnit output, traces, videos, and logs.
          "@
          $bodyPath = Join-Path $env:RUNNER_TEMP "compatibility-smoke-issue.md"
          $body | Set-Content -Path $bodyPath -Encoding UTF8

          $issueJson = gh issue list --search "`"$title`" in:title" --state open --json number,title
          $issues = @($issueJson | ConvertFrom-Json)
          $issue = $issues | Where-Object { $_.title -eq $title } | Select-Object -First 1
          if ($issue) {
            gh issue comment $($issue.number) --body-file $bodyPath
          } else {
            gh issue create --title $title --body-file $bodyPath
          }

      - name: Close recovered compatibility smoke issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_BROWSER: ${{ matrix.browser }}
          IMAGE_OS: ${{ steps.browser_probe.outputs.image_os }}
          IMAGE_VERSION: ${{ steps.browser_probe.outputs.image_version }}
          BROWSER_VERSION: ${{ steps.browser_probe.outputs.browser_version }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $ErrorActionPreference = "Stop"
          $title = "[Web Client Compatibility Smoke] $env:MATRIX_OS / $env:MATRIX_BROWSER"
          $issueJson = gh issue list --search "`"$title`" in:title" --state open --json number,title
          $issues = @($issueJson | ConvertFrom-Json)
          $matchingIssues = @($issues | Where-Object { $_.title -eq $title })
          if ($matchingIssues.Count -eq 0) {
            exit 0
          }

          $comment = @"
          Web Client — Browser Compatibility Smoke recovered.

          - Green run: $env:RUN_URL
          - OS: $env:MATRIX_OS
          - Browser: $env:MATRIX_BROWSER
          - Browser version: $env:BROWSER_VERSION
          - ImageOS: $env:IMAGE_OS
          - ImageVersion: $env:IMAGE_VERSION
          - Commit: $env:COMMIT_SHA
          "@
          $commentPath = Join-Path $env:RUNNER_TEMP "compatibility-smoke-recovered.md"
          $comment | Set-Content -Path $commentPath -Encoding UTF8
          foreach ($issue in $matchingIssues) {
            gh issue comment $($issue.number) --body-file $commentPath
            gh issue close $($issue.number)
          }

      - name: Render run summary
        if: always()
        shell: pwsh
        env:
          BROWSER_VERSION: ${{ steps.browser_probe.outputs.browser_version }}
          IMAGE_OS: ${{ steps.browser_probe.outputs.image_os }}
          IMAGE_VERSION: ${{ steps.browser_probe.outputs.image_version }}
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_BROWSER: ${{ matrix.browser }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JUNIT_PATH: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/playwright-compatibility-smoke.xml
        run: |
          $ErrorActionPreference = "Continue"

          function ConvertTo-Int([object] $value) {
            if ($null -eq $value -or [string]::IsNullOrWhiteSpace([string] $value)) {
              return 0
            }
            return [int] $value
          }

          function Format-MarkdownCell([object] $value) {
            if ($null -eq $value) {
              return ""
            }
            return ([string] $value).Replace("|", "\|").Replace("`r", " ").Replace("`n", " ")
          }

          $summaryPath = $env:GITHUB_STEP_SUMMARY
          if ([string]::IsNullOrWhiteSpace($summaryPath)) {
            $summaryPath = Join-Path $env:RUNNER_TEMP "compatibility-smoke-summary.md"
          }

          $total = 0
          $failed = 0
          $skipped = 0
          $passed = 0
          $cases = @()
          $parseWarning = $null

          if (Test-Path -LiteralPath $env:JUNIT_PATH) {
            try {
              [xml] $junit = Get-Content -Raw -LiteralPath $env:JUNIT_PATH
              if ($junit.testsuites) {
                $suiteNodes = @($junit.testsuites.testsuite)
              } elseif ($junit.testsuite) {
                $suiteNodes = @($junit.testsuite)
              } else {
                $suiteNodes = @()
              }

              foreach ($suite in $suiteNodes) {
                $suiteTests = ConvertTo-Int $suite.tests
                $suiteFailures = ConvertTo-Int $suite.failures
                $suiteErrors = ConvertTo-Int $suite.errors
                $suiteSkipped = ConvertTo-Int $suite.skipped
                $total += $suiteTests
                $failed += $suiteFailures + $suiteErrors
                $skipped += $suiteSkipped

                foreach ($case in @($suite.testcase)) {
                  if ($null -eq $case) {
                    continue
                  }
                  $caseFailed = $null -ne $case.failure -or $null -ne $case.error
                  $caseSkipped = $null -ne $case.skipped
                  $status = if ($caseFailed) { "fail" } elseif ($caseSkipped) { "skip" } else { "pass" }
                  $cases += [pscustomobject] @{
                    Name = $case.name
                    Status = $status
                    Time = $case.time
                  }
                }
              }
              $passed = $total - $failed - $skipped
            } catch {
              $parseWarning = $_.Exception.Message
            }
          } else {
            $parseWarning = "JUnit results not found: $($env:JUNIT_PATH)"
          }

          if ($total -eq 0) {
            $headline = "## Web Client — Browser Compatibility Smoke - $($env:MATRIX_OS) / $($env:MATRIX_BROWSER)`n`nStatus: results unavailable."
          } elseif ($failed -gt 0) {
            $headline = "## Web Client — Browser Compatibility Smoke - $($env:MATRIX_OS) / $($env:MATRIX_BROWSER)`n`nStatus: failed - $failed of $total specs failed."
          } else {
            $headline = "## Web Client — Browser Compatibility Smoke - $($env:MATRIX_OS) / $($env:MATRIX_BROWSER)`n`nStatus: passed - all $total specs passed."
          }

          $lines = @(
            $headline,
            "",
            "### Specs",
            "",
            "| Spec | Status | Duration (s) |",
            "|------|--------|--------------|"
          )

          if ($cases.Count -gt 0) {
            foreach ($case in $cases) {
              $lines += "| $(Format-MarkdownCell $case.Name) | $(Format-MarkdownCell $case.Status) | $(Format-MarkdownCell $case.Time) |"
            }
          } else {
            $lines += "| No spec rows available | unknown |  |"
          }

          $lines += @(
            "",
            "### Environment",
            "",
            "- Browser: $($env:MATRIX_BROWSER) $($env:BROWSER_VERSION)",
            "- OS: $($env:MATRIX_OS)",
            "- ImageOS: $($env:IMAGE_OS)",
            "- ImageVersion: $($env:IMAGE_VERSION)",
            "- Run: $($env:RUN_URL)",
            "",
            "Artifact: ``results-web-client-compatibility-smoke-$($env:MATRIX_OS)-$($env:MATRIX_BROWSER)``"
          )

          if ($parseWarning) {
            $lines += @("", "JUnit parse note: ``$parseWarning``")
          }

          $lines | Set-Content -Path $summaryPath -Encoding UTF8
