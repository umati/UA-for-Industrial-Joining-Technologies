# ─────────────────────────────────────────────────────────────────────────────
# Heavy Tests — OPC UA Server Docker Smoke + Integration Tests
#
# Runs nightly, on manual trigger, or when OPC UA Server / Web Client code
# changes are pushed to main. These jobs are excluded from the fast CI path
# because they take 20-30 minutes (Docker build + 13 integration tests).
#
# Jobs:
#   server-smoke-docker  Release2 / OPC UA Server        Linux native Docker build + smoke
#   integration-tests    Release2 / Integration Tests     Windows: OPC UA + Test Client + WebSocket
# ─────────────────────────────────────────────────────────────────────────────

name: Heavy Tests

on:
  schedule:
    - cron: '0 2 * * *'   # nightly at 2am UTC
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]
    paths:
      - 'OPC_UA_Servers/**'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/**'
      - 'OPC_UA_Clients/Release2/IJT_Test_Client/**'

permissions:
  contents: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: heavy-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / OPC UA Server — Docker Smoke
  #   Extract the Linux ZIP to satisfy the COPY instructions in the Dockerfile,
  #   build the native Linux Docker image (layer-cached via GitHub Actions cache),
  #   start the container, wait for TCP 40451, run all 8 smoke checks, tear down.
  # ───────────────────────────────────────────────────────────────────────────
  server-smoke-docker:
    name: "Release2 / OPC UA Server — Docker Smoke"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Extract server ZIP (required for Docker COPY instructions)
        working-directory: OPC_UA_Servers/Release2
        run: |
          unzip -q OPC_UA_IJT_Server_Simulator_Linux.zip
          echo "Extracted: $(ls OPC_UA_IJT_Server_Simulator_Linux/)"

      - name: Lint Dockerfile (hadolint)
        run: |
          docker run --rm -i hadolint/hadolint hadolint \
            --ignore DL3008 --ignore DL3009 \
            - < OPC_UA_Servers/Release2/Dockerfile
          echo "Dockerfile lint OK"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (Linux native binary)
        uses: docker/build-push-action@v7
        with:
          context: OPC_UA_Servers/Release2
          tags: opcua-ijt-server:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start OPC UA Server container
        run: |
          docker run -d --name opcua-server \
            -p 40451:40451 opcua-ijt-server:ci
          echo "Container started"

      - name: Wait for OPC UA port 40451
        # Linux binary starts in ~3 s; allow up to 60 s total.
        run: |
          for i in $(seq 1 12); do
            if nc -z localhost 40451 2>/dev/null; then
              echo "Port 40451 open after $((i * 5)) s"
              exit 0
            fi
            echo "Waiting... attempt $i/12"
            sleep 5
          done
          echo "ERROR: Timeout — dumping container logs:"
          docker logs opcua-server --tail 60
          exit 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install smoke test dependencies
        run: pip install -r OPC_UA_Servers/Release2/tests/requirements.txt

      - name: Run smoke test (8 checks)
        run: python OPC_UA_Servers/Release2/tests/smoke_test.py --timeout 30

      - name: Dump container logs
        if: always()
        run: docker logs opcua-server --tail 60 || true

      - name: Teardown container
        if: always()
        run: docker rm -f opcua-server || true

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / Integration Tests (Windows)
  #   OPC UA Server running natively + IJT Test Client full suite + Web Client.
  #   All tests run against opc.tcp://localhost:40451.
  # ───────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: "Release2 / Integration Tests (Windows)"
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Extract server ZIP
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force
          Write-Host "Extracted ZIP contents:"
          Get-ChildItem "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" | Select-Object Name

      - name: Start OPC UA Server (background)
        run: |
          $proc = Start-Process `
            -FilePath "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\opcua_ijt_demo_application.exe" `
            -WorkingDirectory "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" `
            -PassThru -WindowStyle Hidden
          Write-Host "Server PID: $($proc.Id)"
          echo "SERVER_PID=$($proc.Id)" >> $env:GITHUB_ENV

      - name: Wait for OPC UA port 40451
        run: |
          $timeout = 60
          $start   = Get-Date
          while (((Get-Date) - $start).TotalSeconds -lt $timeout) {
            if (Test-NetConnection -ComputerName localhost -Port 40451 `
                  -InformationLevel Quiet -WarningAction SilentlyContinue) {
              Write-Host "Port 40451 is open"
              exit 0
            }
            Write-Host "Waiting for server..."
            Start-Sleep -Seconds 3
          }
          Write-Host "ERROR: Timeout waiting for port 40451"
          exit 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install smoke test dependencies
        run: pip install -r OPC_UA_Servers/Release2/tests/requirements.txt

      - name: Run smoke test (8 checks)
        run: python OPC_UA_Servers/Release2/tests/smoke_test.py --timeout 30

      - name: Install IJT Test Client dependencies
        working-directory: OPC_UA_Clients/Release2/IJT_Test_Client
        run: pip install -r requirements.txt

      - name: Run IJT Test Client tests (all tests)
        working-directory: OPC_UA_Clients/Release2/IJT_Test_Client
        env:
          OPCUA_SERVER_URL: opc.tcp://localhost:40451
        run: |
          python -m pytest . `
            -v --tb=short --timeout=120 `
            --junitxml=test-results/pytest.xml

      - name: Run Web Client integration tests (13 tests, 0 skips)
        env:
          OPCUA_TEST_ENDPOINT: opc.tcp://localhost:40451
          OPCUA_WS_URL: ws://localhost:8001
        run: |
          pip install -r OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt `
                      -r OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt
          python -m pytest OPC_UA_Clients/Release2/IJT_Web_Client/tests/python/integration/ `
            -v --tb=short --timeout=60 `
            --junitxml=OPC_UA_Clients/Release2/IJT_Web_Client/test-results/pytest-integration.xml

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-integration-tests
          path: |
            OPC_UA_Clients/Release2/IJT_Test_Client/test-results/
            OPC_UA_Clients/Release2/IJT_Web_Client/test-results/

      - name: Stop servers
        if: always()
        run: |
          if ($env:SERVER_PID) {
            Stop-Process -Id $env:SERVER_PID -Force -ErrorAction SilentlyContinue
            Write-Host "OPC UA server stopped"
          }
          if ($env:WS_SERVER_PID) {
            Stop-Process -Id $env:WS_SERVER_PID -Force -ErrorAction SilentlyContinue
            Write-Host "Web server stopped"
          }
