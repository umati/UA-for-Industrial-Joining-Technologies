# ─────────────────────────────────────────────────────────────────────────────
# CI Extended — Live / Integration / Docker / Security Tests
#
# TIER: ci-extended (non-blocking) — skips and failures are tracked but do
# not gate merges. See docs/TEST_TIERS.md for the full tier policy and the
# known-expected-skips table.
#
# Jobs:
#   server-smoke-docker  Release2 / OPC UA Server        Linux native Docker build + smoke
#   webclient-docker     Release2 / IJT Web Client        Docker unit/prod tests
#   int-testclient       Release2 / Test Client           Windows: OPC UA server + Test Client full suite
#   int-live-others      Release2 / Web Client + Console  Windows: Web Client integration + Console live (parallel)
#   zizmor               GHA Security Audit               Optional — non-blocking; findings tracked
#
# Triggers:
#   - Nightly at 2am UTC
#   - Manual dispatch (workflow_dispatch)
#   - Push / PR touching server or client code paths (see path filters below)
# ─────────────────────────────────────────────────────────────────────────────

name: CI Extended

on:
  schedule:
    - cron: '0 2 * * *'   # nightly at 2am UTC
  workflow_dispatch:        # manual trigger
  push:
    branches: [main]
    paths:
      # OPC UA Server — code/binary/Dockerfile/test changes (docs-only changes excluded)
      - 'OPC_UA_Servers/Release2/*.zip'
      - 'OPC_UA_Servers/Release2/Dockerfile'
      - 'OPC_UA_Servers/Release2/tests/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator_Linux/**'
      # Web Client — only OPC UA backend, Docker config, integration tests, and dependencies
      # GUI/JS/unit-test changes are covered by fast CI and do NOT need live OPC UA testing
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/src/python/**'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/tests/python/integration/**'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/tests/shared_opcua/**'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/index.py'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/Dockerfile'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/docker-compose.yml'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/requirements*.txt'
      # Test Client — every change is an OPC UA conformance test change
      - 'OPC_UA_Clients/Release2/IJT_Test_Client/**'
      # Console Client — live tests run here (not in fast CI)
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/*.py'
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/tests/live/**'
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/requirements*.txt'
      # Any workflow file — zizmor audits all of .github/workflows/
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      # Same paths as push — run live tests on PRs that touch server/client code
      # so regressions are caught before merge, not after.
      - 'OPC_UA_Servers/Release2/*.zip'
      - 'OPC_UA_Servers/Release2/Dockerfile'
      - 'OPC_UA_Servers/Release2/tests/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator/**'
      - 'OPC_UA_Servers/Release2/OPC_UA_IJT_Server_Simulator_Linux/**'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/src/python/**'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/tests/python/integration/**'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/tests/shared_opcua/**'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/index.py'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/Dockerfile'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/docker-compose.yml'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/requirements*.txt'
      - 'OPC_UA_Clients/Release2/IJT_Test_Client/**'
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/*.py'
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/tests/live/**'
      - 'OPC_UA_Clients/Release2/IJT_Console_Client/requirements*.txt'
      # Any workflow file — zizmor audits all of .github/workflows/
      - '.github/workflows/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-extended-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / OPC UA Server — Docker Smoke
  #   Extract the Linux ZIP to satisfy the COPY instructions in the Dockerfile,
  #   build the native Linux Docker image (layer-cached via GitHub Actions cache),
  #   start the container, wait for TCP 40451, run all 10 smoke checks, tear down.
  # ───────────────────────────────────────────────────────────────────────────
  server-smoke-docker:
    name: "Release2 / OPC UA Server — Docker Smoke"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Extract server ZIP (required for Docker COPY instructions)
        working-directory: OPC_UA_Servers/Release2
        run: |
          unzip -q OPC_UA_IJT_Server_Simulator_Linux.zip
          echo "Extracted: $(ls OPC_UA_IJT_Server_Simulator_Linux/)"

      - name: Lint Dockerfile (hadolint)
        run: |
          docker run --rm -i hadolint/hadolint hadolint \
            --ignore DL3008 --ignore DL3009 \
            - < OPC_UA_Servers/Release2/Dockerfile
          echo "Dockerfile lint OK"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (Linux native binary)
        uses: docker/build-push-action@v7
        with:
          context: OPC_UA_Servers/Release2
          tags: opcua-ijt-server:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start OPC UA Server container
        run: |
          docker run -d --name opcua-server \
            -p 40451:40451 opcua-ijt-server:ci
          echo "Container started"

      - name: Wait for OPC UA port 40451
        # Linux binary starts in ~3 s; allow up to 60 s total.
        run: |
          for i in $(seq 1 12); do
            if nc -z localhost 40451 2>/dev/null; then
              echo "Port 40451 open after $((i * 5)) s"
              exit 0
            fi
            echo "Waiting... attempt $i/12"
            sleep 5
          done
          echo "ERROR: Timeout — dumping container logs:"
          docker logs opcua-server --tail 60
          exit 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install smoke test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r OPC_UA_Servers/Release2/tests/requirements.txt

      - name: Run smoke test (10 checks)
        run: python OPC_UA_Servers/Release2/tests/smoke_test.py --tcp-timeout 30

      - name: Dump container logs
        if: always()
        run: docker logs opcua-server --tail 60 || true  # diagnostic only; ignore errors if container already gone

      - name: Teardown container
        if: always()
        run: docker rm -f opcua-server || true

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Web Client — Docker Tests
  #   Builds both the 'test' target (Python unit + JS vitest inside container)
  #   and the 'production' target (HTTP health check on port 3000).
  # ───────────────────────────────────────────────────────────────────────────
  webclient-docker:
    name: "Release2 / IJT Web Client — Docker Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Web Client Docker image (test target)
        uses: docker/build-push-action@v7
        with:
          context: OPC_UA_Clients/Release2/IJT_Web_Client
          target: test
          tags: ijt-web-client:test-ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Python unit tests inside Docker
        run: |
          docker run --rm ijt-web-client:test-ci \
            python -m pytest tests/python/unit/ \
              -v --tb=short --no-header \
              --junitxml=/tmp/pytest-unit.xml
          docker cp "$(docker create --rm ijt-web-client:test-ci true)":/tmp/pytest-unit.xml \
            pytest-unit.xml 2>/dev/null || true

      - name: Run JS unit tests (vitest) inside Docker
        run: |
          docker run --rm ijt-web-client:test-ci npx vitest run

      - name: Build Web Client Docker image (production target)
        uses: docker/build-push-action@v7
        with:
          context: OPC_UA_Clients/Release2/IJT_Web_Client
          target: production
          tags: ijt-web-client:prod-ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start production container and verify HTTP health
        run: |
          docker run -d --name ijt-web-prod \
            -p 3000:3000 \
            -e IS_DOCKER=true \
            ijt-web-client:prod-ci
          echo "Waiting for HTTP on port 3000..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000 >/dev/null 2>&1; then
              echo "HTTP 200 OK after $((i * 3))s"
              exit 0
            fi
            echo "Attempt $i/20..."
            sleep 3
          done
          echo "ERROR: HTTP health check timed out. Container logs:"
          docker logs ijt-web-prod --tail 40
          exit 1

      - name: Teardown Web Client container
        if: always()
        run: docker rm -f ijt-web-prod || true

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / Test Client — Windows Live Tests
  #   Runs the full IJT Test Client suite against the native Windows OPC UA
  #   server binary.  Split from the old monolithic integration-tests job so
  #   it runs in parallel with int-live-others (Web Client + Console).
  # ───────────────────────────────────────────────────────────────────────────
  int-testclient:
    name: "Release2 / Test Client (Windows Live)"
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Extract server ZIP
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force

      - name: Start OPC UA Server (background)
        run: |
          $proc = Start-Process `
            -FilePath "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\opcua_ijt_demo_application.exe" `
            -WorkingDirectory "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" `
            -PassThru -WindowStyle Hidden
          echo "SERVER_PID=$($proc.Id)" >> $env:GITHUB_ENV

      - name: Wait for OPC UA port 40451
        run: |
          $start = Get-Date
          while (((Get-Date) - $start).TotalSeconds -lt 60) {
            if (Test-NetConnection -ComputerName localhost -Port 40451 `
                  -InformationLevel Quiet -WarningAction SilentlyContinue) {
              Write-Host "Port 40451 open"; exit 0
            }
            Start-Sleep -Seconds 3
          }
          Write-Host "ERROR: Timeout waiting for port 40451"; exit 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: |
            OPC_UA_Servers/Release2/tests/requirements.txt
            OPC_UA_Clients/Release2/IJT_Test_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Test_Client/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install `
            -r OPC_UA_Servers/Release2/tests/requirements.txt `
            -r OPC_UA_Clients/Release2/IJT_Test_Client/requirements.txt `
            -r OPC_UA_Clients/Release2/IJT_Test_Client/requirements-dev.txt

      - name: Run smoke test (quick server sanity check)
        run: python OPC_UA_Servers/Release2/tests/smoke_test.py --tcp-timeout 30

      - name: Run IJT Test Client tests (all tests)
        working-directory: OPC_UA_Clients/Release2/IJT_Test_Client
        env:
          OPCUA_SERVER_URL: opc.tcp://localhost:40451
        run: |
          python -m pytest . `
            -v --tb=short --timeout=120 `
            --junitxml=test-results/pytest.xml

      - name: Upload Test Client results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-testclient
          path: OPC_UA_Clients/Release2/IJT_Test_Client/test-results/

      - name: Stop server
        if: always()
        run: |
          if ($env:SERVER_PID) {
            Stop-Process -Id $env:SERVER_PID -Force -ErrorAction SilentlyContinue
          }

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / Web Client + Console — Windows Live Tests
  #   Runs Web Client integration tests (13) and Console Client live tests
  #   in parallel with int-testclient — each job has its own server copy.
  # ───────────────────────────────────────────────────────────────────────────
  int-live-others:
    name: "Release2 / Web Client + Console (Windows Live)"
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Extract server ZIP
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force

      - name: Start OPC UA Server (background)
        run: |
          $proc = Start-Process `
            -FilePath "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\opcua_ijt_demo_application.exe" `
            -WorkingDirectory "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" `
            -PassThru -WindowStyle Hidden
          echo "SERVER_PID=$($proc.Id)" >> $env:GITHUB_ENV

      - name: Wait for OPC UA port 40451
        run: |
          $start = Get-Date
          while (((Get-Date) - $start).TotalSeconds -lt 60) {
            if (Test-NetConnection -ComputerName localhost -Port 40451 `
                  -InformationLevel Quiet -WarningAction SilentlyContinue) {
              Write-Host "Port 40451 open"; exit 0
            }
            Start-Sleep -Seconds 3
          }
          Write-Host "ERROR: Timeout waiting for port 40451"; exit 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: |
            OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt
            OPC_UA_Clients/Release2/IJT_Console_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Console_Client/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install `
            -r OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt `
            -r OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt `
            -r OPC_UA_Clients/Release2/IJT_Console_Client/requirements.txt `
            -r OPC_UA_Clients/Release2/IJT_Console_Client/requirements-dev.txt

      - name: Run Web Client integration tests
        env:
          OPCUA_TEST_ENDPOINT: opc.tcp://localhost:40451
          OPCUA_WS_URL: ws://localhost:8001
        run: |
          python -m pytest OPC_UA_Clients/Release2/IJT_Web_Client/tests/python/integration/ `
            -v --tb=short --timeout=60 `
            --junitxml=OPC_UA_Clients/Release2/IJT_Web_Client/test-results/pytest-integration.xml

      - name: Run Console Client live tests
        working-directory: OPC_UA_Clients/Release2/IJT_Console_Client
        env:
          OPCUA_SERVER_URL: opc.tcp://localhost:40451
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          python -m pytest tests/live/ `
            -v --tb=short --timeout=120 `
            --junitxml=test-results/pytest-live.xml

      - name: Upload Web Client + Console results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: results-live-others
          path: |
            OPC_UA_Clients/Release2/IJT_Web_Client/test-results/
            OPC_UA_Clients/Release2/IJT_Console_Client/test-results/

      - name: Stop server
        if: always()
        run: |
          if ($env:SERVER_PID) {
            Stop-Process -Id $env:SERVER_PID -Force -ErrorAction SilentlyContinue
          }

  # ───────────────────────────────────────────────────────────────────────────
  # GHA Security Audit (zizmor) — OPTIONAL / NON-BLOCKING
  #   Audits all GHA workflow files for supply-chain and injection risks.
  #   Findings are uploaded to GitHub Code Scanning (Security tab) as SARIF —
  #   the job never fails CI. Review alerts at: Security → Code scanning alerts.
  #   Fork PRs are skipped: security-events: write is unavailable in fork context.
  #   Docs: https://woodruffw.github.io/zizmor/
  # ───────────────────────────────────────────────────────────────────────────
  zizmor:
    name: "GHA Security Audit (zizmor) [optional]"
    runs-on: ubuntu-latest
    # Skip fork PRs: they cannot write to Code Scanning (no security-events: write).
    # Non-PR events (push, schedule, workflow_dispatch) always run.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      security-events: write  # required to upload SARIF to Code Scanning

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run zizmor (GHA security audit → SARIF upload)
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8  # v0.5.2
        with:
          inputs: .github/workflows/
