# ─────────────────────────────────────────────────────────────────────────────
# CI Required — IJT OPC UA Fast Test Suite
#
# TIER: ci-required (blocking) — must pass on every push / PR to main.
# See docs/TEST_TIERS.md for tier policy, skip budget rules, and the full list
# of known expected skips.
#
# Jobs:
#   web-client           Release2 / IJT Web Client    Python pytest · Vitest · ESLint · Bandit · npm audit
#   console-client       Release2 / IJT Console Client Python pytest · Bandit
#   node-client          Release1 / IJT Node Client   Vitest · ESLint · npm audit
#   docker-smoke         Release2 / IJT Web Client    Docker build + HTTP/WS readiness
#   test-client          Release2 / IJT Test Client   pytest collect-only · Bandit
#   server-smoke-windows Release2 / OPC UA Server     Windows native smoke (10 checks)
#   actionlint           GHA workflow lint    actionlint (all .github/workflows/*.yml)
#   report               Combined summary (always runs after all jobs)
#
# Live / integration / security tests: see .github/workflows/ci-extended.yml
#
# Standards used:
#   Python security : bandit    (pyproject.toml [tool.bandit]  ·  -c pyproject.toml)
#   JS security     : npm audit (--audit-level=high)
#   Test reports    : JUnit XML → dorny/test-reporter (Checks tab)
#   ESLint results  : JSON artifact → parsed in report job
#   Summary table   : $GITHUB_STEP_SUMMARY (Actions Summary tab)
# ─────────────────────────────────────────────────────────────────────────────

name: CI Required

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Opt into Node.js 24 for all actions (suppresses the Node.js 20 deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-required-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
jobs:


  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Web Client
  #   Python: pytest + bandit (pyproject.toml)
  #   JS:     vitest + eslint (JSON) + npm audit
  # ───────────────────────────────────────────────────────────────────────────
  web-client:
    name: "Release2 / IJT Web Client"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      checks: write
    outputs:
      mypy_result:   ${{ steps.mypy.outcome }}      # zizmor: ignore[template-injection]
      ruff_result:   ${{ steps.pylint.outcome }}    # zizmor: ignore[template-injection]
      eslint_result: ${{ steps.eslint.outcome }}    # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Web_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: OPC_UA_Clients/Release2/IJT_Web_Client/package-lock.json

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install JS Dependencies
        run: npm ci

      - run: mkdir -p test-results

      - name: Python Unit Tests
        id: pytest
        continue-on-error: true
        run: |
          python -m pytest tests/python/unit -q \
            --junitxml=test-results/pytest.xml \
            --cov=. \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term-missing

      - name: JS Unit Tests
        id: vitest
        continue-on-error: true
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile.junit=test-results/vitest.xml

      - name: ESLint
        id: eslint
        continue-on-error: true
        run: npx eslint src/javascripts --format json --output-file test-results/eslint.json

      - name: Bandit (Python Security)
        id: bandit
        continue-on-error: true
        run: python -m bandit -r . -c pyproject.toml --severity-level medium -f json -o test-results/bandit.json

      - name: Ruff (Python Linting)
        id: pylint
        continue-on-error: true
        run: python -m ruff check . --output-format=github

      - name: mypy (Type Checking)
        id: mypy
        continue-on-error: true
        run: python -m mypy . --ignore-missing-imports --no-error-summary

      - name: npm Audit (JS Security)
        id: npm_audit
        continue-on-error: true
        run: npm audit --audit-level=high --json > test-results/npm-audit.json

      - name: Publish Test Reports
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        with:
          name: "Web Client — Tests"
          path: |
            OPC_UA_Clients/Release2/IJT_Web_Client/test-results/pytest.xml
            OPC_UA_Clients/Release2/IJT_Web_Client/test-results/vitest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-web-client
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/

      - name: Fail if Any Check Failed
        if: always() && (
          steps.pytest.outcome    == 'failure' ||
          steps.vitest.outcome    == 'failure' ||
          steps.eslint.outcome    == 'failure' ||
          steps.bandit.outcome    == 'failure' ||
          steps.pylint.outcome    == 'failure' ||
          steps.mypy.outcome      == 'failure' ||
          steps.npm_audit.outcome == 'failure')
        env:
          PYTEST_OUTCOME:    ${{ steps.pytest.outcome }}
          VITEST_OUTCOME:    ${{ steps.vitest.outcome }}
          ESLINT_OUTCOME:    ${{ steps.eslint.outcome }}
          BANDIT_OUTCOME:    ${{ steps.bandit.outcome }}
          PYLINT_OUTCOME:    ${{ steps.pylint.outcome }}
          MYPY_OUTCOME:      ${{ steps.mypy.outcome }}
          NPM_AUDIT_OUTCOME: ${{ steps.npm_audit.outcome }}
        run: |
          echo "One or more checks failed:"
          echo "  pytest     -> $PYTEST_OUTCOME"
          echo "  vitest     -> $VITEST_OUTCOME"
          echo "  eslint     -> $ESLINT_OUTCOME"
          echo "  bandit     -> $BANDIT_OUTCOME"
          echo "  ruff       -> $PYLINT_OUTCOME"
          echo "  mypy       -> $MYPY_OUTCOME"
          echo "  npm audit  -> $NPM_AUDIT_OUTCOME"
          exit 1


  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Console Client
  #   Python: pytest + bandit (pyproject.toml)
  # ───────────────────────────────────────────────────────────────────────────
  console-client:
    name: "Release2 / IJT Console Client"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    outputs:
      mypy_result: ${{ steps.mypy.outcome }}   # zizmor: ignore[template-injection]
      ruff_result: ${{ steps.pylint.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Console_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            OPC_UA_Clients/Release2/IJT_Console_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Console_Client/requirements-dev.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - run: mkdir -p test-results

      - name: Python Unit Tests
        id: pytest
        continue-on-error: true
        run: |
          python -m pytest tests/unit/ -q \
            --junitxml=test-results/pytest.xml \
            --cov=. \
            --cov-report=xml:test-results/coverage.xml \
            --cov-report=term-missing

      - name: Bandit (Python Security)
        id: bandit
        continue-on-error: true
        run: python -m bandit -r . -c pyproject.toml --severity-level medium -f json -o test-results/bandit.json

      - name: Ruff (Python Linting)
        id: pylint
        continue-on-error: true
        run: python -m ruff check . --output-format=github

      - name: mypy (Type Checking)
        id: mypy
        continue-on-error: true
        run: python -m mypy . --ignore-missing-imports --no-error-summary

      - name: Publish Test Reports
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        with:
          name: "Console Client — Tests"
          path: OPC_UA_Clients/Release2/IJT_Console_Client/test-results/pytest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-console-client
          path: OPC_UA_Clients/Release2/IJT_Console_Client/test-results/

      - name: Fail if Any Check Failed
        if: always() && (
          steps.pytest.outcome == 'failure' ||
          steps.bandit.outcome == 'failure' ||
          steps.pylint.outcome == 'failure' ||
          steps.mypy.outcome   == 'failure')
        env:
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
          PYLINT_OUTCOME: ${{ steps.pylint.outcome }}
          MYPY_OUTCOME:   ${{ steps.mypy.outcome }}
        run: |
          echo "One or more checks failed:"
          echo "  pytest  -> $PYTEST_OUTCOME"
          echo "  bandit  -> $BANDIT_OUTCOME"
          echo "  ruff    -> $PYLINT_OUTCOME"
          echo "  mypy    -> $MYPY_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Release1 / IJT Node Client
  #   JS: vitest + eslint (JSON) + npm audit
  # ───────────────────────────────────────────────────────────────────────────
  node-client:
    name: "Release1 / IJT Node Client"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    outputs:
      eslint_result: ${{ steps.eslint.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release1/IJT_Node_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: OPC_UA_Clients/Release1/IJT_Node_Client/package-lock.json

      - name: Install JS Dependencies
        run: npm ci

      - run: mkdir -p test-results

      - name: JS Unit Tests
        id: vitest
        continue-on-error: true
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile.junit=test-results/vitest.xml

      - name: ESLint
        id: eslint
        continue-on-error: true
        run: npx eslint javascripts/ --format json --output-file test-results/eslint.json

      - name: npm Audit (JS Security)
        id: npm_audit
        continue-on-error: true
        run: npm audit --audit-level=high --json > test-results/npm-audit.json

      - name: Publish Test Reports
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        with:
          name: "Node Client — Tests"
          path: OPC_UA_Clients/Release1/IJT_Node_Client/test-results/vitest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-node-client
          path: OPC_UA_Clients/Release1/IJT_Node_Client/test-results/

      - name: Fail if Any Check Failed
        if: always() && (
          steps.vitest.outcome    == 'failure' ||
          steps.eslint.outcome    == 'failure' ||
          steps.npm_audit.outcome == 'failure')
        env:
          VITEST_OUTCOME:    ${{ steps.vitest.outcome }}
          ESLINT_OUTCOME:    ${{ steps.eslint.outcome }}
          NPM_AUDIT_OUTCOME: ${{ steps.npm_audit.outcome }}
        run: |
          echo "One or more checks failed:"
          echo "  vitest     -> $VITEST_OUTCOME"
          echo "  eslint     -> $ESLINT_OUTCOME"
          echo "  npm audit  -> $NPM_AUDIT_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Web Client — Docker Smoke
  # Builds the image, starts the Compose stack, verifies HTTP + WebSocket.
  # ───────────────────────────────────────────────────────────────────────────
  docker-smoke:
    name: "Release2 / IJT Web Client — Docker Smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Web_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Build Docker Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: OPC_UA_Clients/Release2/IJT_Web_Client
          tags: ijt_web_client:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start Compose Stack
        run: docker compose up -d --no-build

      - name: Wait for HTTP Readiness
        shell: bash
        run: |
          set -euo pipefail
          for _i in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 >/dev/null; then
              echo "HTTP endpoint is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for http://127.0.0.1:3000"
          docker ps
          docker logs ijt_web_client || true
          exit 1

      - name: Verify WebSocket Port
        shell: bash
        run: |
          timeout 30 bash -c \
            'until (echo > /dev/tcp/127.0.0.1/8001) >/dev/null 2>&1; do sleep 1; done'

      - name: Show Container Status
        if: always()
        run: docker ps --filter name=ijt_web_client

      - name: Show Recent Logs
        if: always()
        run: docker logs --tail 120 ijt_web_client

      - name: Teardown Compose Stack
        if: always()
        run: docker compose down -v

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT C# Client
  #   dotnet build (warnaserror) + dotnet test (xUnit) + format check
  # ───────────────────────────────────────────────────────────────────────────
  csharp-client:
    name: "Release2 / IJT C# Client"
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    outputs:
      build_result:  ${{ steps.build.outcome }}     # zizmor: ignore[template-injection]
      format_result: ${{ steps.format.outcome }}    # zizmor: ignore[template-injection]
      vuln_result:   ${{ steps.vuln_scan.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_CSharp_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract server ZIP
        working-directory: ${{ github.workspace }}
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force

      - name: Start OPC UA Server (background)
        working-directory: ${{ github.workspace }}
        run: |
          $proc = Start-Process `
            -FilePath "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\opcua_ijt_demo_application.exe" `
            -WorkingDirectory "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" `
            -PassThru -WindowStyle Hidden
          Write-Host "Server PID: $($proc.Id)"
          echo "SERVER_PID=$($proc.Id)" >> $env:GITHUB_ENV
          echo "OPCUA_SIMULATOR_EXE=${{ github.workspace }}\OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\opcua_ijt_demo_application.exe" >> $env:GITHUB_ENV
          echo "OPCUA_SERVER_PORT=40451" >> $env:GITHUB_ENV
          echo "OPCUA_SERVER_URL=opc.tcp://localhost:40451" >> $env:GITHUB_ENV

      - name: Wait for OPC UA port 40451
        working-directory: ${{ github.workspace }}
        run: |
          $timeout = 60
          $start   = Get-Date
          while (((Get-Date) - $start).TotalSeconds -lt $timeout) {
            if (Test-NetConnection -ComputerName localhost -Port 40451 `
                  -InformationLevel Quiet -WarningAction SilentlyContinue) {
              Write-Host "Port 40451 is open"
              exit 0
            }
            Write-Host "Waiting for server..."
            Start-Sleep -Seconds 3
          }
          Write-Host "ERROR: Timeout waiting for port 40451"
          exit 1

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7  # v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet Packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore NuGet Packages
        run: |
          $target = "Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj"
          $lockFiles = Get-ChildItem -Path . -Recurse -Filter "packages.lock.json" -File -ErrorAction SilentlyContinue
          if ($lockFiles.Count -gt 0) {
            Write-Host "Lock files detected — using locked mode restore."
            dotnet restore $target --locked-mode
          } else {
            Write-Host "No lock files yet — using normal restore."
            dotnet restore $target
          }

      - name: Vulnerable Package Scan
        id: vuln_scan
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          $output = dotnet list Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj package --vulnerable --include-transitive 2>&1
          $output | Out-File test-results\vuln-scan.txt
          Write-Host $output
          if ($output -match "has the following vulnerable packages") {
            Write-Host "##[error]Vulnerable NuGet packages detected — see vuln-scan.txt"
            exit 1
          }

      - name: Build (zero warnings)
        id: build
        continue-on-error: true
        run: dotnet build Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj --no-restore -warnaserror --configuration Release

      - name: Run xUnit Tests
        id: tests
        if: steps.build.outcome == 'success'
        continue-on-error: true
        env:
          IJT_AUTO_ACCEPT: 'true'
          OPCUA_SERVER_PORT: '40451'
          OPCUA_SERVER_URL: ${{ env.OPCUA_SERVER_URL }}
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          dotnet test Tests\IJT_CSharp_Client.Tests\IJT_CSharp_Client.Tests.csproj `
            --no-build `
            --no-restore `
            --configuration Release `
            --logger "trx;LogFileName=tests.trx" `
            --logger "console;verbosity=normal" `
            --results-directory test-results `
            --blame-hang --blame-hang-timeout 60s `
            2>&1 | Tee-Object -Variable testOutput
          $testOutput | Out-File test-results\test-output.txt

      - name: Format Check
        id: format
        if: steps.build.outcome == 'success'
        continue-on-error: true
        run: dotnet format IJT_CSharp_Client.sln --verify-no-changes --no-restore 2>&1

      - name: Convert TRX to JUnit XML
        if: always()
        shell: pwsh
        run: |
          $trx = "test-results\tests.trx"
          $junit = "test-results\tests.xml"
          if (Test-Path $trx) {
            [xml]$x = Get-Content $trx
            $ns = @{ t = "http://microsoft.com/schemas/VisualStudio/TeamTest/2010" }
            $results = Select-Xml -Xml $x -XPath "//t:UnitTestResult" -Namespace $ns | Select-Object -ExpandProperty Node
            $passed  = ($results | Where-Object { $_.outcome -eq "Passed"  }).Count
            $failed  = ($results | Where-Object { $_.outcome -eq "Failed"  }).Count
            $total   = $results.Count
            $xml  = '<?xml version="1.0" encoding="UTF-8"?>' + "`n"
            $xml += "<testsuites tests=`"$total`" failures=`"$failed`">`n"
            $xml += "  <testsuite name=`"IJT_CSharp_Client.Tests`" tests=`"$total`" failures=`"$failed`">`n"
            foreach ($r in $results) {
              $name = [System.Security.SecurityElement]::Escape($r.testName)
              $outcome = $r.outcome
              if ($outcome -eq "Passed") {
                $xml += "    <testcase name=`"$name`" classname=`"IJT`" />`n"
              } else {
                $msg = [System.Security.SecurityElement]::Escape($r.Output.ErrorInfo.Message)
                $xml += "    <testcase name=`"$name`" classname=`"IJT`"><failure>$msg</failure></testcase>`n"
              }
            }
            $xml += "  </testsuite>`n</testsuites>"
            $xml | Out-File $junit -Encoding UTF8
            Write-Host "Converted TRX → JUnit: $total tests, $failed failures"
          } else {
            Write-Host "No TRX file found — creating empty JUnit"
            '<?xml version="1.0"?><testsuites tests="0" failures="0"><testsuite name="IJT_CSharp_Client.Tests" tests="0"/></testsuites>' | Out-File $junit -Encoding UTF8
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-csharp-client
          path: OPC_UA_Clients/Release2/IJT_CSharp_Client/test-results/

      - name: Stop OPC UA Server
        if: always()
        run: |
          if ($env:SERVER_PID) {
            Stop-Process -Id $env:SERVER_PID -Force -ErrorAction SilentlyContinue
            Write-Host "OPC UA server stopped"
          }

      - name: Fail if Any Check Failed
        if: always() && (
          steps.build.outcome     == 'failure' ||
          steps.tests.outcome     == 'failure' ||
          steps.format.outcome    == 'failure' ||
          steps.vuln_scan.outcome == 'failure')
        env:
          BUILD_OUTCOME:     ${{ steps.build.outcome }}
          TESTS_OUTCOME:     ${{ steps.tests.outcome }}
          FORMAT_OUTCOME:    ${{ steps.format.outcome }}
          VULN_SCAN_OUTCOME: ${{ steps.vuln_scan.outcome }}
        run: |
          echo "One or more C# checks failed:"
          echo "  build     -> $BUILD_OUTCOME"
          echo "  tests     -> $TESTS_OUTCOME"
          echo "  format    -> $FORMAT_OUTCOME"
          echo "  vuln scan -> $VULN_SCAN_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # Release2 / IJT Test Client
  #   Python: pytest (live OPC UA server via Linux binary) + bandit
  # ───────────────────────────────────────────────────────────────────────────
  test-client:
    name: "Release2 / IJT Test Client"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      mypy_result: ${{ steps.mypy.outcome }}   # zizmor: ignore[template-injection]
      ruff_result: ${{ steps.pylint.outcome }} # zizmor: ignore[template-injection]
    defaults:
      run:
        working-directory: OPC_UA_Clients/Release2/IJT_Test_Client

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            OPC_UA_Clients/Release2/IJT_Test_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Test_Client/requirements-dev.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - run: mkdir -p test-results

      - name: Collect Tests (verify test discovery)
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest --collect-only -q \
            2>&1 | tee test-results/collect-output.txt

      - name: Bandit (Python Security)
        id: bandit
        continue-on-error: true
        run: python -m bandit -r . -c pyproject.toml --severity-level medium -f json -o test-results/bandit.json

      - name: Ruff (Python Linting)
        id: pylint
        continue-on-error: true
        run: python -m ruff check . --output-format=github

      - name: mypy (Type Checking)
        id: mypy
        continue-on-error: true
        run: python -m mypy . --ignore-missing-imports --no-error-summary

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-test-client
          path: OPC_UA_Clients/Release2/IJT_Test_Client/test-results/

      - name: Fail if Any Check Failed
        if: always() && (
          steps.pytest.outcome == 'failure' ||
          steps.bandit.outcome == 'failure' ||
          steps.pylint.outcome == 'failure' ||
          steps.mypy.outcome   == 'failure')
        env:
          PYTEST_OUTCOME: ${{ steps.pytest.outcome }}
          BANDIT_OUTCOME: ${{ steps.bandit.outcome }}
          PYLINT_OUTCOME: ${{ steps.pylint.outcome }}
          MYPY_OUTCOME:   ${{ steps.mypy.outcome }}
        run: |
          echo "One or more checks failed:"
          echo "  pytest  -> $PYTEST_OUTCOME"
          echo "  bandit  -> $BANDIT_OUTCOME"
          echo "  ruff    -> $PYLINT_OUTCOME"
          echo "  mypy    -> $MYPY_OUTCOME"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # OPC UA Server — Windows Smoke
  #   Extract OPC_UA_IJT_Server_Simulator.zip, launch the EXE directly,
  #   wait for TCP 40451, run all 10 smoke checks, kill the process.
  #
  # The server auto-creates its PKI directory (certificates) on first launch —
  # no pre-seeded certificates are needed.
  # ───────────────────────────────────────────────────────────────────────────

  server-smoke-windows:
    name: "Release2 / OPC UA Server — Windows Smoke"
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Extract server ZIP
        run: |
          Expand-Archive `
            -Path "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator.zip" `
            -DestinationPath "OPC_UA_Servers\Release2\" `
            -Force
          Write-Host "Extracted ZIP contents:"
          Get-ChildItem "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" | Select-Object Name

      - name: Start OPC UA Server (background)
        run: |
          $proc = Start-Process `
            -FilePath "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\opcua_ijt_demo_application.exe" `
            -WorkingDirectory "OPC_UA_Servers\Release2\OPC_UA_IJT_Server_Simulator\" `
            -PassThru -WindowStyle Hidden
          Write-Host "Server PID: $($proc.Id)"
          echo "SERVER_PID=$($proc.Id)" >> $env:GITHUB_ENV

      - name: Wait for OPC UA port 40451
        run: |
          $timeout = 60
          $start   = Get-Date
          while (((Get-Date) - $start).TotalSeconds -lt $timeout) {
            if (Test-NetConnection -ComputerName localhost -Port 40451 `
                  -InformationLevel Quiet -WarningAction SilentlyContinue) {
              Write-Host "Port 40451 is open"
              exit 0
            }
            Write-Host "Waiting for server..."
            Start-Sleep -Seconds 3
          }
          Write-Host "ERROR: Timeout waiting for port 40451"
          exit 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Install smoke test dependencies
        run: pip install -r OPC_UA_Servers/Release2/tests/requirements.txt

      - name: Run smoke test (10 checks)
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          python OPC_UA_Servers/Release2/tests/smoke_test.py `
            --tcp-timeout 30 `
            --junitxml test-results/smoke.xml

      - name: Upload Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-server-smoke
          path: test-results/smoke.xml

      - name: Stop OPC UA Server
        if: always()
        run: |
          if ($env:SERVER_PID) {
            Stop-Process -Id $env:SERVER_PID -Force -ErrorAction SilentlyContinue
            Write-Host "OPC UA server stopped"
          }

  # ───────────────────────────────────────────────────────────────────────────
  # Combined Report — always runs after all jobs.
  # Writes the root-level summary table to the Actions Summary page.
  # ───────────────────────────────────────────────────────────────────────────
  report:
    name: "📋 Test Report"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [web-client, console-client, node-client, docker-smoke, csharp-client, test-client, server-smoke-windows, actionlint]
    if: always()
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"

      - name: Download All Test Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: all-results/

      - name: "Report — Web Client Python Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — Python Tests"
          path: all-results/results-web-client/pytest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Web Client JS Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Web Client — JS Tests (Vitest)"
          path: all-results/results-web-client/vitest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Console Client Python Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Console Client — Python Tests"
          path: all-results/results-console-client/pytest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — Node Client JS Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "Node Client — JS Tests (Vitest)"
          path: all-results/results-node-client/vitest.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — C# Client xUnit Tests"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "C# Client — xUnit Tests"
          path: all-results/results-csharp-client/tests.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: "Report — OPC UA Server Smoke (Windows)"
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3
        if: always()
        continue-on-error: true  # checks:write unavailable on forked PRs
        with:
          name: "OPC UA Server — Smoke Tests (Windows)"
          path: all-results/results-server-smoke/smoke.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Generate Summary Table
        env:
          # ── Job-level results ──────────────────────────────────
          WEB_RESULT:     ${{ needs.web-client.result }}
          CONSOLE_RESULT: ${{ needs.console-client.result }}
          NODE_RESULT:    ${{ needs.node-client.result }}
          DOCKER_RESULT:  ${{ needs.docker-smoke.result }}
          CS_RESULT:      ${{ needs.csharp-client.result }}
          TC_RESULT:      ${{ needs.test-client.result }}
          SS_WIN_RESULT:  ${{ needs.server-smoke-windows.result }}
          AL_RESULT:      ${{ needs.actionlint.result }}
          # ── Per-tool step outcomes ─────────────────────────────
          WEB_RUFF:       ${{ needs.web-client.outputs.ruff_result }}
          WEB_ESLINT:     ${{ needs.web-client.outputs.eslint_result }}
          WEB_MYPY:       ${{ needs.web-client.outputs.mypy_result }}
          CONSOLE_RUFF:   ${{ needs.console-client.outputs.ruff_result }}
          CONSOLE_MYPY:   ${{ needs.console-client.outputs.mypy_result }}
          NODE_ESLINT:    ${{ needs.node-client.outputs.eslint_result }}
          CS_BUILD:       ${{ needs.csharp-client.outputs.build_result }}
          CS_FORMAT:      ${{ needs.csharp-client.outputs.format_result }}
          CS_VULN:        ${{ needs.csharp-client.outputs.vuln_result }}
          TC_RUFF:        ${{ needs.test-client.outputs.ruff_result }}
          TC_MYPY:        ${{ needs.test-client.outputs.mypy_result }}
          # ── Commit context ─────────────────────────────────────
          GH_SHA:         ${{ github.sha }}
          GH_BRANCH:      ${{ github.ref_name }}
          GH_RUN_NUMBER:  ${{ github.run_number }}
          GH_RUN_URL:     ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET, json, os, glob

          # ── Parsers ──────────────────────────────────────────────────────────

          def parse_junit(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      root   = ET.parse(path).getroot()
                      suites = root.findall("testsuite") if root.tag == "testsuites" else [root]
                      t  = sum(int(s.get("tests",    0)) for s in suites)
                      f  = sum(int(s.get("failures", 0)) + int(s.get("errors", 0)) for s in suites)
                      sk = sum(int(s.get("skipped",  0)) for s in suites)
                      return t, t - f - sk, f, sk
                  except Exception as exc:
                      print(f"[WARN] parse_junit({path}): {exc}")
              return None, None, None, None

          def parse_coverage(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      rate = ET.parse(path).getroot().get("line-rate")
                      if rate is not None:
                          return round(float(rate) * 100, 1)
                  except Exception:
                      pass
              return None

          def parse_bandit(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      with open(path) as _f:
                          r = json.load(_f).get("results", [])
                      return (sum(1 for i in r if i["issue_severity"] == "HIGH"),
                              sum(1 for i in r if i["issue_severity"] == "MEDIUM"))
                  except Exception:
                      pass
              return None, None

          def parse_npm_audit(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      with open(path) as _f:
                          v = json.load(_f).get("metadata", {}).get("vulnerabilities", {})
                      return v.get("critical", 0), v.get("high", 0)
                  except Exception:
                      pass
              return None, None

          def parse_eslint(pattern):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      with open(path) as _f:
                          data = json.load(_f)
                      return (sum(r.get("errorCount",   0) for r in data),
                              sum(r.get("warningCount", 0) for r in data))
                  except Exception:
                      pass
              return None, None

          # ── Formatters ───────────────────────────────────────────────────────

          def job_icon(r):
              return {"success": "✅", "failure": "❌", "cancelled": "🚫", "skipped": "⏭️"}.get(r, "⚠️")

          def fmt_tests(total, passed, failed, skipped=0):
              if total is None:
                  return "—"
              icon = "✅" if failed == 0 else "❌"
              return f"{icon} {passed}p · {failed}f"

          def fmt_cov(pct):
              if pct is None:
                  return "—"
              icon = "✅" if pct >= 65 else ("⚠️" if pct >= 50 else "❌")
              return f"{icon} {pct:.0f}%"

          def fmt_bandit(high, medium):
              if high is None:
                  return "—"
              return "✅ clean" if high == 0 and medium == 0 else f"❌ H:{high} M:{medium}"

          def fmt_npm(crit, high):
              if crit is None:
                  return "—"
              return "✅ clean" if crit == 0 and high == 0 else f"❌ C:{crit} H:{high}"

          def fmt_eslint(errors, warnings):
              if errors is None:
                  return "—"
              if errors == 0 and not warnings:
                  return "✅ eslint"
              parts = ([f"{errors}e"] if errors else []) + ([f"{warnings}w"] if warnings else [])
              prefix = "❌" if errors else "⚠️"
              return f"{prefix} eslint · {' · '.join(parts)}"

          def fmt_step(r, label=""):
              if not r or r in ("", "unknown"):
                  return "—"
              icon = {"success": "✅", "failure": "❌", "cancelled": "🚫", "skipped": "⏭️"}.get(r, "⚠️")
              return f"{icon} {label}".strip() if label else icon

          def lint_cell(*items):
              """Join lint items, dropping any — entries."""
              parts = [x for x in items if x != "—"]
              return " · ".join(parts) if parts else "—"

          # ── Load ENV ─────────────────────────────────────────────────────────

          E = os.environ.get

          web_r  = E("WEB_RESULT",    "unknown")
          con_r  = E("CONSOLE_RESULT","unknown")
          nod_r  = E("NODE_RESULT",   "unknown")
          dck_r  = E("DOCKER_RESULT", "unknown")
          cs_r   = E("CS_RESULT",     "unknown")
          tc_r   = E("TC_RESULT",     "unknown")
          ss_r   = E("SS_WIN_RESULT", "unknown")
          al_r   = E("AL_RESULT",     "unknown")

          web_ruff   = E("WEB_RUFF",    "")
          web_eslint = E("WEB_ESLINT",  "")
          web_mypy   = E("WEB_MYPY",    "")
          con_ruff   = E("CONSOLE_RUFF","")
          con_mypy   = E("CONSOLE_MYPY","")
          nod_eslint = E("NODE_ESLINT", "")
          cs_build   = E("CS_BUILD",    "")
          cs_format  = E("CS_FORMAT",   "")
          cs_vuln    = E("CS_VULN",     "")
          tc_ruff    = E("TC_RUFF",     "")
          tc_mypy    = E("TC_MYPY",     "")

          sha      = (E("GH_SHA",        "") or "")[:8]
          branch   = E("GH_BRANCH",      "main")
          run_num  = E("GH_RUN_NUMBER",  "")
          run_url  = E("GH_RUN_URL",     "")

          # ── Parse artifacts ──────────────────────────────────────────────────

          web_py_t = parse_junit("all-results/results-web-client/pytest.xml")
          web_js_t = parse_junit("all-results/results-web-client/vitest.xml")
          web_esl  = parse_eslint("all-results/results-web-client/eslint.json")
          web_ban  = parse_bandit("all-results/results-web-client/bandit.json")
          web_npm  = parse_npm_audit("all-results/results-web-client/npm-audit.json")
          web_cov  = parse_coverage("all-results/results-web-client/coverage.xml")

          con_py_t = parse_junit("all-results/results-console-client/pytest.xml")
          con_ban  = parse_bandit("all-results/results-console-client/bandit.json")
          con_cov  = parse_coverage("all-results/results-console-client/coverage.xml")

          nod_js_t = parse_junit("all-results/results-node-client/vitest.xml")
          nod_esl  = parse_eslint("all-results/results-node-client/eslint.json")
          nod_npm  = parse_npm_audit("all-results/results-node-client/npm-audit.json")

          cs_t     = parse_junit("all-results/results-csharp-client/tests.xml")

          tc_ban   = parse_bandit("all-results/results-test-client/bandit.json")

          ss_smoke = parse_junit("all-results/results-server-smoke/smoke.xml")

          # ── Artifact sanity gate ─────────────────────────────────────────────

          artifact_warnings = []
          def _warn(job_result, val, job_name, artifact):
              if job_result == "success" and val is None:
                  artifact_warnings.append(
                      f"⚠️ **{job_name}**: job succeeded but `{artifact}` not found — possible silent failure"
                  )
          _warn(web_r, web_py_t[0], "web-client",           "pytest.xml")
          _warn(web_r, web_js_t[0], "web-client",           "vitest.xml")
          _warn(con_r, con_py_t[0], "console-client",       "pytest.xml")
          _warn(nod_r, nod_js_t[0], "node-client",          "vitest.xml")
          _warn(cs_r,  cs_t[0],     "csharp-client",        "tests.xml")
          _warn(tc_r,  tc_ban[0],   "test-client",          "bandit.json")
          _warn(ss_r,  ss_smoke[0], "server-smoke-windows", "smoke.xml")

          # ── Overall status ────────────────────────────────────────────────────

          all_jobs = [web_r, con_r, nod_r, dck_r, cs_r, tc_r, ss_r, al_r]
          n_pass = sum(1 for r in all_jobs if r == "success")
          n_fail = sum(1 for r in all_jobs if r == "failure")
          n_total = len(all_jobs)
          if n_fail == 0:
              overall = f"✅ All {n_pass}/{n_total} Passed"
          else:
              overall = f"❌ {n_fail}/{n_total} Failed · {n_pass} passed"

          run_link = f"[#{run_num}]({run_url})" if run_url else f"#{run_num}"
          sha_str  = f"`{sha}`" if sha else "—"

          # ── Quality columns ───────────────────────────────────────────────────

          def lint_web():
              ruff = fmt_step(web_ruff, "ruff")
              esl  = (fmt_eslint(*web_esl) if web_esl[0] is not None
                      else fmt_step(web_eslint, "eslint"))
              return lint_cell(ruff, esl)

          def lint_nod():
              esl = (fmt_eslint(*nod_esl) if nod_esl[0] is not None
                     else fmt_step(nod_eslint, "eslint"))
              return lint_cell(esl)

          def lint_cs():
              return lint_cell(fmt_step(cs_build, "build"), fmt_step(cs_format, "format"))

          # ── Build report ──────────────────────────────────────────────────────

          out = [
              f"## 🏭 IJT OPC UA — CI Required &nbsp;&nbsp; {overall}",
              "",
              f"> **Branch:** `{branch}` &nbsp;·&nbsp; **Commit:** {sha_str} &nbsp;·&nbsp; **Run:** {run_link}",
              "",
              "### 🔬 Test Results",
              "",
              "| Component | Tests | Coverage | Skips |",
              "|:----------|:-----:|:--------:|:-----:|",
              f"| **Web Client — Python** | {fmt_tests(*web_py_t)} | {fmt_cov(web_cov)} | {web_py_t[3] or '—'} |",
              f"| **Web Client — JS (Vitest)** | {fmt_tests(*web_js_t)} | — | {web_js_t[3] or '—'} |",
              f"| **Console Client — Python** | {fmt_tests(*con_py_t)} | {fmt_cov(con_cov)} | {con_py_t[3] or '—'} |",
              f"| **Node Client — JS (Vitest)** | {fmt_tests(*nod_js_t)} | — | {nod_js_t[3] or '—'} |",
              f"| **C# Client — xUnit** | {fmt_tests(*cs_t)} | — | {cs_t[3] or '—'} |",
              f"| **OPC UA Server — Smoke (Windows)** | {fmt_tests(*ss_smoke)} | — | — |",
              "",
              "### 🔒 Code Quality & Security",
              "",
              "| Component | Lint | Type Check | Security | Dependencies |",
              "|:----------|:-----|:----------:|:--------:|:------------:|",
              f"| **Web Client** | {lint_web()} | {fmt_step(web_mypy, 'mypy')} | {fmt_bandit(*web_ban)} | {fmt_npm(*web_npm)} |",
              f"| **Console Client** | {fmt_step(con_ruff, 'ruff')} | {fmt_step(con_mypy, 'mypy')} | {fmt_bandit(*con_ban)} | — |",
              f"| **Node Client** | {lint_nod()} | — | — | {fmt_npm(*nod_npm)} |",
              f"| **C# Client** | {lint_cs()} | — | {fmt_step(cs_vuln, 'vuln scan')} | — |",
              f"| **Test Client** | {fmt_step(tc_ruff, 'ruff')} | {fmt_step(tc_mypy, 'mypy')} | {fmt_bandit(*tc_ban)} | — |",
              "",
              "### 🏗️ Infrastructure",
              "",
              "| Check | Result |",
              "|:------|:------:|",
              f"| **Web Client — Docker Smoke** (HTTP + WebSocket) | {job_icon(dck_r)} |",
              f"| **GHA Workflow Lint** (actionlint) | {job_icon(al_r)} |",
              "",
              "---",
              "**Legend:** ✅ Pass/Clean &nbsp;·&nbsp; ❌ Fail/Issues &nbsp;·&nbsp; ⚠️ Warning &nbsp;·&nbsp; — Not applicable",
              "**Coverage:** ≥ 65% ✅ &nbsp;·&nbsp; ≥ 50% ⚠️ &nbsp;·&nbsp; < 50% ❌ &nbsp;·&nbsp; p = passed &nbsp;·&nbsp; f = failed",
              "",
              "> 🔍 **Checks tab** — per-test drill-down &nbsp;·&nbsp; 📦 **Artifacts** — JUnit XML · ESLint JSON · Bandit JSON · Coverage XML",
          ]

          if artifact_warnings:
              out += ["", "---", "### ⚠️ Artifact Sanity Warnings", "", *artifact_warnings]

          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout"), "a", encoding="utf-8") as fh:
              fh.write("\n".join(out) + "\n")
          print("Summary written.")
          PYEOF

  # ───────────────────────────────────────────────────────────────────────────
  # GitHub Actions Workflow Lint (actionlint)
  # ───────────────────────────────────────────────────────────────────────────
  actionlint:
    name: "GHA Workflow Lint (actionlint)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          curl -L -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          tar xzf actionlint.tar.gz actionlint

      - name: Run actionlint
        run: ./actionlint -color

