# ─────────────────────────────────────────────────────────────────────────────
# Custom CodeQL workflow — overrides the GitHub-managed dynamic CodeQL workflow
# (dynamic/github-code-scanning/codeql) so we can pin action versions and
# suppress the Node.js 20 deprecation warning.
#
# This file replaces the auto-configured GitHub code scanning workflow.
# Languages: javascript-typescript + python (matches the dynamic default).
# ─────────────────────────────────────────────────────────────────────────────

name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "27 2 * * 1"  # Weekly on Monday at 02:27 UTC

permissions:
  actions: read
  contents: read
  security-events: write

# Opt into Node.js 24 for all actions (suppresses the Node.js 20 deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
