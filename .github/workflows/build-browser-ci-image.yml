name: Build Browser CI Image

# Build & publish the IJT Browser CI image consumed by the
# live-webclient-browser matrix job in .github/workflows/integration.yml.
# See .github/docker/ijt-browser-ci/README.md for design.
#
# image-pin.json and this README are intentionally excluded from path triggers.
# The update-pin job opens a PR that changes only image-pin.json; merging that
# PR must not publish a new image and create an image-pin update loop. README
# updates must not rebuild the browser image either.
#
# Three-job split:
#   - build:   loads image locally, runs Phase 0 smoke under the exact
#              runtime contract. NO packages: write.
#   - publish: depends on build; only runs when push == true; pushes to GHCR
#              with packages: write scoped to this job only.
#   - update-pin: depends on publish; opens/updates a reviewable PR that
#                 refreshes image-pin.json. contents/pull-requests write are
#                 scoped to this job only.

on:
  push:
    branches: [main]
    paths:
      - '.github/docker/ijt-browser-ci/**'
      - '!.github/docker/ijt-browser-ci/image-pin.json'
      - '!.github/docker/ijt-browser-ci/README.md'
      - '.github/scripts/update_browser_ci_image_pin.py'
      - '.github/workflows/build-browser-ci-image.yml'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/package.json'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/package-lock.json'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt'
  pull_request:
    paths:
      - '.github/docker/ijt-browser-ci/**'
      - '!.github/docker/ijt-browser-ci/image-pin.json'
      - '!.github/docker/ijt-browser-ci/README.md'
      - '.github/scripts/update_browser_ci_image_pin.py'
      - '.github/workflows/build-browser-ci-image.yml'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/package.json'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/package-lock.json'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt'
  schedule:
    - cron: '17 5 * * 1'  # weekly Monday 05:17 UTC
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to GHCR (true) or build-only (false)?'
        required: false
        default: 'false'
        type: choice
        options: [ 'true', 'false' ]

# Workflow-level: read-only. packages: write is granted only on the publish
# job. contents/pull-requests write are granted only on the update-pin job.
permissions:
  contents: read

concurrency:
  group: build-browser-ci-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/umati/ua-for-industrial-joining-technologies/ijt-browser-ci

jobs:
  build:
    name: Build & Phase-0 smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    outputs:
      should_push: ${{ steps.decide.outputs.push }}
      short_sha: ${{ steps.decide.outputs.short_sha }}
      cache_key: ${{ steps.decide.outputs.cache_key }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Decide whether to push (carry to publish job)
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DISPATCH_PUSH: ${{ inputs.push }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "cache_key=ijt-browser-ci-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          if [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "schedule" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "push=${DISPATCH_PUSH}" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image (load only, gha cache export)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: .github/docker/ijt-browser-ci/Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:phase0-${{ steps.decide.outputs.short_sha }}
          build-args: |
            IMAGE_BUILD_REF=${{ github.ref }}
            IMAGE_BUILD_SHA=${{ github.sha }}
          cache-from: type=gha,scope=ijt-browser-ci
          cache-to: type=gha,scope=ijt-browser-ci,mode=max

      - name: Phase 0 smoke - metadata + tool versions
        env:
          SHORT_SHA: ${{ steps.decide.outputs.short_sha }}
        run: |
          set -euo pipefail
          IMG="${IMAGE_NAME}:phase0-${SHORT_SHA}"
          docker run --rm --network=none "$IMG" cat /opt/ijt-browser-ci/metadata.json
          docker run --rm --network=none "$IMG" bash -c 'python --version | grep -E "^Python 3\.14\."'
          docker run --rm --network=none "$IMG" bash -c 'node --version | grep -E "^v24\."'

      - name: Phase 0 smoke - cache & permissions probe (non-root UID)
        env:
          SHORT_SHA: ${{ steps.decide.outputs.short_sha }}
        run: |
          set -euo pipefail
          IMG="${IMAGE_NAME}:phase0-${SHORT_SHA}"
          UID_GID="$(id -u):$(id -g)"
          docker run --rm --network=none --user "$UID_GID" "$IMG" bash -c '
            set -euo pipefail
            touch /opt/ijt-browser-ci/home/.probe
            touch /opt/ijt-browser-ci/npm-cache/.probe
            touch /opt/ijt-browser-ci/pip-cache/.probe
            ls /opt/ijt-browser-ci/pip-wheelhouse | head -5
            ls /ms-playwright | head -5
            python -m venv /tmp/v && /tmp/v/bin/python -m pip --version
          '

      - name: Phase 0 smoke - root runner under --network=none (web-client-e2e-regression)
        # This is the production contract: repo root, root runner, full
        # offline env, host UID. Any silent live fetch or contract violation
        # fails this step and PR A. Artifacts are captured for inspection
        # regardless of pass/fail via the always() upload step below.
        id: deep_smoke
        env:
          SHORT_SHA: ${{ steps.decide.outputs.short_sha }}
        run: |
          set -euo pipefail
          IMG="${IMAGE_NAME}:phase0-${SHORT_SHA}"
          UID_GID="$(id -u):$(id -g)"
          mkdir -p "${GITHUB_WORKSPACE}/.phase0-artifacts"
          chmod 0777 "${GITHUB_WORKSPACE}/.phase0-artifacts"
          docker run --rm \
            --network=none \
            --user "$UID_GID" \
            -w /workspace \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -e HOME=/opt/ijt-browser-ci/home \
            -e CI=1 \
            -e npm_config_cache=/opt/ijt-browser-ci/npm-cache \
            -e npm_config_offline=true \
            -e PIP_CACHE_DIR=/opt/ijt-browser-ci/pip-cache \
            -e PIP_NO_INDEX=1 \
            -e PIP_FIND_LINKS=/opt/ijt-browser-ci/pip-wheelhouse \
            -e SKIP_VENV_INSTALL=1 \
            -e PLAYWRIGHT_BROWSERS_PATH=/ms-playwright \
            "$IMG" \
            bash -lc 'python run_all_tests.py --suite web-client-e2e-regression --verbose'

      - name: Stage Phase 0 artifacts
        if: always()
        run: |
          set -euxo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/.phase0-artifacts"
          for src in \
            "${GITHUB_WORKSPACE}/OPC_UA_Clients/Release2/IJT_Web_Client/test-results" \
            "${GITHUB_WORKSPACE}/test-results"; do
            if [[ -d "$src" ]]; then
              dest="${GITHUB_WORKSPACE}/.phase0-artifacts/$(basename "$(dirname "$src")")-$(basename "$src")"
              cp -r "$src" "$dest" || true
            fi
          done
          ls -la "${GITHUB_WORKSPACE}/.phase0-artifacts" || true

      - name: Upload Phase 0 artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: phase0-${{ steps.decide.outputs.short_sha }}
          path: |
            .phase0-artifacts/**
            OPC_UA_Clients/Release2/IJT_Web_Client/test-results/**
            test-results/**
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          SHORT_SHA: ${{ steps.decide.outputs.short_sha }}
          WILL_PUBLISH: ${{ steps.decide.outputs.push }}
        run: |
          set -euo pipefail
          {
            echo "## IJT Browser CI image - Phase 0 build"
            echo ""
            echo "- Event: \`${EVENT_NAME}\`"
            echo "- Ref: \`${REF}\`"
            echo "- Short SHA: \`${SHORT_SHA}\`"
            echo "- Will publish: \`${WILL_PUBLISH}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish to GHCR
    needs: build
    if: needs.build.outputs.should_push == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute publish tags
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          BUILD_SHORT_SHA: ${{ needs.build.outputs.short_sha }}
        run: |
          set -euo pipefail
          TAGS="${IMAGE_NAME}:sha-${BUILD_SHORT_SHA}"
          if [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_NAME}:main"
          fi
          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Push image (cache from build job)
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          file: .github/docker/ijt-browser-ci/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            IMAGE_BUILD_REF=${{ github.ref }}
            IMAGE_BUILD_SHA=${{ github.sha }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=ijt-browser-ci

      - name: Verify published image by digest (pull + offline smoke)
        # Proves GHCR pull permission AND that the digest is usable as
        # IJT_BROWSER_CI_IMAGE for PR B. Hard gate.
        env:
          PUBLISHED_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          REF="${IMAGE_NAME}@${PUBLISHED_DIGEST}"
          echo "Pulling $REF ..."
          docker pull "$REF"
          docker run --rm --network=none "$REF" cat /opt/ijt-browser-ci/metadata.json
          docker run --rm --network=none "$REF" bash -c 'python --version | grep -E "^Python 3\.14\."'
          docker run --rm --network=none "$REF" bash -c 'node --version | grep -E "^v24\."'

      - name: Job summary
        env:
          PUBLISHED_DIGEST: ${{ steps.push.outputs.digest }}
          PUBLISHED_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          {
            echo "## IJT Browser CI image - Published"
            echo ""
            echo "- Tags:"
            echo '```'
            echo "${PUBLISHED_TAGS}"
            echo '```'
            echo "- Digest: \`${PUBLISHED_DIGEST}\`"
            echo ""
            echo "_The update-pin job opens or updates a reviewed \`image-pin.json\` PR for:_"
            echo '```'
            echo "${IMAGE_NAME}@${PUBLISHED_DIGEST}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  update-pin:
    name: Open image-pin update PR
    needs: publish
    if: needs.publish.outputs.digest != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      packages: read
    env:
      PIN_BRANCH: automation/ijt-browser-ci-image-pin
      PIN_PATH: .github/docker/ijt-browser-ci/image-pin.json
    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: main
          persist-credentials: false

      - name: Log in to GHCR for metadata readback
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Capture metadata from published digest
        id: capture_metadata
        env:
          PUBLISHED_DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          set -euo pipefail
          REF="${IMAGE_NAME}@${PUBLISHED_DIGEST}"
          docker pull "$REF"
          docker run --rm --network=none "$REF" \
            cat /opt/ijt-browser-ci/metadata.json > "${RUNNER_TEMP}/ijt-browser-ci-metadata.json"
          cat "${RUNNER_TEMP}/ijt-browser-ci-metadata.json"
          echo "result=captured" >> "$GITHUB_OUTPUT"
          echo "reason=metadata captured from published digest" >> "$GITHUB_OUTPUT"

      - name: Update image-pin.json
        id: update_pin
        env:
          PUBLISHED_DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          set -euo pipefail
          python .github/scripts/update_browser_ci_image_pin.py \
            --pin "$PIN_PATH" \
            --metadata "${RUNNER_TEMP}/ijt-browser-ci-metadata.json" \
            --image "$IMAGE_NAME" \
            --digest "$PUBLISHED_DIGEST" \
            --image-revision "$GITHUB_SHA" \
            --image-created "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --image-workflow-run "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          python -m json.tool "$PIN_PATH" > /dev/null
          echo "result=rendered" >> "$GITHUB_OUTPUT"
          echo "reason=image-pin.json rendered from verified metadata" >> "$GITHUB_OUTPUT"

      - name: Open or update image-pin PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISHED_DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          set -euo pipefail
          if git diff --quiet -- "$PIN_PATH"; then
            {
              echo "changed=false"
              echo "auto_pr_result=no_change"
              echo "reason=image-pin.json already points at ${PUBLISHED_DIGEST}; no PR needed"
            } >> "$GITHUB_OUTPUT"
            echo "image-pin.json already points at ${PUBLISHED_DIGEST}; no PR needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git checkout -B "$PIN_BRANCH"
          git add "$PIN_PATH"
          git commit -m "Update IJT Browser CI image pin" \
            -m "1. Point image-pin.json at the verified GHCR digest published by this workflow." \
            -m "2. Keep the browser Integration job on a reviewed digest instead of a floating tag."
          # This automation branch is single-writer and represents the newest
          # verified digest. Force-with-lease intentionally supersedes an older
          # open pin PR if a later image publishes before review completes.
          git fetch origin "${PIN_BRANCH}:refs/remotes/origin/${PIN_BRANCH}" || true
          git push --force-with-lease "origin" "HEAD:refs/heads/${PIN_BRANCH}"

          body_file="${RUNNER_TEMP}/image-pin-pr.md"
          cat > "$body_file" <<EOF
          ## IJT Browser CI image pin update

          This PR was opened by \`.github/workflows/build-browser-ci-image.yml\` after a verified image publish.

          - Published digest: \`${IMAGE_NAME}@${PUBLISHED_DIGEST}\`
          - Source revision: \`${GITHUB_SHA}\`
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}

          The build workflow already performed:

          - Phase 0 smoke under \`--network=none\`
          - GHCR digest publish
          - Pull-verify of the published digest

          Note on CI checks: PRs opened by GITHUB_TOKEN do not trigger Integration, CodeQL, pre-commit, actionlint, zizmor, or workflow-policy-guard on the PR itself. The new digest has already been validated by this workflow's Phase 0 smoke under \`--network=none\` and publish-job digest pull-verify.

          To run the full Integration matrix against this exact pin PR, close and reopen the PR or push an empty commit as a user.

          Review focus: \`.github/docker/ijt-browser-ci/image-pin.json\` only.
          EOF

          existing_pr="$(gh pr list --state open --base main --head "$PIN_BRANCH" --json number --jq '.[0].number // empty')"
          if [[ -n "$existing_pr" ]]; then
            gh pr edit "$existing_pr" \
              --title "Update IJT Browser CI image pin" \
              --body-file "$body_file"
            {
              echo "pr=${existing_pr}"
              echo "auto_pr_result=updated"
              echo "reason=updated existing image-pin PR #${existing_pr}"
              echo "changed=true"
            } >> "$GITHUB_OUTPUT"
          else
            pr_url="$(gh pr create \
              --base main \
              --head "$PIN_BRANCH" \
              --title "Update IJT Browser CI image pin" \
              --body-file "$body_file")"
            {
              echo "pr_url=${pr_url}"
              echo "auto_pr_result=opened"
              echo "reason=opened new image-pin PR ${pr_url}"
              echo "changed=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Job summary
        if: always()
        env:
          UPDATED: ${{ steps.pr.outputs.changed }}
          CAPTURE_OUTCOME: ${{ steps.capture_metadata.outcome }}
          CAPTURE_REASON: ${{ steps.capture_metadata.outputs.reason }}
          UPDATE_OUTCOME: ${{ steps.update_pin.outcome }}
          UPDATE_REASON: ${{ steps.update_pin.outputs.reason }}
          PR_OUTCOME: ${{ steps.pr.outcome }}
          AUTO_PR_RESULT: ${{ steps.pr.outputs.auto_pr_result }}
          AUTO_PR_REASON: ${{ steps.pr.outputs.reason }}
          PR_NUMBER: ${{ steps.pr.outputs.pr }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          PUBLISHED_DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          set -euo pipefail
          {
            echo "## IJT Browser CI image - Pin update"
            echo ""
            echo "- Published digest: \`${PUBLISHED_DIGEST}\`"
            echo "- image-pin.json changed: \`${UPDATED:-unknown}\`"
            echo "- Metadata capture: \`${CAPTURE_OUTCOME:-unknown}\` — ${CAPTURE_REASON:-not completed}"
            echo "- Pin update: \`${UPDATE_OUTCOME:-unknown}\` — ${UPDATE_REASON:-not completed}"
            echo "- Auto-PR opened/updated: \`${AUTO_PR_RESULT:-not_attempted}\`"
            echo "- Auto-PR step outcome: \`${PR_OUTCOME:-unknown}\`"
            echo "- Reason: ${AUTO_PR_REASON:-not completed; inspect the first failed update-pin step above}"
            if [[ -n "${PR_NUMBER:-}" ]]; then
              echo "- Existing PR updated: #${PR_NUMBER}"
            fi
            if [[ -n "${PR_URL:-}" ]]; then
              echo "- New PR opened: ${PR_URL}"
            fi
            if [[ "${CAPTURE_OUTCOME:-}" != "success" || "${UPDATE_OUTCOME:-}" != "success" || "${PR_OUTCOME:-}" != "success" ]]; then
              echo ""
              echo "> One or more update-pin steps did not succeed. Review the failed step logs before re-running the workflow."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
