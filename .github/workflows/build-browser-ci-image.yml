name: Build Browser CI Image

# Build & publish the IJT Browser CI image consumed by the
# live-webclient-browser matrix job in .github/workflows/integration.yml.
# See .github/docker/ijt-browser-ci/README.md for design.
#
# image-pin.json and this README are intentionally excluded from path triggers.
# Manual image-pin PRs change only image-pin.json; merging those PRs must not
# publish a new image and create an image-pin update loop. README updates must
# not rebuild the browser image either.
#
# Three-job split:
#   - build:       loads image locally and validates image integrity only.
#                  NO packages: write.
#   - publish:     depends on build; only runs when push == true. Main/
#                  scheduled/manual publishes refresh the reviewed pin path;
#                  same-repo PRs that change browser image inputs reach us via
#                  workflow_call from integration.yml and publish a fingerprint-
#                  keyed cache tag plus a PR-scoped tag for provenance/debug.
#                  The synchronization path is the workflow_call digest output,
#                  not a tag lookup.
#   - offline-e2e: depends on publish and runs the full offline browser
#                  regression contract. Skipped on the workflow_call path
#                  because the calling Integration run's live-webclient-browser
#                  matrix verifies against the same digest.

on:
  push:
    branches: [main]
    paths:
      - '.github/docker/ijt-browser-ci/**'
      - '!.github/docker/ijt-browser-ci/image-pin.json'
      - '!.github/docker/ijt-browser-ci/README.md'
      - '.github/scripts/update_browser_ci_image_pin.py'
      - '.github/scripts/compute_browser_image_fingerprint.py'
      - '.github/workflows/build-browser-ci-image.yml'
      - '.dockerignore'
      - 'constraints.txt'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/package.json'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/package-lock.json'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt'
      - 'OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt'
  schedule:
    - cron: '17 5 * * 1'  # weekly Monday 05:17 UTC
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to GHCR (true) or build-only (false)?'
        required: false
        default: 'false'
        type: choice
        options: [ 'true', 'false' ]
  # PR path reaches this workflow only via workflow_call from integration.yml's
  # prepare-browser-image-plan -> build-browser-image chain. That chain decides
  # whether to invoke us at all (planner short-circuits on pin/cache match) and
  # passes the expected inputs_fingerprint as an explicit, YAML-visible contract.
  workflow_call:
    inputs:
      expected_fingerprint:
        description: 'Inputs fingerprint the caller computed; the build step asserts equality and fails fast if drift occurred between caller checkout and this run.'
        required: true
        type: string
    outputs:
      digest:
        description: 'Digest of the published image (sha256:<64hex>).'
        value: ${{ jobs.publish.outputs.digest }}
      source_sha:
        description: 'GITHUB_SHA the publish job built from (provenance only, not a runtime trust check).'
        value: ${{ jobs.build.outputs.source_sha }}
      inputs_fingerprint:
        description: 'Inputs fingerprint baked into the published image metadata.'
        value: ${{ jobs.build.outputs.inputs_fingerprint }}

# Workflow-level: read-only. packages: write is granted only on the publish job.
permissions:
  contents: read

concurrency:
  group: build-browser-ci-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/umati/ua-for-industrial-joining-technologies/ijt-browser-ci

jobs:
  build:
    name: Build and image smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    outputs:
      should_push: ${{ steps.decide.outputs.push }}
      publish_mode: ${{ steps.decide.outputs.publish_mode }}
      source_sha: ${{ steps.decide.outputs.source_sha }}
      short_sha: ${{ steps.decide.outputs.short_sha }}
      cache_key: ${{ steps.decide.outputs.cache_key }}
      pr_image_tag: ${{ steps.decide.outputs.pr_image_tag }}
      inputs_fingerprint: ${{ steps.fingerprint.outputs.inputs_fingerprint }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Compute Browser CI image input fingerprint
        id: fingerprint
        run: |
          set -euo pipefail
          python .github/scripts/compute_browser_image_fingerprint.py --format github-output >> "$GITHUB_OUTPUT"
          python .github/scripts/compute_browser_image_fingerprint.py --format json

      - name: Assert caller's expected fingerprint matches this checkout
        # Runs only on the workflow_call path (integration.yml planner -> build).
        # Standalone push/schedule/dispatch invocations pass through untouched.
        # Failure here is a contract violation: the caller computed a fingerprint
        # at planner time and this build sees a different one, i.e. the source
        # tree drifted between planner and build. Fail fast with a diagnostic
        # rather than silently publishing a mismatched image.
        if: ${{ inputs.expected_fingerprint != '' }}
        env:
          EXPECTED_FINGERPRINT: ${{ inputs.expected_fingerprint }}
          COMPUTED_FINGERPRINT: ${{ steps.fingerprint.outputs.inputs_fingerprint }}
        run: |
          set -euo pipefail
          if [[ "$COMPUTED_FINGERPRINT" != "$EXPECTED_FINGERPRINT" ]]; then
            echo "::error::Browser CI image input fingerprint drifted between planner and build." >&2
            echo "::error::  expected (planner): ${EXPECTED_FINGERPRINT}" >&2
            echo "::error::  computed (build):   ${COMPUTED_FINGERPRINT}" >&2
            echo "::error::  action: rerun integration.yml so the planner recomputes against the current source tree." >&2
            exit 1
          fi

      - name: Decide whether to push (carry to publish job)
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          DISPATCH_PUSH: ${{ inputs.push }}
          EXPECTED_FINGERPRINT: ${{ inputs.expected_fingerprint }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
        run: |
          set -euo pipefail
          SOURCE_SHA="$GITHUB_SHA"
          SHORT_SHA="${SOURCE_SHA::7}"
          PUBLISH_MODE="none"
          PR_IMAGE_TAG=""
          PUSH_OUTPUT="false"

          # workflow_call path (called from integration.yml). The planner only
          # invokes us when a build is actually needed (no pin/cache match), so
          # we always publish. The publish mode follows the caller's event:
          # pull_request -> pr-scoped image (consumed by the calling Integration
          # run via digest output, not by tag polling); main/schedule/dispatch
          # -> pin-refresh image (operator opens a reviewed image-pin.json PR
          # afterwards).
          if [[ -n "$EXPECTED_FINGERPRINT" ]]; then
            PUSH_OUTPUT="true"
            if [[ "$EVENT_NAME" == "pull_request" && "$PR_HEAD_REPO" == "$GITHUB_REPOSITORY" ]]; then
              PUBLISH_MODE="pr"
              PR_IMAGE_TAG="${IMAGE_NAME}:pr-${PR_NUMBER}-${SHORT_SHA}"
            elif [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
              PUBLISH_MODE="pin"
            elif [[ "$EVENT_NAME" == "schedule" || "$EVENT_NAME" == "workflow_dispatch" ]]; then
              PUBLISH_MODE="pin"
            else
              # Untrusted PR (fork) reaching workflow_call should have been
              # blocked at the planner; defend in depth here too.
              echo "::error::workflow_call invoked from unsupported event ($EVENT_NAME, head_repo=$PR_HEAD_REPO)." >&2
              exit 1
            fi
          # Standalone path: push to main, weekly schedule, or manual dispatch.
          # These refresh the reviewed image-pin.json digest. The pull_request
          # trigger no longer exists on this workflow; PR builds reach us only
          # through the workflow_call branch above.
          elif [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            PUSH_OUTPUT="true"
            PUBLISH_MODE="pin"
          elif [[ "$EVENT_NAME" == "schedule" ]]; then
            PUSH_OUTPUT="true"
            PUBLISH_MODE="pin"
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            PUSH_OUTPUT="${DISPATCH_PUSH}"
            if [[ "$DISPATCH_PUSH" == "true" ]]; then
              PUBLISH_MODE="pin"
            fi
          fi
          {
            echo "source_sha=${SOURCE_SHA}"
            echo "short_sha=${SHORT_SHA}"
            echo "cache_key=ijt-browser-ci-${SOURCE_SHA}"
            echo "push=${PUSH_OUTPUT}"
            echo "publish_mode=${PUBLISH_MODE}"
            echo "pr_image_tag=${PR_IMAGE_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Build image (load only, gha cache export)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: .github/docker/ijt-browser-ci/Dockerfile
          load: true
          push: false
          tags: ${{ env.IMAGE_NAME }}:image-smoke-${{ steps.decide.outputs.short_sha }}
          build-args: |
            IMAGE_BUILD_REF=${{ github.ref }}
            IMAGE_BUILD_SHA=${{ steps.decide.outputs.source_sha }}
            IMAGE_INPUTS_FINGERPRINT=${{ steps.fingerprint.outputs.inputs_fingerprint }}
          cache-from: type=gha,scope=ijt-browser-ci
          cache-to: type=gha,scope=ijt-browser-ci,mode=max

      - name: Image smoke - metadata and tool versions
        env:
          SHORT_SHA: ${{ steps.decide.outputs.short_sha }}
          EXPECTED_FINGERPRINT: ${{ steps.fingerprint.outputs.inputs_fingerprint }}
        run: |
          set -euo pipefail
          IMG="${IMAGE_NAME}:image-smoke-${SHORT_SHA}"
          docker run --rm --network=none "$IMG" cat /opt/ijt-browser-ci/metadata.json
          docker run --rm --network=none "$IMG" bash -c 'python --version | grep -E "^Python 3\.14\."'
          docker run --rm --network=none "$IMG" bash -c 'node --version | grep -E "^v24\."'
          actual_fingerprint="$(
            docker run --rm --network=none "$IMG" \
              python -c "import json; print(json.load(open('/opt/ijt-browser-ci/metadata.json')).get('inputs_fingerprint',''))"
          )"
          if [[ "$actual_fingerprint" != "$EXPECTED_FINGERPRINT" ]]; then
            echo "::error::Image metadata inputs_fingerprint does not match the source checkout." >&2
            echo "::error::  expected: $EXPECTED_FINGERPRINT" >&2
            echo "::error::  actual:   ${actual_fingerprint}" >&2
            exit 1
          fi

      - name: Image smoke - cache and permissions probe (non-root UID)
        env:
          SHORT_SHA: ${{ steps.decide.outputs.short_sha }}
        run: |
          set -euo pipefail
          IMG="${IMAGE_NAME}:image-smoke-${SHORT_SHA}"
          UID_GID="$(id -u):$(id -g)"
          docker run --rm --network=none --user "$UID_GID" "$IMG" bash -c '
            set -euo pipefail
            touch /opt/ijt-browser-ci/home/.probe
            touch /opt/ijt-browser-ci/npm-cache/.probe
            touch /opt/ijt-browser-ci/pip-cache/.probe
            ls /opt/ijt-browser-ci/pip-wheelhouse | head -5
            ls /ms-playwright | head -5
            python -m venv /tmp/v && /tmp/v/bin/python -m pip --version
          '

      - name: Image smoke - offline dependency closure probe
        # Image-integrity gate only: prove the baked pip wheelhouse, npm cache,
        # Chromium install, and non-root permissions are usable with
        # --network=none. Full browser behavior stays in the post-publish
        # offline-e2e job (standalone path) or in the calling Integration
        # run's live-webclient-browser matrix (workflow_call path), so product
        # regressions do not prevent publishing the digest those consumers
        # need.
        env:
          SHORT_SHA: ${{ steps.decide.outputs.short_sha }}
        run: |
          set -euo pipefail
          IMG="${IMAGE_NAME}:image-smoke-${SHORT_SHA}"
          UID_GID="$(id -u):$(id -g)"
          docker run --rm \
            --network=none \
            --user "$UID_GID" \
            -w /workspace \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -e HOME=/opt/ijt-browser-ci/home \
            -e CI=1 \
            -e npm_config_cache=/opt/ijt-browser-ci/npm-cache \
            -e npm_config_offline=true \
            -e PIP_CACHE_DIR=/opt/ijt-browser-ci/pip-cache \
            -e PIP_NO_INDEX=1 \
            -e PIP_FIND_LINKS=/opt/ijt-browser-ci/pip-wheelhouse \
            -e IS_DOCKER=true \
            -e PLAYWRIGHT_BROWSERS_PATH=/ms-playwright \
            "$IMG" \
            bash -lc '
              set -euo pipefail
              asyncua_wheel="$(find /opt/ijt-browser-ci/pip-wheelhouse -maxdepth 1 -name "asyncua-*.whl" -printf "%f\n" | sort | tail -n 1)"
              test -n "$asyncua_wheel"
              asyncua_version="${asyncua_wheel#asyncua-}"
              asyncua_version="${asyncua_version%%-*}"
              awk -v version="$asyncua_version" \
                '\''BEGIN { replaced=0 } tolower($0) ~ /^asyncua([[:space:]]|[=<>!~@]|$)/ { print "asyncua==" version; replaced=1; next } { print } END { if (replaced == 0) print "asyncua==" version }'\'' \
                constraints.txt > "$HOME/runtime-constraints.txt"
              python -m venv "$HOME/ijt-browser-probe"
              "$HOME/ijt-browser-probe/bin/python" -m pip install --pre --no-index \
                --find-links /opt/ijt-browser-ci/pip-wheelhouse \
                -c "$HOME/runtime-constraints.txt" \
                -r OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt \
                -r OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt
              "$HOME/ijt-browser-probe/bin/python" -c "import asyncua, pytest, pytest_timeout, websockets; print(\"offline python closure OK\")"
              cd OPC_UA_Clients/Release2/IJT_Web_Client
              npm ci --legacy-peer-deps --offline --no-audit --no-fund
              node -e "require(\"@playwright/test\"); console.log(\"offline node closure OK\")"
              npx playwright --version
              test -d /ms-playwright
            '

      - name: Stage image smoke artifacts
        if: always()
        run: |
          set -euxo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/.image-smoke-artifacts"
          for src in \
            "${GITHUB_WORKSPACE}/OPC_UA_Clients/Release2/IJT_Web_Client/test-results" \
            "${GITHUB_WORKSPACE}/test-results"; do
            if [[ -d "$src" ]]; then
              dest="${GITHUB_WORKSPACE}/.image-smoke-artifacts/$(basename "$(dirname "$src")")-$(basename "$src")"
              cp -r "$src" "$dest" || true
            fi
          done
          ls -la "${GITHUB_WORKSPACE}/.image-smoke-artifacts" || true

      - name: Upload image smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: image-smoke-${{ steps.decide.outputs.short_sha }}
          path: |
            .image-smoke-artifacts/**
            OPC_UA_Clients/Release2/IJT_Web_Client/test-results/**
            test-results/**
          if-no-files-found: ignore

      - name: Job summary
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          SHORT_SHA: ${{ steps.decide.outputs.short_sha }}
          WILL_PUBLISH: ${{ steps.decide.outputs.push }}
          PUBLISH_MODE: ${{ steps.decide.outputs.publish_mode }}
          PR_IMAGE_TAG: ${{ steps.decide.outputs.pr_image_tag }}
          INPUTS_FINGERPRINT: ${{ steps.fingerprint.outputs.inputs_fingerprint }}
        run: |
          set -euo pipefail
          {
            echo "## IJT Browser CI image - build and smoke"
            echo ""
            echo "- Event: \`${EVENT_NAME}\`"
            echo "- Ref: \`${REF}\`"
            echo "- Short SHA: \`${SHORT_SHA}\`"
            echo "- Will publish: \`${WILL_PUBLISH}\`"
            echo "- Publish mode: \`${PUBLISH_MODE}\`"
            echo "- Inputs fingerprint: \`${INPUTS_FINGERPRINT}\`"
            if [[ -n "${PR_IMAGE_TAG}" ]]; then
              echo "- PR-scoped image tag: \`${PR_IMAGE_TAG}\`"
            fi
            echo "- Publish gate: image integrity only"
            echo "- Full offline browser regression: post-publish \`offline-e2e\` job"
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish to GHCR
    needs: build
    if: needs.build.outputs.should_push == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute publish tags
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          BUILD_SHORT_SHA: ${{ needs.build.outputs.short_sha }}
          PUBLISH_MODE: ${{ needs.build.outputs.publish_mode }}
          PR_IMAGE_TAG: ${{ needs.build.outputs.pr_image_tag }}
          INPUTS_FINGERPRINT: ${{ needs.build.outputs.inputs_fingerprint }}
        run: |
          set -euo pipefail
          TAGS="${IMAGE_NAME}:sha-${BUILD_SHORT_SHA}"
          # Fingerprint-keyed tag is the cache identity used by the consumer's
          # planner. Any future PR/push with the same inputs_fingerprint resolves
          # this tag to the existing digest and skips building entirely.
          # build_sha is only provenance; it MUST NOT participate in cache
          # identity or in the consumer's runtime trust check.
          TAGS="${TAGS}"$'\n'"${IMAGE_NAME}:fingerprint-${INPUTS_FINGERPRINT}"
          if [[ "$PUBLISH_MODE" == "pr" ]]; then
            TAGS="${TAGS}"$'\n'"${PR_IMAGE_TAG}"
          fi
          if [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            TAGS="${TAGS}"$'\n'"${IMAGE_NAME}:main"
          fi
          {
            echo 'tags<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Push image (cache from build job)
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: .
          file: .github/docker/ijt-browser-ci/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            IMAGE_BUILD_REF=${{ github.ref }}
            IMAGE_BUILD_SHA=${{ needs.build.outputs.source_sha }}
            IMAGE_INPUTS_FINGERPRINT=${{ needs.build.outputs.inputs_fingerprint }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=ijt-browser-ci

      - name: Verify published image by digest (pull + offline smoke)
        # Proves GHCR pull permission AND that the digest is usable as
        # IJT_BROWSER_CI_IMAGE for Integration. Hard gate.
        env:
          PUBLISHED_DIGEST: ${{ steps.push.outputs.digest }}
          EXPECTED_SOURCE_SHA: ${{ needs.build.outputs.source_sha }}
          EXPECTED_INPUTS_FINGERPRINT: ${{ needs.build.outputs.inputs_fingerprint }}
        run: |
          set -euo pipefail
          REF="${IMAGE_NAME}@${PUBLISHED_DIGEST}"
          echo "Pulling $REF ..."
          docker pull "$REF"
          docker run --rm --network=none "$REF" cat /opt/ijt-browser-ci/metadata.json
          docker run --rm --network=none "$REF" bash -c 'python --version | grep -E "^Python 3\.14\."'
          docker run --rm --network=none "$REF" bash -c 'node --version | grep -E "^v24\."'
          actual_sha="$(docker run --rm --network=none "$REF" python -c "import json; print(json.load(open('/opt/ijt-browser-ci/metadata.json')).get('build_sha',''))")"
          if [[ "$actual_sha" != "$EXPECTED_SOURCE_SHA" ]]; then
            echo "::error::Published image metadata build_sha does not match the workflow source SHA." >&2
            echo "::error::  expected: ${EXPECTED_SOURCE_SHA}" >&2
            echo "::error::  actual:   ${actual_sha}" >&2
            exit 1
          fi
          actual_fingerprint="$(
            docker run --rm --network=none "$REF" \
              python -c "import json; print(json.load(open('/opt/ijt-browser-ci/metadata.json')).get('inputs_fingerprint',''))"
          )"
          if [[ "$actual_fingerprint" != "$EXPECTED_INPUTS_FINGERPRINT" ]]; then
            echo "::error::Published image metadata inputs_fingerprint does not match the source checkout." >&2
            echo "::error::  expected: ${EXPECTED_INPUTS_FINGERPRINT}" >&2
            echo "::error::  actual:   ${actual_fingerprint}" >&2
            exit 1
          fi

      - name: Job summary
        env:
          PUBLISHED_DIGEST: ${{ steps.push.outputs.digest }}
          PUBLISHED_TAGS: ${{ steps.meta.outputs.tags }}
          PUBLISH_MODE: ${{ needs.build.outputs.publish_mode }}
          INPUTS_FINGERPRINT: ${{ needs.build.outputs.inputs_fingerprint }}
        run: |
          set -euo pipefail
          {
            echo "## IJT Browser CI image - Published"
            echo ""
            echo "- Tags:"
            echo '```'
            echo "${PUBLISHED_TAGS}"
            echo '```'
            echo "- Digest: \`${PUBLISHED_DIGEST}\`"
            echo "- Inputs fingerprint: \`${INPUTS_FINGERPRINT}\`"
            if [[ "$PUBLISH_MODE" == "pin" ]]; then
              echo ""
              echo "_Open a normal reviewed PR updating \`.github/docker/ijt-browser-ci/image-pin.json\` to this digest when main should consume it:_"
              echo '```'
              echo "${IMAGE_NAME}@${PUBLISHED_DIGEST}"
              echo '```'
            elif [[ "$PUBLISH_MODE" == "pr" ]]; then
              echo ""
              echo "_Integration consumes this digest directly via the workflow_call output; the PR-scoped tag above is for provenance and manual debugging only._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  offline-e2e:
    name: Required Offline Browser E2E
    needs: [build, publish]
    # On the standalone path (push to main, weekly schedule, manual dispatch)
    # this job is the verification gate before the reviewed image-pin.json is
    # refreshed. On the workflow_call path (integration.yml planner -> build)
    # the calling Integration run's live-webclient-browser matrix is the
    # verification, against the same digest we just published, so we skip
    # offline-e2e here to avoid paying for the full browser regression twice.
    if: needs.build.outputs.should_push == 'true' && needs.publish.result == 'success' && inputs.expected_fingerprint == ''
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published IJT Browser CI image
        env:
          PUBLISHED_DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          set -euo pipefail
          REF="${IMAGE_NAME}@${PUBLISHED_DIGEST}"
          echo "Pulling $REF ..."
          docker pull "$REF"
          docker image inspect "$REF" --format 'id={{.Id}} created={{.Created}}'

      - name: Run offline Web Client browser regression
        env:
          PUBLISHED_DIGEST: ${{ needs.publish.outputs.digest }}
        run: |
          set -euo pipefail
          REF="${IMAGE_NAME}@${PUBLISHED_DIGEST}"
          docker run --rm --init \
            --network=none \
            --user "$(id -u):$(id -g)" \
            -w /workspace \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -e CI=1 \
            -e IS_DOCKER=true \
            -e HOME=/opt/ijt-browser-ci/home \
            -e npm_config_cache=/opt/ijt-browser-ci/npm-cache \
            -e npm_config_offline=true \
            -e PIP_CACHE_DIR=/opt/ijt-browser-ci/pip-cache \
            -e PIP_NO_INDEX=1 \
            -e PIP_FIND_LINKS=/opt/ijt-browser-ci/pip-wheelhouse \
            -e SKIP_VENV_INSTALL=1 \
            -e PLAYWRIGHT_BROWSERS_PATH=/ms-playwright \
            -e GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
            -e GITHUB_RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT}" \
            -e GITHUB_SHA="${GITHUB_SHA}" \
            -e GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            -e GITHUB_SERVER_URL="${GITHUB_SERVER_URL}" \
            "$REF" \
            bash -lc 'python run_all_tests.py --suite web-client-e2e-regression --verbose'

      - name: Upload offline browser regression artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-browser-ci-offline-e2e-${{ needs.build.outputs.short_sha }}
          path: |
            OPC_UA_Clients/Release2/IJT_Web_Client/test-results/**
            test-results/**
          if-no-files-found: ignore
          retention-days: 14
