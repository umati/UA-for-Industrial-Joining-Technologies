# ─────────────────────────────────────────────────────────────────────────────
# L2 Compatibility — Windows + Edge
#
# Non-blocking detection layer for the audited Web Client browser surfaces that
# are customer-visible on Windows Edge: result import file chooser and result
# export download handling. This workflow is intentionally schedule/manual only.
# ─────────────────────────────────────────────────────────────────────────────

name: "L2 Compatibility — Windows Edge"

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-client-l2-edge-compat:
    name: "Web Client - L2 Edge Compat (Windows)"
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.14"
          cache: 'pip'
          cache-dependency-path: |
            OPC_UA_Clients/Release2/IJT_Web_Client/requirements.txt
            OPC_UA_Clients/Release2/IJT_Web_Client/requirements-dev.txt

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: OPC_UA_Clients/Release2/IJT_Web_Client/package-lock.json

      - name: Capture Edge and runner versions
        id: edge_probe
        run: |
          $ErrorActionPreference = "Stop"
          $edge = @(
            "${env:ProgramFiles(x86)}\Microsoft\Edge\Application\msedge.exe",
            "${env:ProgramFiles}\Microsoft\Edge\Application\msedge.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $edge) {
            throw "msedge.exe was not found on this windows-latest runner"
          }
          $edgeVersion = & $edge --version
          "edge_version=$edgeVersion" >> $env:GITHUB_OUTPUT
          "image_os=$env:ImageOS" >> $env:GITHUB_OUTPUT
          "image_version=$env:ImageVersion" >> $env:GITHUB_OUTPUT

      - name: Run Web Client L2 Edge compatibility smoke
        run: python OPC_UA_Clients/Release2/IJT_Web_Client/run_all_tests.py --l2-compat-only

      - name: Write L2 environment artifact
        if: always()
        run: |
          $dir = "OPC_UA_Clients/Release2/IJT_Web_Client/test-results"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          @"
          RUNNER_OS=${env:RUNNER_OS}
          ImageOS=${{ steps.edge_probe.outputs.image_os }}
          ImageVersion=${{ steps.edge_probe.outputs.image_version }}
          EdgeVersion=${{ steps.edge_probe.outputs.edge_version }}
          RunURL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          "@ | Set-Content -Path "$dir/l2-compat-environment.txt" -Encoding UTF8

      - name: Upload Web Client L2 compatibility results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: results-web-client-l2-edge-compat
          path: OPC_UA_Clients/Release2/IJT_Web_Client/test-results/
          retention-days: 14
          if-no-files-found: warn

      - name: Open or update L2 compatibility issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $title = "[L2 Compat] Windows + Edge"
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $body = @"
          L2 Windows + Edge compatibility failed.

          - Run: $runUrl
          - Edge: ${{ steps.edge_probe.outputs.edge_version }}
          - ImageOS: ${{ steps.edge_probe.outputs.image_os }}
          - ImageVersion: ${{ steps.edge_probe.outputs.image_version }}
          - Workflow: ${{ github.workflow }}
          - Commit: ${{ github.sha }}

          See artifact `results-web-client-l2-edge-compat` for Playwright/JUnit output, traces, videos, and logs.
          "@
          $bodyPath = Join-Path $env:RUNNER_TEMP "l2-compat-issue.md"
          $body | Set-Content -Path $bodyPath -Encoding UTF8

          $issueJson = gh issue list --search "`"$title`" in:title" --state open --json number,title
          $issues = @($issueJson | ConvertFrom-Json)
          $issue = $issues | Where-Object { $_.title -eq $title } | Select-Object -First 1
          if ($issue) {
            gh issue comment $($issue.number) --body-file $bodyPath
          } else {
            gh issue create --title $title --body-file $bodyPath
          }

      - name: Close recovered L2 compatibility issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $title = "[L2 Compat] Windows + Edge"
          $issueJson = gh issue list --search "`"$title`" in:title" --state open --json number,title
          $issues = @($issueJson | ConvertFrom-Json)
          $issue = $issues | Where-Object { $_.title -eq $title } | Select-Object -First 1
          if (-not $issue) {
            exit 0
          }

          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $comment = @"
          L2 Windows + Edge compatibility recovered.

          - Green run: $runUrl
          - Edge: ${{ steps.edge_probe.outputs.edge_version }}
          - ImageOS: ${{ steps.edge_probe.outputs.image_os }}
          - ImageVersion: ${{ steps.edge_probe.outputs.image_version }}
          - Commit: ${{ github.sha }}
          "@
          $commentPath = Join-Path $env:RUNNER_TEMP "l2-compat-recovered.md"
          $comment | Set-Content -Path $commentPath -Encoding UTF8
          gh issue comment $($issue.number) --body-file $commentPath
          gh issue close $($issue.number)
