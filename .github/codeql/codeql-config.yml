# CodeQL analysis configuration.
# Scans all code in the repository — source, tests, and scripts.
# Only generated/dependency directories are excluded.

paths-ignore:
  - '**/venv/**'
  - '**/.state/**'
  - '**/node_modules/**'
  - '**/__pycache__/**'
  # Wine-based Docker images must run as root (Wine requires root access
  # to initialise the Wine prefix and run Windows executables via wineboot).
  # The "runs as root" CodeQL finding is intentional and cannot be avoided.
  - 'OPC_UA_Servers/Release2/Dockerfile'
  - 'OPC_UA_Servers/Release2/Dockerfile.wine-base'
